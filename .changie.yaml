changesDir: .changes
unreleasedDir: unreleased
headerPath: header.tpl.md
changelogPath: CHANGELOG.md
versionExt: md
versionFormat: '## [{{.Version}}] — {{.Time.Format "2006-01-02"}}'
kindFormat: '### {{.Kind}}'
changeFormat: '- {{.Body}}'
kinds:
  - label: Added
  - label: Changed
  - label: Deprecated
  - label: Removed
  - label: Fixed
  - label: Security
  - label: Internal
custom:
  - key: Issue
    label: Issue / PR number (e.g. 88, leave empty if N/A)
    type: string
    optional: true
newlines:
  afterChangelogVersion: 1
  beforeChangelogVersion: 1
  endOfVersion: 1

# release-manifest.yaml — source of truth for the next release.
#
# Maintainers edit this file BEFORE tagging. scripts/package-linux.sh
# reads it, fills in the release-specific fields (version from
# `git describe`, released_at from `date`, tarball.<arch>.{url,sha256,
# size_bytes} from the produced tarballs, changelog_url from the
# CHANGELOG.md anchor for this version), and emits the final
# `manifest.json` that ships with the tarball + as a standalone
# release asset.
#
# See docs/UPDATE_MANIFEST.md for the full contract.

# Oldest version that can upgrade DIRECTLY to this release. Hosts
# running anything older are told "upgrade to vX.Y.Z first".
min_upgrade_from: "0.1.6"

# Kill-switch. Set to true if a release goes out and turns out to be
# broken — the host updater hides any release with skip_release: true
# from the "Update available" banner so users on older versions skip
# straight past it. Preferable to deleting the tag.
skip_release: false

# One-paragraph summary for the "Update available" toast. The full
# changelog goes in CHANGELOG.md (the package script computes the
# correct anchor for the version being released).
#
# IMPORTANT: edit this on every release. scripts/check-manifest-fresh.sh
# (added by issue #156 / v0.5.4 mishap) runs as part of the release
# checklist and refuses to proceed if the summary text matches the
# previously published release. It will catch the "forgot to update"
# mistake but not detect staleness against older releases — so be
# disciplined about rewriting this on every cut.
summary: |
  Sprint 12 — Umbrel catalogue ships. v0.6.0 cut yesterday on the
  Sprint 11 quality foundation; v0.6.1 turns the ADR-0024 design
  into a live pipeline plus a real-user bug fix.

  1. **Umbrel catalogue import — 241 apps live.** The clean-room
     import pipeline from ADR-0024 went from approved design to
     working in a single sprint. `.github/workflows/sync-umbrel-
     catalog.yml` runs every Monday 06:00 UTC, clones the public
     `getumbrel/umbrel-apps` repo, runs the four-tier filter
     (Tier 1 hard-reject `getumbrel/*` images + cross-app
     siblings; Tier 2 soft-reject Bitcoin / Lightning categories;
     Tier 3 manual triage; Tier 4 allow), and opens a reviewable
     PR with the diff stat. First run after Phase 4.5 landed
     wrote **241 apps** under `community-catalog/Apps/<id>/`
     (matching the Phase 0 audit projection exactly: 241 allow,
     44 hard-reject, 45 soft-reject, 0 manual). The legal posture
     turns on the parser's field allowlist — functional fields
     only (image, ports, env names) cross the boundary; expressive
     content (descriptions, marketing) never does. Descriptions
     are fetched from each app's own upstream README at sync
     time. Icons hot-linked to `getumbrel.github.io/umbrel-apps-
     gallery/<id>/icon.svg`. AppCard tile in the UI carries a
     discreet source label (`networking · umbrel`) with a native
     hover tooltip + click-through to the upstream repo. See
     `docs/architecture/community-catalog.md` for the full
     operational reference. Closes #307.

  2. **Password UX off-by-one fix (#306).** Real-user bug report:
     the SetupWizard accepted 5-character passwords but the
     backend rejected anything under 6, with a generic
     "Falha ao inicializar" error masking the actual cause.
     Root-cause fix: `backend/user-service/route/v1/password.go`
     declares `MinPasswordLen = 8` as the single source of truth;
     `SetupWizard.svelte` mirrors the constant + maps backend
     `common_err` codes onto a discriminated `RegisterResult`
     type for typed error display. Both sides regression-locked
     (`password_test.go` + `SetupWizard.test.ts`). Helper text
     reads "Mínimo 8 caracteres" in pt-BR / "At least 8
     characters" in en-US / "Mínimo 8 caracteres" in es. The
     button stays disabled until both length + match gates pass.

  3. **Sync-workflow label-race fix.** First weekly-sync trigger
     after Phase 4.5 pushed the branch but skipped PR open:
     `gh pr create --label "catalog"` exits non-zero when the
     label doesn't exist on the repo, and the trailing
     `|| true` swallowed the error. Split into separate
     `gh pr create` + `gh pr edit --add-label` (best-effort)
     steps so subsequent weekly runs open PRs unconditionally.

  Net code direction Sprint 12: ~3.0 k LOC added by the new
  `backend/sync-catalog/` Go package + the `community-catalog/`
  wire-up + the UI source badge + the 255-line maintainer doc;
  the bug fix consolidated password validation into a single
  backend constant with regression locks on both sides. The
  catalogue itself is 12 738 lines of imported config under
  `community-catalog/Apps/` — generated content, never edited
  by hand, ships in the release tarball.

  Custom App ↔ Community App parity polish (the unified install
  experience question raised during Phase 5) is Sprint 13 work.
  HTTPS re-enable + trust-dance + UX redo remain indefinitely
  deferred — unchanged from v0.6.0.

# Declarations of breaking changes the user should know about BEFORE
# upgrading. Empty list = "no breaking changes". Each item:
#   { kind, description, manual_action }
# `manual_action: null` means PowerLab handles it automatically;
# any non-null value is shown to the user as a warning modal that
# they MUST dismiss explicitly before the upgrade button enables.
breaking_changes: []

# Pre-install checks the host updater runs BEFORE downloading the
# tarball. Each kind has built-in pass/warn/fail logic — the manifest
# only declares which to run, not how to interpret them.
pre_install_checks:
  - { kind: disk_free_mb, path: /var/lib/powerlab, min: 500 }
  - { kind: docker_healthy }
  - { kind: no_apps_unhealthy }
  - { kind: no_active_install_task }

# DB migrations to apply after extraction, before starting services.
# Each item: { id, description, sql }. Migrations are applied
# transactionally; failure rolls back the entire upgrade.
db_migrations: []

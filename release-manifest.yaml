# release-manifest.yaml — source of truth for the next release.
#
# Maintainers edit this file BEFORE tagging. scripts/package-linux.sh
# reads it, fills in the release-specific fields (version from
# `git describe`, released_at from `date`, tarball.<arch>.{url,sha256,
# size_bytes} from the produced tarballs, changelog_url from the
# CHANGELOG.md anchor for this version), and emits the final
# `manifest.json` that ships with the tarball + as a standalone
# release asset.
#
# See docs/UPDATE_MANIFEST.md for the full contract.

# Oldest version that can upgrade DIRECTLY to this release. Hosts
# running anything older are told "upgrade to vX.Y.Z first".
min_upgrade_from: "0.1.6"

# Kill-switch. Set to true if a release goes out and turns out to be
# broken — the host updater hides any release with skip_release: true
# from the "Update available" banner so users on older versions skip
# straight past it. Preferable to deleting the tag.
skip_release: false

# One-paragraph summary for the "Update available" toast. The full
# changelog goes in CHANGELOG.md (the package script computes the
# correct anchor for the version being released).
#
# IMPORTANT: edit this on every release. scripts/check-manifest-fresh.sh
# (added by issue #156 / v0.5.4 mishap) runs as part of the release
# checklist and refuses to proceed if the summary text matches the
# previously published release. It will catch the "forgot to update"
# mistake but not detect staleness against older releases — so be
# disciplined about rewriting this on every cut.
summary: |
  Sprint 6 + Sprint 7 — quality consolidation + structural
  refactor. **One user-facing behavior fix**, every other
  change is internal (godoc raises, file splits, helper
  extracts, documentation, retrospectives). Safe upgrade.

  1. **Behavior fix: file download no longer panics on missing
     files.** `GET /v1/file/download_single?path=...` returned
     a generic 500 (caught by the recover middleware) when the
     file didn't exist; now returns the proper 404-shaped
     `FILE_DOES_NOT_EXIST` envelope matching the rest of the
     handler. Closes audit #216 §C item 2.

  2. **Per-service Go API reference now on the docs site.** All
     8 backend modules (pkg, gateway, user-service, message-
     bus, common, local-storage, app-management, core) at
     ≥70% godoc coverage with curated landing pages at
     `/api/<module>/`. Browse at https://neochaotic.github.io/
     powerlab/. Closes the per-module raise initiative #196.

  3. **God-file + god-function refactors landed.** Five Go
     files/functions flagged in the Sprint 5.5 quality audit
     (#216 §D + §E) split into siblings:
     - `compose_app.go` (1276 LOC) → 5 files by responsibility
     - `file.go` (1166 LOC) → 6 files (browse / mutate /
       upload / download / websocket)
     - `CreateContainer` + `RecreateContainer` god functions
       → orthogonal helpers
     - `SendFileOperateNotify` → dispatcher + snapshot
       publisher
     - `PostAddStorage` → parse + format + mount stages

     No behavior changes — every conditional preserved.

  4. **E2E coverage expansion.** Playwright went from a single
     "page renders" baseline to 10 tests across 6 specs
     (auth, apps, settings, files, orchestrator, smoke). Will
     protect the upcoming UI splits queued for Sprint 8.

  5. **CasaOS obliterate wave finished.** The remaining items
     from the residue audit (#203) — TODO/FIXME burn-down,
     security finding tracked, mermaid.js vendored, docs
     site Phase 3 polished, 3 quick-win audit fixes.

  Net code direction: large addition for godoc + retrospective
  docs (~5000 LOC), large redistribution for refactors (no
  net add/remove), small deletion for the panic fix + dead-
  code kills. 21 changie fragments aggregated.

  UI splits for `apps/+page.svelte` (1561 LOC) and
  `settings/+page.svelte` (1469 LOC) intentionally deferred to
  Sprint 8 — they need browser verification and the user is
  the verification gate. The new E2E suite will catch the
  obvious "page no longer renders" regressions when they ship.

# Declarations of breaking changes the user should know about BEFORE
# upgrading. Empty list = "no breaking changes". Each item:
#   { kind, description, manual_action }
# `manual_action: null` means PowerLab handles it automatically;
# any non-null value is shown to the user as a warning modal that
# they MUST dismiss explicitly before the upgrade button enables.
breaking_changes: []

# Pre-install checks the host updater runs BEFORE downloading the
# tarball. Each kind has built-in pass/warn/fail logic — the manifest
# only declares which to run, not how to interpret them.
pre_install_checks:
  - { kind: disk_free_mb, path: /var/lib/powerlab, min: 500 }
  - { kind: docker_healthy }
  - { kind: no_apps_unhealthy }
  - { kind: no_active_install_task }

# DB migrations to apply after extraction, before starting services.
# Each item: { id, description, sql }. Migrations are applied
# transactionally; failure rolls back the entire upgrade.
db_migrations: []

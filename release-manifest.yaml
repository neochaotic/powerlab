# release-manifest.yaml — source of truth for the next release.
#
# Maintainers edit this file BEFORE tagging. scripts/package-linux.sh
# reads it, fills in the release-specific fields (version from
# `git describe`, released_at from `date`, tarball.<arch>.{url,sha256,
# size_bytes} from the produced tarballs, changelog_url from the
# CHANGELOG.md anchor for this version), and emits the final
# `manifest.json` that ships with the tarball + as a standalone
# release asset.
#
# See docs/UPDATE_MANIFEST.md for the full contract.

# Oldest version that can upgrade DIRECTLY to this release. Hosts
# running anything older are told "upgrade to vX.Y.Z first".
min_upgrade_from: "0.1.6"

# Kill-switch. Set to true if a release goes out and turns out to be
# broken — the host updater hides any release with skip_release: true
# from the "Update available" banner so users on older versions skip
# straight past it. Preferable to deleting the tag.
skip_release: false

# One-paragraph summary for the "Update available" toast. The full
# changelog goes in CHANGELOG.md (the package script computes the
# correct anchor for the version being released).
#
# IMPORTANT: edit this on every release. scripts/check-manifest-fresh.sh
# (added by issue #156 / v0.5.4 mishap) runs as part of the release
# checklist and refuses to proceed if the summary text matches the
# previously published release. It will catch the "forgot to update"
# mistake but not detect staleness against older releases — so be
# disciplined about rewriting this on every cut.
summary: |
  Sprint 9 + Sprint 10 — security tightening + visible polish.
  **One visible feature** (Drive Health card) plus a wave of
  CasaOS-residue criticals closed with regression tests and
  the Settings page split into pane components.

  1. **NEW: Drive Health card on the dashboard.** Per-disk SMART
     status + temperature badges (color-coded green/amber/red),
     reading data the backend already populated from `smartctl`.
     Hides gracefully on hosts without smartctl. Closes #255 —
     the headline UX improvement of this wave.

  2. **Security tightened (5 fixes).** JWT issuer rebrand AND a
     real bug catch: `Validate()` previously accepted refresh
     tokens as access tokens; now the access path rejects
     unknown issuers (#246). Default app password literal
     `casaos` → `powerlab` (#243). Docker registry probe
     User-Agent rebranded (#244). fstab markers + backup file
     names rebranded (#248). package-linux.sh now ships the
     `[security] AllowedOrigins` section in fresh installs.

  3. **Bug fixes.** Health endpoint glob now queries both
     `casaos*` AND `powerlab-*` — fresh-install dashboard
     was empty (#245). Custom App tile click falls back to
     `ports[0].host` when the dedicated web_port field is
     empty — apps now open in new tab without forcing two
     fields for the same value (#278). Settings "CasaOS
     catalog" → "Community catalog" (#250).

  4. **Settings page split (50% LOC reduction).** Sprint 7
     carry-forward landed: 1469 LOC → 739 LOC orchestrator
     plus 5 pane components (Apps, General, Network, Security,
     About). Closes #123 for the settings side; apps/+page
     split partial (3 modals extracted), rest in Sprint 11.

  5. **Internal: ~12.5k LOC removed across Sprints 8 + 9 + 10.**
     CasaOS kill-list completed (backend/cli, Samba, ZeroTier,
     SSH-to-other-host, peer-broadcast, validator, docgen,
     migration-tool tree, app-management /v1/* routes,
     user-service v1 dead handlers). Plus 2 MUST-FIX skipped
     Go tests resolved (1 implemented, 1 deleted as dead code).

  6. **Quality infrastructure.** Frontend coverage measurement
     in CI with baseline 16.77 % statements; 14-day artifact
     upload on every push. Documented in
     `docs/audits/frontend-coverage-baseline.md`. Lift to
     ≥ 25 % targeted for Sprint 11.

  Net code direction across Sprints 9 + 10: net delete (~600
  LOC removed for cleanup), large redistribution for the
  Settings split (no net add/remove), small addition for the
  Drive Health UI + tests.

  HTTPS re-enable and trust-dance work remain indefinitely
  deferred per the 2026-05-11 prioritization decision. v0.6
  readiness is no longer gated on HTTPS — it's gated on the
  apps/+page split (Sprint 11) plus a positive coverage trend.

# Declarations of breaking changes the user should know about BEFORE
# upgrading. Empty list = "no breaking changes". Each item:
#   { kind, description, manual_action }
# `manual_action: null` means PowerLab handles it automatically;
# any non-null value is shown to the user as a warning modal that
# they MUST dismiss explicitly before the upgrade button enables.
breaking_changes: []

# Pre-install checks the host updater runs BEFORE downloading the
# tarball. Each kind has built-in pass/warn/fail logic — the manifest
# only declares which to run, not how to interpret them.
pre_install_checks:
  - { kind: disk_free_mb, path: /var/lib/powerlab, min: 500 }
  - { kind: docker_healthy }
  - { kind: no_apps_unhealthy }
  - { kind: no_active_install_task }

# DB migrations to apply after extraction, before starting services.
# Each item: { id, description, sql }. Migrations are applied
# transactionally; failure rolls back the entire upgrade.
db_migrations: []

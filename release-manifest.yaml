# release-manifest.yaml — source of truth for the next release.
#
# Maintainers edit this file BEFORE tagging. scripts/package-linux.sh
# reads it, fills in the release-specific fields (version from
# `git describe`, released_at from `date`, tarball.<arch>.{url,sha256,
# size_bytes} from the produced tarballs, changelog_url from the
# CHANGELOG.md anchor for this version), and emits the final
# `manifest.json` that ships with the tarball + as a standalone
# release asset.
#
# See docs/UPDATE_MANIFEST.md for the full contract.

# Oldest version that can upgrade DIRECTLY to this release. Hosts
# running anything older are told "upgrade to vX.Y.Z first".
min_upgrade_from: "0.1.6"

# Kill-switch. Set to true if a release goes out and turns out to be
# broken — the host updater hides any release with skip_release: true
# from the "Update available" banner so users on older versions skip
# straight past it. Preferable to deleting the tag.
skip_release: false

# One-paragraph summary for the "Update available" toast. The full
# changelog goes in CHANGELOG.md (the package script computes the
# correct anchor for the version being released).
#
# IMPORTANT: edit this on every release. scripts/check-manifest-fresh.sh
# (added by issue #156 / v0.5.4 mishap) runs as part of the release
# checklist and refuses to proceed if the summary text matches the
# previously published release. It will catch the "forgot to update"
# mistake but not detect staleness against older releases — so be
# disciplined about rewriting this on every cut.
summary: |
  Sprint 11 — quality solidification. v0.5.13 shipped the visible
  features (Drive Health card, security fixes, settings split);
  v0.6 turns those into a durable foundation: measured + gated
  test coverage on both surfaces, the ADR backlog cleaned up, and
  the next big feature (Umbrel-catalog import) designed in the
  open so its implementation can land in Sprint 12+ without
  surprises.

  1. **Frontend test coverage gated.** Lifted from the Sprint 9
     baseline (16.77 % statements) to **28.75 % / 24.21 / 26.41 /
     29.60** (statements / branches / functions / lines) — all
     four Sprint 11 targets met. 23 new test files added across
     stores, settings panes, apps modals, AppCard, and dashboard
     widgets. Three regression locks wired: Custom App empty-name
     silent fallback (#240), `x-powerlab → x-web → x-casaos`
     compose extension priority chain (ADR-0025 / #201), and the
     TextEditor inert-state regression from Sprint 9. The vitest
     threshold gate now red-fails CI with `exit 1` + a clear
     `ERROR: Coverage for <metric>` message if any of the four
     numbers drops below the 5-pp safety floor (23 / 19 / 21 /
     24). Closes #296, #297. Test count 230 → **401 passing**.

  2. **Backend test coverage measured + 404 regression locks.**
     CI now runs `go test -race -coverprofile=coverage.out
     -covermode=atomic` per service with 14-day artifact upload
     (`backend-coverage-<service>-<run-id>`). Baseline emitted:
     `core` 6.1 % total / `app-management` 15.5 % / `local-storage`
     measured by the Linux runner. Phase 2 locks the Sprint 3
     cloud-drive removal (#101 / #143) at the HTTP surface:
     `/v1/cloud/*`, `/v1/driver/*`, `/v1/recover/*` plus the
     Sprint 3 self-update kill all assert 404 on both `core` and
     `local-storage`. A future "let's bring back cloud drives"
     refactor red-fails CI before re-introducing the upstream
     dependency. Closes #150 Phases 1 + 2. Phases 3 (testcontainers
     for Docker-heavy paths) + 4 (fuse/mergerfs build-tag tests
     for local-storage) deferred to Sprint 12+.

  3. **Umbrel-catalog import design landed (ADR-0024).** Captures
     the legal posture (functional facts vs. expressive content)
     for importing the largest open home-server catalog without
     inheriting Umbrel's source-available, non-commercial license.
     The four-tier filter pipeline auto-rejects apps tightly
     coupled to Umbrel infrastructure (Bitcoin Core sibling,
     Lightning daemon, `umbrel_main_network` joins, cross-app
     volume mounts). The pipeline runs as a scheduled GitHub
     Action that opens a reviewable PR — not a pre-commit hook,
     which would slow every dev's commit + flake on offline
     work. Implementation tracks separately for Sprint 12+.

  4. **ADR backlog cleaned up.** Resolved the duplicate
     ADR-0011 / ADR-0012 numbering flagged by the 2026-05-10
     quality audit: the foundation `backend/pkg/` pair renumbered
     to **0025** (strangler / coexistence) and **0026** (slog
     logging). ADR-0011 + ADR-0012 are now unambiguously the
     CA-mismatch + CA-rotation ADRs. 29 files touched with
     context-sensitive cross-reference updates; each renumbered
     file carries a "Renumber history" note so historical
     references still resolve. `decisions/README.md` index
     brought current (now lists 0001–0023 + 0025 + 0026).
     Also closed: 7 stale issues in the verify-and-close batch
     (#19 HTTPS mkcert pattern delivered + strategically
     disabled, #25 Swagger superseded by Scalar / ADR-0008, #67
     strangler roadmap completed, #101 + #106 structural CasaOS
     deps resolved, #119 stale catalog bug, #170 migration-tool
     deleted in Sprint 8). #184 AppData migrate tool stays open
     as a genuine deferral pending the dual-write window close.

  HTTPS re-enable + trust-dance UX redo remain indefinitely
  deferred per the 2026-05-11 prioritization decision. When that
  changes, the work is bundled as a dedicated sprint (HTTPS +
  trust-dance + UX inseparable, no piecemeal landings). Tracking
  #294. The release-manifest no longer carries the
  "v0.6 ships with HTTPS re-enabled" promise that the v0.5.2
  manifest carried — that framing is superseded.

  Net code direction Sprint 11: small net add on tests (~+1.6 k
  LOC) plus the audit / retro doc work; ~500 LOC removed by the
  ADR renumber's collapse of the old "two files share a number"
  footnote + duplicate audit narrative.

# Declarations of breaking changes the user should know about BEFORE
# upgrading. Empty list = "no breaking changes". Each item:
#   { kind, description, manual_action }
# `manual_action: null` means PowerLab handles it automatically;
# any non-null value is shown to the user as a warning modal that
# they MUST dismiss explicitly before the upgrade button enables.
breaking_changes: []

# Pre-install checks the host updater runs BEFORE downloading the
# tarball. Each kind has built-in pass/warn/fail logic — the manifest
# only declares which to run, not how to interpret them.
pre_install_checks:
  - { kind: disk_free_mb, path: /var/lib/powerlab, min: 500 }
  - { kind: docker_healthy }
  - { kind: no_apps_unhealthy }
  - { kind: no_active_install_task }

# DB migrations to apply after extraction, before starting services.
# Each item: { id, description, sql }. Migrations are applied
# transactionally; failure rolls back the entire upgrade.
db_migrations: []

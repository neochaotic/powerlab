# golangci-lint v2 configuration (ADR-0040).
#
# Linter selection follows the ADR's "8 core families" line: govet,
# staticcheck, errcheck, gosec, revive, ineffassign, unused, gocyclo.
#
# Mode: WARN-ONLY in CI initially. v2 doesn't have a config-level
# issues-exit-code knob; warn-only is enforced by `continue-on-error:
# true` on the CI job step instead (findings print but don't fail the
# build).
#
# Devs can run locally via `make lint-go`. No pre-commit hook by
# design (see ADR-0040: pre-commit hooks deferred until first linter
# family flips to strict).

version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet         # Go's standard analyzer suite — shadowed vars, printf, lock copies
    - staticcheck   # deeper checks govet misses — deprecated API, simplifiable patterns
    - errcheck      # unchecked errors. PowerLab has "log + continue" in places — warn-only first
    - gosec         # SAST for Go — injection, hardcoded creds, weak crypto. Direct retort to security-priority irony
    - revive        # modern golint successor. Disabled rules trim noise to PowerLab idioms
    - ineffassign   # assignments to never-read variables
    - unused        # dead code the compiler accepts (struct fields, methods, consts)
    - gocyclo       # cyclomatic complexity. High initial ceiling, ratchet down after god-file splits

  settings:
    gocyclo:
      # Initial ceiling. compose_app.go + disk.go have functions far above
      # this. ADR-0040: god-file splits deferred until coverage ≥50%.
      min-complexity: 30
    revive:
      rules:
        - name: exported              # require exported docs (noisy on early-stage code)
          disabled: true
        - name: package-comments
          disabled: true
        - name: var-naming
          disabled: true              # accept legacy CasaOS-derived names during rebrand
    gosec:
      # G404 (weak random) ok for non-crypto picks. G115 noisy on Go 1.21+ safe casts.
      excludes:
        - G404
        - G115
    errcheck:
      check-blank: false
      exclude-functions:
        - (*database/sql.Rows).Close
        - (*os.File).Close
        - fmt.Fprintf
        - fmt.Fprintln

  exclusions:
    paths:
      - codegen
      - build
      - vendor
      - ".*\\.pb\\.go$"
      - ".*\\.gen\\.go$"
      - "mock_.*\\.go$"

issues:
  # Show all findings, not just the first 3 per linter.
  max-issues-per-linter: 0
  max-same-issues: 0

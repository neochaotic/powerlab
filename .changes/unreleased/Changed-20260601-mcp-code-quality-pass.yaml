kind: Changed
body: >-
  Cleanup pass on the MCP UX batch: `generate_artifact` now reports a
  three-state validation `status` ("ok" | "violations" | "skipped") instead
  of a confusing `ok: true|false` that conflated "validator rejected" with
  "no validator wired"; `get_system_health` uses stdlib `strconv` instead
  of hand-rolled integer/float formatters; `list_capabilities` ships with
  a drift-safety test that reconciles its hardcoded tier lists against
  the live server registrations, so any future PR that adds a destructive
  tool or sensitive resource fails CI until the operator-facing list is
  updated.
time: 2026-06-01T14:00:00.000000-03:00

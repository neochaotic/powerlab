kind: Internal
body: >-
  Sprint 20 PR 5/9 — deduplicate CORS config across 9 backend services
  (#391). Revives ``backend/common/middleware/Cors()`` (deleted in
  Sprint 19 PR 2 because nobody had adopted it) with the byte-identical
  permissive config (``AllowOrigins: ["*"]``, every standard method,
  PowerLab's standard ``AllowHeaders`` list, ``MaxAge: 172800``,
  ``AllowCredentials: true``). 9 services migrated:
  ``app-management/route/v2.go``, ``core/route/v{1,2}.go``,
  ``gateway/route/management_route.go``,
  ``local-storage/route/v{1,2}.go``,
  ``message-bus/route/routers.go``,
  ``user-service/route/v{1,2}.go``. Each inline 9-line
  ``CORSWithConfig(...)`` block collapses to ``common_middleware.Cors()``;
  ~80 LOC net reduction across the 9 files + ~70 LOC added in the
  helper. ``cors_test.go`` asserts every field of the returned
  ``CORSConfig`` matches the historical inline shape — drift in any
  assertion is a real wire-level change, not a test to weaken (memory
  feedback_no_apagar_test_para_passar). Race-detector green across
  all 9 services after migration.
custom:

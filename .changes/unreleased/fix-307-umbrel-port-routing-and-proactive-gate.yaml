kind: Fixed
body: 'Umbrel-catalog import — Phase 8 (#307) — fixes "click app tile, new
  window opens, page never loads" for every Umbrel app. Two root causes,
  both locked by failing-first tests:
  (a) `${APP_*_PORT}` placeholders were substituted with sequential 18000+
  integers, but `x-powerlab.port_map` (what the launchpad uses to build the
  click-through URL) carries the manifest''s `port:` field — so the URL
  pointed at port 8788 while the container listened on 18000. Fix: feed
  `manifest.Port` into `substitutePortPlaceholders` as the base value, so
  the compose host port matches `port_map`.
  (b) Apps whose only port-routing signal was Umbrel''s `app_proxy`
  service (no `ports:` in the real service — e.g. `enclosed`) lost ALL
  external accessibility when we stripped app_proxy. Fix: extract
  app_proxy''s `APP_HOST`/`APP_PORT` env BEFORE the strip and synthesize
  an equivalent `ports: ["<manifest.Port>:<APP_PORT>"]` on the target
  service. Also handles brace-less `$APP_FOO_PORT` shell-var form
  (synapse-style upstream) that the previous `${...}`-only regex missed.
  Proactive surface against future Umbrel upstream changes: new test
  `TestProductionCatalog_NoUnknownPlaceholdersInDangerousPositions` scans
  every emitted YAML''s volume/port positions and fails if any `${VAR}`
  or `$VAR` survives — early-warning gate that flags new upstream
  patterns BEFORE the user does, with the offending pattern reported
  in the failure message so the fix lands in `transform.go`. End-to-end
  verified on user''s box: `curl http://host:8788` after rebuild returns
  HTTP 200 from the enclosed container (was empty/timeout before).'

kind: Fixed
body: >-
  Audit log now captures ``user_id`` / ``username`` for ALL public
  traffic, not just the gateway-owned audit endpoints. Previously,
  every request that proxied to a backend service (the bulk of UI
  traffic) recorded null user fields because the JWT decoder ran
  only on /v1/audit/*. A new ``jwt.HTTPDecodeOnly`` middleware
  decodes the bearer token (if present and valid) and populates
  the user_id / user_name request headers without enforcing auth
  — enforcement stays downstream (backend services or HTTPJWT on
  audit endpoints). Wired as the inner layer of the gateway public
  mux so audit middleware sees populated headers. 5 unit tests on
  the new middleware: valid token, missing token, invalid token,
  raw vs Bearer prefix, query token fallback. Sprint 18 #376
  hardening (one of the v0.6.12 cut findings).

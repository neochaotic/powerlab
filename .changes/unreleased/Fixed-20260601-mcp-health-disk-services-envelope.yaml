kind: Fixed
body: >-
  `get_system_health` now parses the canonical PowerLab response envelope
  (`{success, message, data}`) and reads disk usage from the `mounts[]`
  array on VM hosts where `physical[]` is empty (Lima, Docker Desktop).
  Pre-fix, the Tool decoded the envelope as a flat object and saw
  empty arrays everywhere, reporting `worst mount: 0.0%` on Lima at
  88.7% used + "all services healthy" regardless of state. Services
  also gained `.service` suffix tolerance — real core returns
  `powerlab-mcp` without the suffix; the evaluator now matches both
  forms. Caught by end-to-end testing in Claude Code post-deploy
  (the agent rendered "worst mount at 0.0%" when reality was 88.7%).
time: 2026-06-01T17:00:00.000000-03:00

kind: Internal
body: 'ADR-0045 — powerlab-mcp''s apps://* and docker://* resources will be thin HTTP proxies to app-management, extending the ADR-0044 hybrid-architecture pattern to a second upstream. Two consequences worth flagging: (1) PostgreSQL migration on app-management''s storage becomes a no-op for MCP — the API contract is the abstraction, storage is an implementation detail it owns; same applies to any future backend swap (podman, k8s). The decision is locked specifically with the maintainer-flagged PostgreSQL future in mind. (2) docker://logs ships via app-management''s ComposeAppLogs endpoint — MCP never needs Docker socket access; the standalone "Docker integration ADR" originally planned for PR 4 is no longer required. Implementation: generalises coreproxy.Client to multi-service registration (resolves <runtime>/app-management.url alongside the existing casaos.url), serves an apps_unavailable structured payload mirroring core_unavailable when app-management is down, with a fallback hint pointing at audit:// and journal://powerlab-app-management. No new Docker socket dependency in powerlab-mcp.service; just a Wants= soft dep on powerlab-app-management.service. ADR published in English alongside ADR-0034/0044.'

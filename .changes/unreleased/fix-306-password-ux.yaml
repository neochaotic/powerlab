kind: Fixed
body: 'Password UX during onboarding (#306) — fixed off-by-one where the UI guard
  rejected `< 5` chars and the backend rejected `< 6`, surfacing the resulting
  validation failure as a generic "Failed to initialize the system" message. Both
  surfaces now agree on a minimum of 8 characters (locked by the new
  `MinPasswordLen` constant in `backend/user-service/route/v1/password.go` + the
  `MIN_PASSWORD_LEN` constant in SetupWizard.svelte; regression tests on each side
  pin the value). Backend error codes (PWD_IS_TOO_SIMPLE / KEY_NOT_EXIST /
  USER_EXIST) now map to specific i18n keys (`error.passTooShortBackend`,
  `error.setupKeyExpired`, `error.userExists`) in en/pt-BR/es, so the user sees
  a meaningful message instead of "check the backend logs". Helper text under the
  password input shows the rule upfront ("Mínimo 8 caracteres") and turns emerald
  when the floor is met; a checkmark icon appears inside the input. The Finish
  button is disabled until both gates pass (length + match) instead of only when
  fields are empty.'

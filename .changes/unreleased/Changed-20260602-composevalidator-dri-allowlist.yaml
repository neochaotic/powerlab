kind: Changed
body: >-
  composevalidator now allows `/dev/dri` device passthrough (the standard
  Intel/AMD/Pi VAAPI + V4L2-M2M HW transcode surface) for agent-installed
  apps. This unblocks catalog apps like jellyfin, emby, and frigate that
  ship with `devices: [/dev/dri:/dev/dri]` — previously agent-install
  rejected them while the UI install path accepted them, an
  inconsistency the Batch B end-to-end test flagged. All other `/dev/*`
  paths (nvidia raw, kmem, sda, ttyUSB*, …) stay rejected; widening the
  allowlist is a per-device decision with its own ADR.
time: 2026-06-02T01:30:00.000000-03:00

kind: Added
body: 'powerlab-mcp tools batch 2 — restart_app (ADR-0046 reversible side-effect tier). Cycles every container of one installed PowerLab app via a PUT to app-management''s /v2/app_management/compose/{id}/status with body ''"restart"'' (the spec''s enum encoding). Not gated on EnableDestructiveTools because the blast radius is bounded — containers go down briefly then come back up, no data loss, app ends in the same state. Description leads with "SIDE EFFECT" so Claude Desktop / Code surface the marker in the tool-use prompt. coreproxy gained RequestFrom(method, service, path, token, body, contentType) — verb-and-body capable for the write-class tools landing in ADR-0046 batches 2 + 3; GetFrom now thin-wraps it (backwards compat for every existing call site). Architecture note: MCP calls app-management direct via coreproxy bypassing the gateway, so the gateway-written audit.jsonl does NOT capture MCP-driven restarts. Full audit correlation lands with the MCP audit-recorder dogfood (ADR-0034 deferred item) — until then the agent''s action trail is in journal://mcp. 8 new tests: RequestFrom round-trips verb+body+content-type+UA; non-2xx surfaces with verb in Detail; GetFrom backwards compat; tool advertised; tool description carries SIDE EFFECT class; happy-path PUTs the exact wire shape app-management expects (verb + path + Content-Type + body verbatim); 404 surfaces as apps_status_404 + IsError; app-management down surfaces apps_unavailable + IsError; invalid ids (empty, path-traversal, dotted, query-shaped) rejected at the tool layer before reaching the proxy.'

kind: Added
body: >-
  New `generate_artifact` MCP Tool gives agents a propose-then-review path
  for drafts (compose YAML, shell scripts, configs, markdown). The agent
  submits draft content + kind; the Tool runs the per-kind validator (today:
  composevalidator deny-list for compose-yaml) and returns a structured
  envelope the agent's UI can surface for operator approval. Nothing is
  persisted, nothing is executed — `install_app` remains the only mutation
  path. Pre-fix the agent had no way to propose a draft for review: chat
  prints skip the deny-list validator, install_app runs immediately. (P1.6
  from 2026-05-31 MCP-only chat-mode test.)
time: 2026-06-01T13:00:00.000000-03:00

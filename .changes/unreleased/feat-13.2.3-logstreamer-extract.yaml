kind: Changed
body: 'Extract install log display into reusable `LogStreamer.svelte`
  (Sprint 13.2.3, #252) — single source of truth for the live install-log
  pre with auto-scroll, scroll-pause-on-manual-scroll, and label header.
  Wired into `routes/apps/+page.svelte` Community Install modal.
  `routes/apps/new/+page.svelte` (Custom App) keeps its bespoke
  terminal-style display for now; future Sprint 14 PR can swap it for
  LogStreamer if visual parity is wanted. 7 unit tests cover rendering,
  empty logs, custom label, autoscroll-on-by-default, pause-on-scroll-up,
  resume-on-scroll-to-bottom, and heightClass prop forwarding. Also
  drops the MinimizeBanner pill — the launchpad InstallingTile ghost tile
  from Sprint 13.2.2 (#251) covers that role now; less visual noise and
  one place to look for in-flight installs.'
custom:

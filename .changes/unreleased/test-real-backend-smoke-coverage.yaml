kind: Internal
body: >-
  Real-backend Playwright smoke coverage for 5 golden-path user
  journeys. Mocked specs (page.route()) prove the UI renders given
  fake API responses; these specs prove the actual gateway + the
  actual backend services produce what the UI expects. Bug class
  this catches: v0.6.7 SSE buffering, v0.6.12 audit endpoints
  unreachable, v0.6.13 SSE Gzip stripping — all of which had green
  mocked CI runs. Specs (skip-default unless POWERLAB_E2E_BASE
  is set): login + session restore (3 cases), install → SSE stream
  → finalize → uninstall round-trip with a unique alpine fixture
  (1 case, cleans up after itself), Logs viewer endpoints + path-
  traversal hardening verified against live data (4 cases). Audit
  pane real-backend already shipped Sprint 18; Custom App YAML
  upload covered transitively by the install-uninstall spec which
  uses the same POST + YAML path.

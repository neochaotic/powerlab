kind: Added
body: 'powerlab-mcp tools batch 3 — install_app + uninstall_app (ADR-0046 destructive tier), gated on the new EnableDestructiveTools mcp.conf knob (default false). install_app runs composevalidator.Validate against the proposed compose YAML BEFORE forwarding to app-management — if any ADR-0046 §4 deny-list pattern trips, the upstream is never called and the agent reads a structured violations payload. Supports dry_run=true (forwards the same flag to app-management for upstream-side syntax + image policy validation). uninstall_app DELETEs /v2/app_management/compose/{id}. Both tools'' descriptions lead with "DESTRUCTIVE" so Claude clients surface the marker in the tool-use prompt. registerDestructiveTools is only called when rc.enableDestructiveTools is true — when false the tools are NOT registered at all (don''t appear in tools/list; agent has no way to call them). The opt-in is documented as the operator''s explicit threat-model consent in mcp.conf.sample. ADR-0046 originally named prune_orphans in this batch; it''s deferred to #619 because no matching app-management HTTP endpoint exists today (only the boot-time MigrateOrphanCuratedApps internal migration). 10 new tests: gate (NOT advertised when flag false / advertised + DESTRUCTIVE marker when true), install_app (validator-rejects-before-reaching-upstream / valid YAML POSTs with Content-Type application/yaml verbatim body / dry_run query param forwarded / required compose_yaml validation), uninstall_app (DELETE wire shape / invalid id rejection at tool layer). config Load tests pin truthy spellings + default-false safety. Regression test in scripts/check-package-linux-powerlab-mcp_test.sh locks the EnableDestructiveTools = false sample.'
time: 2026-05-28T23:30:00Z

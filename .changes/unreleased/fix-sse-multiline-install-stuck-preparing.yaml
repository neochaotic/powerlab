kind: Fixed
body: 'Install modal no longer sits on "Preparing…" forever; launchpad
  ghost tile no longer stays on the indeterminate spinner. Root
  cause was an SSE protocol violation in the install-log task
  service that has existed since v0.1.0 (commit d8c1214,
  2026-05-07). `Task.Subscribe()` replayed the entire accumulated
  log buffer as a single channel message; the SSE route handler
  then wrote it as `data: <multi-line>\n\n`. Per HTML5 EventSource
  spec, any line inside a `data:` block that does not start with a
  known field name (`data:`, `event:`, `id:`, `retry:`) is silently
  dropped. Result: the browser only saw the first line and lost
  every `Phase 1/3:`, `Phase 2/3:`, `Phase 3/3:` marker thereafter.
  The UI''s InstallProgressBar (#329, v0.6.6) explicitly gates the
  determinate progress bar on a `currentPhase` parsed from those
  markers — without them it stayed on the indeterminate Preparing
  state forever, and the launchpad ghost tile (#330) stayed on its
  spinner forever for the same reason. Fix: `Task.Write()` and
  `Task.Subscribe()` now split content on `\n` and emit one line per
  channel message (matching the SSE protocol contract one event =
  one line). Empty lines suppressed. Trailing partial line (no `\n`)
  still delivered. 9 regression tests in
  `backend/app-management/service/task_test.go` lock the channel
  contract (Subscribe catch-up split, Write split, trailing
  partial, empty-line skip, Finish closes subscribers, backpressure
  non-blocking, concurrent subscribers see same stream). Verified
  on user''s box with `curl -sN` against `/v2/app_management/compose/task/<id>/logs`
  — every line now carries its own `data:` prefix and `\n\n`
  terminator.'

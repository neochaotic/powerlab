kind: Added
body: >-
  Real-backend Playwright smoke harness in ``ui/tests/helpers/real-backend.ts``.
  ``realBackendTest`` is a ``test`` clone that auto-skips every test
  when ``POWERLAB_E2E_BASE`` is unset; with the env var pointing at a
  running gateway (e.g. ``http://192.168.18.86:8765``), specs hit
  the actual backend. Companion helpers: ``loginAndGetToken``,
  ``loginIntoPage`` (with session-level cache to avoid login
  rate-limit), and ``REAL_BACKEND_BASE`` for absolute-URL ergonomics.
  Bug class targeted: mock-driven Playwright specs prove the UI
  renders given a fixed shape but DON'T prove the endpoint exists.
  Production v0.6.12 cut surfaced exactly this gap — audit endpoints
  unreachable from the public port while 19/19 mocked specs were
  green. Example spec ``audit-pane.smoke.spec.ts`` demonstrates the
  pattern and asserts content-type vs HTML fallback.

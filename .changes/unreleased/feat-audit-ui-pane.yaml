kind: Added
body: 'Settings → Audit pane (Sprint 16 #357 B1f). Surfaces the
  audit log recorded by the gateway middleware: who hit what
  endpoint, when, with which status, from which IP. Stats card
  shows row count, oldest/newest timestamps, and on-disk file
  size. Table renders newest-first with status-color coding
  (green 2xx, blue 3xx, amber 4xx, red 5xx). New ``audit.ts`` API
  module wraps ``getAuditRecent(opts)`` and ``getAuditStats()``,
  with 7 contract tests pinning the wire shape against the
  backend. Pane component test (5 cases) covers stats render,
  empty state, error banner, 401 suppression (handled by C3
  centrally), and nullable user_id/username rendering. Sidebar
  gets a new "Audit" entry between Security and About. Total
  vitest after this slice: 524/525.'

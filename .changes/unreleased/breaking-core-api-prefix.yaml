kind: Changed
body: '**BREAKING (wire format).** The Core service prefix moves
  from ``/v2/casaos`` → ``/v2/powerlab-core`` (#252 audit follow-up).
  External clients that called ``/v2/casaos/health/*`` or
  ``/v2/casaos/file/upload`` must update the prefix. The PowerLab
  UI in this release already calls the new path. The embedded
  OpenAPI moved too: ``backend/core/api/casaos/openapi.yaml`` →
  ``backend/core/api/core/openapi.yaml``; the generated Go
  package name went from ``codegen.casaos_api.go`` →
  ``codegen.core_api.go``. Backend route registration is driven
  from the YAML ``servers[0].url`` field, so the gateway picks up
  the new prefix automatically at startup. No flag, no fallback —
  the legacy ``/v2/casaos`` prefix returns 404.'
custom:
  Issue: "252"

kind: Added
body: 'cmd/smoke now exercises the MCP tool surface alongside the resource surface — probeAndCallTools reads tools/list and asserts every advertised tool''s Description carries an explicit side-effect class marker (READ ONLY / SIDE EFFECT / DESTRUCTIVE) per ADR-0046 §1; verifies the unconditional tools (journal_search, check_disk_free, restart_app) are advertised; tolerates install_app + uninstall_app being either present-and-DESTRUCTIVE-marked (when EnableDestructiveTools=true) or absent (the default-off gate). The two read-only tools are driven end-to-end with real arguments and their typed outputs validated: journal_search against unit=gateway returns an entries array with the right field shape (degraded box surfaces a WARN, not a hard fail — the tool wiring is what matters); check_disk_free against / asserts used+available==total, 0<=used_percent<=100, total>0. probeFirstOpenAPISpec reads docs://api dynamically, picks the first staged service, and validates its OpenAPI spec shape (starts with openapi:/swagger:, > 200 bytes); an empty manifest surfaces as WARN (Mac dev / pre-install — wire-up fine, staging not run) rather than a failure. decodeStructured helper round-trips StructuredContent through JSON so every typed-output check stays one call site. Live-verified on macOS: 3 tools advertised + gate respected for install_app/uninstall_app; check_disk_free / reports 71.5% used / 134 GiB available; system://gpu returns Apple M5 38% util.'

kind: Fixed
body: 'CasaOS-curated apps with `scheme: https` (crafty, mineos-node,
  netbird, obsidian, openclaw, unifi-network-application) and the
  openclaw-specific `?token=casaos` legacy auth-proxy artifact now
  open correctly from the launchpad (#244, Sprint 13.4). The
  launchpad''s `openApp()` previously hard-coded `http://` ignoring
  the catalog''s `scheme:` field, so the 6 HTTPS-serving apps opened
  blank tabs (browser hit the right port over the wrong protocol).
  And openclaw''s catalog metadata carries `index: ?token=casaos` —
  a stray query string from CasaOS''s pre-fork token-aware proxy
  that PowerLab doesn''t replicate; passing it through just left the
  underlying app with a token query it didn''t know what to do with.
  Fix: extract URL construction into pure
  `buildAppURL(hostname, storeInfo)` in `$lib/utils/app-url.ts`,
  honour `scheme:`, strip the literal `?token=casaos`, preserve
  other `index:` values (paths/anchors). 8 unit tests cover the
  full matrix.'
custom:
  Issue: "244"

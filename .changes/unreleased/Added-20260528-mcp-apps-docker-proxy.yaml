kind: Added
body: 'powerlab-mcp apps://* + docker://logs/{id} implementation per ADR-0045 — storage-agnostic thin proxies to app-management''s HTTP /v2/ API. coreproxy.Client generalised to multi-service registration with per-service URL caching (core via casaos.url, apps via app-management.url); error codes follow <service>_unavailable / <service>_status_NNN so the agent pattern-matches uniformly across upstreams. Resources shipped: apps://schema (discovery), apps://list, apps://state/{id} + four sub-templates (containers/health/stats/disk), docker://logs/{id} (proxied through ComposeAppLogs so MCP NEVER accesses the Docker socket — ADR-0045 win #2). powerlab-mcp.service gains Wants=powerlab-app-management.service (soft dep — MCP still boots when app-management is down; resources serve the canonical apps_unavailable payload). resources/list now advertises 12 resources. Smoke client extended: dispatch covers apps://* + docker://* via the same assertProxiedPayload (generalised isDegradedCode helper recognises any <service>_unavailable / _status_ shape uniformly); assertSchemaPayload relaxed to accept a "resources" routing map (proxy schemas — field shapes live in docs://api/<service>) alongside fields / fields_*. Legacy Client.Get and Client.ResolveCore wrappers removed; all callers migrated to GetFrom(ctx, ServiceCore, ...) and Resolve(ServiceCore). Deadcode clean. The architectural promise locked: when PowerLab migrates from SQLite to PostgreSQL, MCP needs zero changes.'

kind: Fixed
body: 'Forking an app into a Custom App no longer surfaces
  "[object Object]" in the volumes (and devices) form section
  when the upstream compose used the long-form spec
  (`{type: bind, source: ..., target: ...}` rather than the
  short `host:container` string). syncYamlToForm now handles
  both shapes — long-form object → reads .source/.target;
  short-form string → existing split-on-colon. Same dual-form
  handling on devices. Issue #332. Locked by 2 regression tests
  in fork-volume-shape.test.ts.'
custom:
  Issue: "332"

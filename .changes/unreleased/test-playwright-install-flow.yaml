kind: Added
body: 'Playwright E2E (`install-flow.spec.ts`) for the Custom App
  install flow (#344). Locks the v0.6.7 → v0.6.8 bug class:
  install modal stuck on "Preparing" because of (1) SSE multi-line
  events silently dropped, (2) channel-never-closed leaving
  ``event: end`` unsent, and (3) ``effect_update_depth_exceeded``
  loop in the InstallState mirror. The spec mocks POST deploy,
  fulfills a multi-event SSE body, polls the installed-app list,
  asserts the InstallModal reaches its Success terminal, and
  treats any ``effect_update_depth_exceeded`` console error as a
  hard fail. Mandatory pre-tag gate per the release coverage rule.'
custom:
  Issue: "344"

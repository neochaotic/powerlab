kind: Fixed
body: >-
  Activepieces is reachable again (#385). The catalog's docker-compose
  pointed the app at ``activepieces_db_1`` and ``activepieces_redis_1``
  — the legacy docker-compose v1 hostname convention. Docker Compose
  v2 (what PowerLab ships) creates containers with **hyphens**
  (``activepieces-db-1``), so the underscored hostnames never resolved
  and the app container crashed in a loop with
  ``getaddrinfo ENOTFOUND activepieces_redis_1``. Tile click "did
  nothing" because the backend port was closed. Fix uses the service-
  name network alias (``db``, ``redis``) which is portable across
  Compose v1/v2 and survives project-name changes. A catalog-wide
  sweep of 66 other apps with the same bug class is tracked
  separately in #402 (Sprint 20 PR 4).
custom:
  Issue: "385"

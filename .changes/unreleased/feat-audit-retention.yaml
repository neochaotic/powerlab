kind: Added
body: 'Audit retention runner (Sprint 16 #357 B1d). Periodic
  goroutine that prunes the audit DB to bound disk usage per
  ADR-0033. Two limits applied per cycle: MaxAge (default 30
  days) drops rows older than now-MaxAge; MaxRows (default
  disabled, 0) caps row count and drops oldest first when over.
  Default Interval 1h. Calls ``PRAGMA wal_checkpoint(TRUNCATE)``
  after each prune so disk pages are reclaimed without operator
  action (suppressed by SkipWALCheckpoint for tests that inspect
  WAL state). ``RunOnce(ctx)`` exposed for tests + future
  operator action. ``Close()`` idempotent + drain-safe like
  Recorder. 6 tests: age-only, row-cap-only, no-op, goroutine
  fires on interval, Close idempotency, defaults applied. All
  race-clean.'

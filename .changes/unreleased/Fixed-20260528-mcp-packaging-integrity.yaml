kind: Fixed
body: 'powerlab-mcp packaging integrity (ADR-0044 follow-up to #609). The hybrid-architecture foundation merged in #609 had five integrity gaps that would have left features shipped-but-broken in production: (1) package-linux.sh did not stage the OpenAPI specs so docs://api returned an empty manifest on a real install; (2) install.sh did not create /usr/share/powerlab/openapi/ or copy specs into it; (3) mcp.conf.sample did not document the new OpenAPIDir + SystemdSystemDir keys so operators could not discover them; (4) powerlab-mcp.service did not soft-depend on powerlab-core.service even though ADR-0044 promised it; (5) cmd/smoke did not probe system://utilization at all, so a future regression breaking the proxy pattern would have shipped silently. This PR closes all five. Also drops a left-over dead _docsTestImport function. Regression test check-package-linux-powerlab-mcp_test.sh extended with 6 new assertions covering each gap. Smoke client gains assertProxiedPayload — treats core_unavailable as WARN with operator guidance ("audit + journal still readable"), real upstream payload as PASS, missing fallback hint as FAIL.'

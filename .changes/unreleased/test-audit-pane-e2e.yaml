kind: Added
body: 'Playwright E2E for the AuditPane (Sprint 16 #357 B1f
  follow-on). Mocks ``/v1/audit/recent`` + ``/v1/audit/stats``
  with fixture rows (one authenticated, one loopback with null
  user) and asserts: stats card row count formats with
  ``toLocaleString``, table renders both rows, status colors
  apply (200/401), the literal ``loopback`` sentinel survives
  the round-trip, the em-dash null fallback renders, and zero
  console errors fire during render. A second case stubs an
  empty backend and asserts the "no audit records yet" empty
  state. 19/19 Playwright suite green.'
custom:

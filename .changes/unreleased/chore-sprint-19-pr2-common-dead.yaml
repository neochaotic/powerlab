kind: Internal
body: >-
  Remove 7 dead packages from ``backend/common/`` per Sprint 19 PR 2/5
  (~1,950 LOC prod + ~216 LOC test): ``codegen/mod_management`` (1,335
  LOC, generated CasaOS plugin SDK with zero importers), ``utils/ssh``
  (402 LOC, weak SSH helper that ``InsecureIgnoreHostKey``'d), ``utils/
  version`` (333+173 LOC, marker-file pattern captured in ADR-0036
  before deletion), ``pkg/mod_management`` (158+43 LOC, only consumer
  of ``codegen/mod_management``), ``middleware`` (23 LOC, CORS helper
  never adopted — duplication tracked separately as #391),
  ``utils/idevice`` (20 LOC, trivial wrapper), ``model/notify``
  (12 LOC, superseded by socket.io + Toast). ``go mod tidy`` drops 6
  direct + 2 indirect transitive dependencies: ``gorilla/websocket``,
  ``mattn/go-sqlite3``, ``oapi-codegen/runtime``, ``sirupsen/logrus``,
  ``golang.org/x/crypto``, ``gopkg.in/ini.v1`` (+ ``go-jsonmerge``,
  ``google/uuid``). Grep-proof captured in PR body; race-detector
  green across all 7 services that import ``common``.

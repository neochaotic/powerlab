kind: Fixed
body: 'powerlab-mcp: audittail no longer OOMs the service on a large audit log. The original implementation read the WHOLE audit.jsonl into a single []byte before scanning — a 500 MiB audit log (a real-life scenario on a long-running chatty box) drove ~2.8 GiB of RSS during a single audit:// read, which would OOM a Pi 4 / 4-8 GiB box. Recent + ByCorrelation now stream the file via bufio.Scanner with a ring buffer of the requested limit, so peak memory scales with the limit (max 1000 records, a few hundred KiB) regardless of file size. Adversarial regression test TestRecent_MemoryBoundOnLargeFile synthesises a 200 MiB audit log and asserts heap delta stays under 50 MiB (was ~600 MiB+ with the old code). Plus: audit://schema completeness — ts_us / query / kind fields were absent from the schema doc despite being in every record (operators + agents reading the schema would have missed three fields); now documented with the same rigor as the rest. Plus: cmd/smoke gains per-resource data-quality assertions (audit ts must be RFC 3339, status in HTTP range, method a known verb, remote_ip non-empty; system metrics shape locked field-by-field). Smoke now fails when a future regression breaks payload shape, not just when a read errors. Minor findings filed: #606 (body-limit returns 400 not 413) and #607 (/version info disclosure).'

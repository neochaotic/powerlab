kind: Fixed
body: >-
  Install modal SSE log stream + phase progress bar are live again.
  Two stacked bugs in the gateway → app-management response chain
  were buffering ``text/event-stream`` chunks until the connection
  closed: (1) the audit-middleware response-writer wrapper did
  not forward ``Flush()`` / ``Hijack()`` to the underlying writer,
  and (2) the Echo ``Gzip()`` middleware on the app-management
  v2 router compressed every response — including SSE — into a
  deflate stream that batched bytes before emitting. Browsers
  always send ``Accept-Encoding: gzip``, so the second bug hit
  every real install; ``curl`` without that header (and
  Playwright's ``page.route()`` mocks) silently masked it. Fix
  forwards Flusher/Hijacker through the audit wrapper and adds
  a ``GzipWithConfig{Skipper}`` that bypasses any path ending
  in ``/logs``. Adds ``scripts/check-sse-not-gzipped.sh`` as a
  pre-tag release gate so this class of regression fails the
  acceptance pass instead of shipping.

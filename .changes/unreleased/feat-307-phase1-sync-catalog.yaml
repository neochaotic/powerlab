kind: Internal
body: 'Umbrel-catalog sync pipeline — Phase 1 (#307) — new `backend/sync-catalog/`
  binary clones the public Umbrel App Store catalog and emits PowerLab-native
  `appfile.json` per allowed app via a clean-room transform (ADR-0024). Four-tier
  filter (Tier 1 hard-reject `getumbrel/*` images + cross-app sibling env vars;
  Tier 2 soft-reject Bitcoin/Lightning categories by default; Tier 4 allow
  everything else). 23 unit tests; real-world dry-run against 330 upstream apps
  produces 241 allow / 44 hard-reject / 45 soft-reject / 0 parse-errors. Each
  emitted appfile carries a `source` provenance block (catalog, upstream commit,
  upstream path, transform version, synced_at) — answers the "debug origem"
  requirement. Icon URL is a pass-through to upstream
  `getumbrel.github.io/umbrel-apps-gallery/<id>/icon.svg`; descriptions are
  fetched from each app''s OWN upstream README (the app maintainer''s OSS-licensed
  content, not Umbrel''s curated description), with optional
  `description-powerlab.md` maintainer override.'

kind: Added
body: 'Sprint 14 Phase 1 foundation — `backend/logs-cli/` module
  with journalctl entry parser + ANSI-aware text/JSON formatter
  (ADR-0027). Foundation for the `powerlab-logs` CLI binary that
  surfaces systemd journal + Docker container + install/upgrade
  logs from /usr/bin. Parser handles plain-text MESSAGE, slog
  structured records, malformed timestamps, syslog PRIORITY
  mapping, missing fields. Formatter emits ANSI-colored lines on
  TTY (fatal/error/warn/info/debug) and plain JSON when --json
  flag is set. 100% test coverage on the foundation. Subcommands
  (journal/app/install/audit) + --follow flag land in follow-up
  commits on this branch.'
custom:
  Issue: "150"

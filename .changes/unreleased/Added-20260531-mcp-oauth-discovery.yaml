kind: Added
body: >-
  powerlab-mcp now serves OAuth 2.1 discovery (RFC 9728 / RFC 8414 / RFC 7591
  /.well-known endpoints) plus a minimal authorization-code + PKCE-S256 flow
  so standard MCP clients (Claude Desktop via mcp-remote, Claude Code's HTTP
  transport, the Anthropic MCP SDK) can complete the 2025-03-26-spec
  handshake instead of aborting on the prior 404. The underlying auth model
  is unchanged — loopback callers still bypass per ADR-0034, LAN callers
  still need a real user-service JWT — but the discovery façade lets agents
  written to spec reach `/mcp` at all.
time: 2026-05-31T22:51:00.000000-03:00

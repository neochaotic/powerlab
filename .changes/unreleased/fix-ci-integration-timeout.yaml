kind: Internal
body: >-
  Backend integration CI job no longer falsely times out on cold
  runners (#373). The 2-minute test timeout was tight enough that
  race-detector overhead + Docker daemon cold-start could push past
  it on a fresh GitHub Actions runner; v0.6.12 release SHA hit
  exactly that, and the same SHA on main repeated the failure
  while every other CI job stayed green. Two changes: (a) bump the
  ``go test -timeout`` from 2m → 5m (it's a safety net against
  runner-state pathologies, not a budget — the tests themselves
  run in seconds), and (b) add a "Warm Docker daemon" step that
  pulls ``hello-world`` before the test runs, so containerd is
  already initialised by the time the first test call hits the
  socket. Closes #373.
custom:
  Issue: "373"

kind: Added
body: 'New ``backend/common/utils/audit/`` package: async audit
  recorder with SQLite backing store (Sprint 16 #357 / ADR-0033
  implementation step B1a). Pure-Go SQLite driver
  (``modernc.org/sqlite``) — no CGO. ``OpenDB(path)`` creates the
  schema (one table, 2 indexes) idempotently with WAL journaling.
  ``Recorder`` exposes a non-blocking ``Submit()`` on the hot path
  — channel-full drops oldest with an atomic counter, NEVER blocks
  the request. Writer goroutine batches up to 50 rows per
  transaction with a 200ms max-latency window. ``PruneByAge`` and
  ``PruneToMaxRows`` drive the hourly retention goroutine (wired
  in a follow-up step). 7-case test suite covers schema migration
  idempotency, drain-to-DB, drop-oldest backpressure, age-based
  prune, row-count-based prune, and the canonical ``loopback``
  sentinel for RemoteIP. Race-detector clean. Foundation only —
  Echo middleware + service wiring + read endpoints + Settings UI
  come in B1b/B1c/B1d/B1e.'

kind: Changed
body: >-
  Audit storage migrated from per-service SQLite to JSONL + in-memory
  ring buffer (per ADR-0035). The recorder writes
  ``/var/log/powerlab/audit.jsonl`` (rotated by lumberjack into
  ``.1.gz``, ``.2.gz``, …); the UI hot path is served from a 1000-record
  ring buffer kept in process. Removes ``modernc.org/sqlite`` from
  ``backend/common`` — every other backend's ``go.sum`` is freed from
  the transitive weight that broke CI on PR #362. Same
  ``/v1/audit/recent`` and ``/v1/audit/stats`` API surface, now mounted
  on the gateway's PUBLIC mux with stdlib JWT validation (mirrors Echo
  loopback-skip behaviour) — fixes the bug where the AuditPane could
  not load any data in the browser because the endpoints lived only
  on the management port. Stdlib audit middleware also captures
  end-user traffic (the original Sprint 16 scope limitation
  documented in B1c). Wire shape changed: snake_case JSON
  (``ts``, ``ts_us``, ``latency_us``, ``user_id``, ``username``,
  ``remote_ip``, ``request_id``) replaces the implicit PascalCase
  emitted by tagless ``encoding/json``. Operators on SSH gain
  ``tail -F /var/log/powerlab/audit.jsonl | jq``. Existing
  ``audit.db`` files on disk are ignored — history starts fresh
  after upgrade (homelab audit is not regulatorily binding).
custom:
  Issue: "363"

kind: Fixed
body: 'In-UI upgrade button no longer 401s. ``upgradeProgress.start()`` 
  was calling ``fetch()`` directly against ``/v1/powerlab-update/install``,
  bypassing the api client and never attaching the JWT Authorization
  header — every click returned ``HTTP 401 Unauthorized`` from the
  gateway. Routed through ``api.post`` so the header is injected
  automatically. Locked by a contract regression test that asserts
  the Authorization header is present on the POST. Bug landed in
  v0.6.7 (PR #339) and persisted through v0.6.8 + v0.6.9.'
custom:
  Issue: "353"

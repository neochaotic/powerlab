kind: Fixed
body: 'Install progress bar now appears immediately when install starts,
  not late after first `Phase N/M` SSE marker arrives — addresses
  v0.6.5 user feedback "a barra de loading aparece somente no final
  nao no inicio da instalacao". Root cause: the determinate progress
  bar was gated by `currentPhase` (parsed from SSE log markers) being
  truthy; during the HTTP POST + early SSE seconds there was no
  marker yet, so the bar didn''t render at all — by the time the
  first marker landed, the install was often already at 60%+, giving
  the "bar shows at the end" impression. Fix: extracted into
  `lib/components/apps/InstallProgressBar.svelte` with explicit
  indeterminate vs determinate states. Indeterminate (animated
  emerald stripe sliding left→right via the new
  `install-progress-indeterminate` CSS keyframe) shows from
  `installing` onwards with a "Preparing…" label; switches to
  determinate the moment `currentPhase` arrives. 7 unit tests lock
  the state machine.'

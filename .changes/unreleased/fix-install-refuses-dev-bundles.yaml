kind: Fixed
body: >-
  The installer (``install.sh`` emitted by
  ``scripts/package-linux.sh``) now refuses to install a tarball
  whose version starts with ``0.0.0-`` (dev / CI / e2e test
  artifacts). Without this gate, a misplaced dev tarball can land
  on a production host and the panel will report a non-release
  version forever — the auto-updater also breaks because the
  comparison logic doesn't recognise ``0.0.0-e2e`` as upgradable.
  Override with ``POWERLAB_ALLOW_DEV_BUILD=1`` for local
  integration testing. A new
  ``scripts/check-install-refuses-dev-bundle_test.sh`` exercises
  the gate against legitimate + dev versions and the override.

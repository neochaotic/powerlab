body: 'godoc: complete coverage of ``backend/common/utils/random``
  package (Sprint 16 #359 — first slice of the godoc 100%
  initiative redo). Adds package-level doc explaining the
  math/rand vs crypto/rand contract, fixes the stale
  ``GetRandomName`` comment on ``Name`` (CasaOS rebrand
  leftover), documents ``String`` (was undocumented), and
  rewrites the deprecation note on ``RandomString`` to follow
  the standard godoc convention (lead with function name).
  Doc-only — no behavior change, all tests still pass, ``go
  vet`` clean. Replaces the rejected ``e8b597f`` AI commit
  which mixed docs with breaking refactors (renamed exported
  funcs, dropped deprecated wrappers, added nolint bypasses).'

kind: Added
body: 'powerlab-mcp Phase 2 foundation per ADR-0044 — hybrid architecture pivot. Audit + journal of PowerLab units stay independent (survive core being down); sysadmin telemetry (planned: system://utilization, disk, network, GPU, apps://, docker://) will be thin proxies to core/app-management endpoints, eliminating ~80% of the duplication the original "isolated MCP" plan was about to ship. This PR lands the foundation: ADR-0044 documenting the pivot; coreproxy package with URL discovery (reads core''s .url file under RuntimePath), 10s URL cache, JWT forwarding, structured core_unavailable errors with fallback hints; docs://api manifest + docs://api/{service} raw OpenAPI YAML for every PowerLab service (Scalar-equivalent surface for agents — agent can self-discover the entire PowerLab API without us hand-coding each endpoint as an MCP tool); journal://units discovery resource so an agent reads available powerlab-*.service stems instead of guessing. Config gains OpenAPIDir + SystemdSystemDir keys; constructor refactored to a resourcesConfig bag so future proxy resources don''t balloon the signature. Path-traversal hardened on docs://api/{service}. 19 new tests across coreproxy, journal/units, server/resources_docs.'

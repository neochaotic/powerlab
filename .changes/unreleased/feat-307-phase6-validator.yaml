kind: Internal
body: 'Umbrel-catalog sync pipeline — Phase 6 (#307) — adds a `sync-catalog --validate-only=<dir>`
  flag that walks `community-catalog/Apps/*/docker-compose.yml` and asserts shape
  invariants without running a sync: file parses as YAML, has top-level `services:`
  + `x-powerlab:`, the `x-powerlab.store_app_id` / `title.en_us` / `source.catalog`
  fields are non-empty, and `x-powerlab.icon` (if present) parses as a URL. Exit 0
  clean / exit 1 with per-rule error lines suitable for CI. 12 unit tests cover
  happy path, empty catalog, missing dir (no-op), malformed YAML, each required
  field missing, multiple errors per app, deterministic ordering. Usable in CI
  to gate weekly sync PRs and locally by maintainers editing description-powerlab.md
  / icon overrides.'

kind: Added
body: >-
  ADR-0035 — proposed migration of audit storage from SQLite to JSONL +
  in-memory ring buffer. Aligns PowerLab audit with Kubernetes / Vault /
  Consul / CloudTrail convention; gives operators ``tail -F | jq`` from
  SSH; simplifies the standalone observability service design (ADR-0034)
  by letting it consume a file rather than open a second SQLite handle.
  Supersedes the storage section of ADR-0033 (middleware shape stays).
  Implementation deferred — Sprint 16 ships SQLite-as-built; migration
  PR lands BEFORE ADR-0034 implementation begins.

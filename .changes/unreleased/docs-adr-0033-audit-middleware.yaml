kind: Added
body: 'ADR-0033 — audit middleware design (Sprint 16 #357 prep).
  Locks the schema (per-service SQLite, 11 columns, 2 indexes),
  retention policy (30d / 50MB whichever first), PII stance
  (full IP by default, toggle for /24 truncation), performance
  contract (async writer, < 20µs middleware overhead, drop-oldest
  on channel pressure), and the /v1/audit/recent + /v1/audit/stats
  read API. Implementation in #357 follows this contract.'

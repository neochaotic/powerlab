kind: Fixed
body: 'Install-time secret substitution for ${APP_SEED}, ${APP_PASSWORD},
  and sibling-app DB credentials (Sprint 13.4.x, #254, refs #307).
  v0.6.5 audit caught 49 apps with literal ${APP_SEED} (NextAuth /
  JWT signing secrets) and 39 with ${APP_PASSWORD} (admin/db
  passwords) in their compose env. The placeholders stayed literal
  in PowerLab → apps either auto-init with the literal string as
  the "secret" (security disaster) or fail on parse. Fix: new
  `service.SubstituteSecrets(yaml, appID, secretsDir)` generates
  per-app random secrets the FIRST install, persists at
  `/var/lib/powerlab/apps/secrets/<id>.env` (mode 0600 in dir 0700),
  and reuses them on every subsequent install — so encrypted user
  data and JWT-signed sessions survive upgrades. Different apps get
  different secrets (compromising one doesn''t compromise all).
  Wired into the `InstallComposeApp` route handler BEFORE compose-go
  parses; best-effort fallback skips substitution silently rather
  than blocking install when the YAML has no top-level `name:` or
  the secrets file is unreadable. 9 unit tests in
  `install_secrets_test.go` cover: no placeholders (no-op),
  generation + 0600 perms, idempotency, same-ref-same-value,
  per-app distinctness, hex length per placeholder kind, sibling
  DB triple, unrelated placeholder preservation, file-delete
  rotation.'
custom:
  Issue: "254"

kind: Fixed
body: >-
  `get_system_health` no longer grades pseudo-filesystems as disk pressure.
  Read-only mounts that are always full by design — Lima's iso9660
  cloud-init seed, Snap squashfs loops, the kernel's tmpfs / proc /
  sysfs — are excluded from the worst-mount computation. Pre-fix a fresh
  Lima box reported `disk: critical (worst mount /mnt/lima-cidata at 100%)`
  while the real ext4 root at 88.7% was below the warn threshold. The
  agent talking to Claude Code spotted the artefact and flagged it on the
  first end-to-end probe of the just-fixed envelope parsing.
time: 2026-06-01T17:30:00.000000-03:00

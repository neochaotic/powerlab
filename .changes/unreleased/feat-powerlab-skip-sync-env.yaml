kind: Added
body: '`POWERLAB_SKIP_SYNC=1` env var on `install.sh` to skip the
  post-install community-catalog refresh. The catalog refresh (#326
  introduced in v0.6.5) `git clone --depth=1`s upstream
  `getumbrel/umbrel-apps` and re-emits the on-disk catalog tree —
  the dominant cost of a v0.6.5+ upgrade (~30–60s on first run; the
  tarball download itself is only ~5 MB / sub-second). The escape
  is useful for air-gapped boxes, fast offline upgrades where the
  bundled catalog is good enough, and CI / packaging tests that
  shouldn''t depend on live upstream state. Documented in
  `docs/UPDATE_MANIFEST.md` under the new "Upgrade duration"
  section; regression-tested in
  `scripts/check-package-linux-sync-catalog_test.sh`.'

kind: Added
body: 'powerlab-mcp first batch of curated tools per ADR-0046 — read-only tier dogfoods the tool-call pattern without risk. journal_search wraps the existing journal:// reader with a literal substring filter + line cap (passes the unit verbatim through canonicalUnit so the agent cannot escape PowerLab scope); check_disk_free wraps syscall.Statfs at any path defaulting to / (returns total/available/used bytes + percent in a typed shape). Both ship with hand-written JSON Schemas (auto-derived from struct tags) and descriptions tuned for LLM ergonomics with the side-effect class explicit ("READ ONLY") so the model surfaces it to the user. Five new tests covering: tools/list advertises both, descriptions carry the side-effect class, journal_search filters correctly + requires unit, check_disk_free returns the shape contract + rejects missing paths with a friendly message. Live-verified against the Mac dev binary: tools/list returns 2 tools; check_disk_free / reports 70.8% used on the host. Deadcode clean. resources/list unchanged (still 12) — tools are a parallel namespace. Future destructive tools (ADR-0046 batch 3) will register from a separate gated path when EnableDestructiveTools lands.'

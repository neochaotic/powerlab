kind: Added
body: 'powerlab-mcp MVP — talk-to-your-homelab surface for AI agents. Read-only resources (system://metrics, journal://, audit://) over the official MCP Streamable HTTP transport, gated by your PowerLab login. Three MVP guardrails ship with it: (1) operator kill-switch `Disabled = true` in /etc/powerlab/mcp.conf — service exits 0 before binding, no systemctl mask needed; (2) dead PIDFile= + Environment=HOME= removed from powerlab-mcp.service (binary doesn''t write a pidfile and doesn''t need HOME); (3) end-to-end smoke client in backend/powerlab-mcp/cmd/smoke that lists + reads every advertised resource via the official Go SDK — usable as a pre-flight before any release cut. Plus: deep architecture documentation at docs/concepts/mcp-server.md (Mermaid topology + auth flow + journey-of-a-read, test recipes for loopback/LAN/Go, Claude Desktop & Cursor & Code wire-up, defense-in-depth matrix, roadmap) and a README "Talk to your homelab" section that positions MCP as a complementary surface, NOT a product pivot. Tests: config TestLoad_DisabledKey (truthy spellings + safety defaults), main_test TestRun_DisabledKillSwitchExitsCleanly (proves run never binds when Disabled), check-package-linux-powerlab-mcp_test.sh extended to lock the Disabled key into mcp.conf.sample and lock PIDFile / Environment=HOME out of the unit.'

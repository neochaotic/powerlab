kind: Changed
body: 'Scaffold Phase 3 + Phase 4 of #150 backend coverage (Sprint 13.5,
  carry from Sprint 11). Phase 3 adds `//go:build integration`-tagged
  Docker tests in `backend/app-management/service/docker_integration_test.go`
  (Ping + ImageList against the real socket) plus a new `backend-integration`
  CI job that runs `go test -tags=integration` after the unit-test job is
  green. Phase 4 adds `//go:build linux && fuse`-tagged scaffold in
  `backend/local-storage/service/fuse_integration_test.go` that imports
  bazil.org/fuse and exercises the mount-option API surface, plus a new
  `backend-fuse` CI job that apt-installs libfuse and runs the tagged tests.
  Deeper end-to-end install + actual fuse mount tests follow in Sprint 14
  once the privileged-runner setup lands; this PR establishes the build-tag
  + CI-gate pattern.'
custom:
  Issue: "150"

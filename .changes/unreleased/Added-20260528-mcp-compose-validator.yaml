kind: Added
body: 'powerlab-mcp composevalidator package — deny-list compose YAML validator per ADR-0046 §4, the prerequisite for the install_app tool (batch 3). Inspects services for: privileged: true (container escape), host namespace sharing (network_mode/pid/ipc/uts/userns_mode: host plus network_mode: container:<id>), dangerous cap_add (SYS_ADMIN, NET_ADMIN, ALL, etc. — case-insensitive, tolerates CAP_ prefix), raw /dev/* device passthrough, and bind mounts to sensitive host paths (/var/run/docker.sock + variants, /proc, /sys, /etc, /root, /var/lib, /var/log, /dev, /boot, library + binary dirs). Returns a typed Result with per-violation Code + Detail + Service so an agent and the operator-facing report read the same shape. Plus: powerlab-mcp-validate CLI (cmd/validate) reads a YAML from path or stdin and reports human-readable text or JSON, exits 0/1/2 — operators can run it standalone before any MCP involvement. 24 tests cover a realistic PowerLab-style happy path, every documented violation (19 negative table-driven cases), invalid YAML, service-less doc, compound violations on one service, per-service offender attribution. Live-verified: malicious compose with privileged: true + network_mode: host correctly flags both. Validator is deny-list-only, not a full compose-spec parser (app-management still validates syntax + image policy); ADR-0046 §4 names it as one layer among many — install_app additionally gates on EnableDestructiveTools opt-in or panel approval flow.'

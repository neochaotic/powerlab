kind: Fixed
body: 'Two install-runtime bugs surfaced by user testing during v0.6.5
  + comprehensive catalog audit (#253, refs #307, #244). (a) gitingest
  rejected browser requests with "Invalid host header" because
  `ALLOWED_HOSTS=${DEVICE_DOMAIN_NAME},${DEVICE_HOSTNAME},${APP_GITINGEST_LOCAL_IPS}`
  stayed literal — fix: substitute these placeholders with `*` in
  env values that are PURELY a comma-separated host list (59 apps
  affected). (b) adventurelog returned "bad request" because
  `ORIGIN="http://${DEVICE_DOMAIN_NAME}:8015"` got my first-pass
  fix turned into `http://*:8015` (invalid URL); refined the
  substitution to skip URL-embedded placeholders entirely —
  install-time substitution (Sprint 14) will handle URL contexts.
  (c) 89 multi-service apps had no `x-powerlab.main` set so the
  backend fell back to "first alphabetical service" — wrong for
  apps like agora (svcs: agora/filebrowser/nginx, real entry is
  `agora`). Fix: emit.go resolves `main` via app_proxy''s APP_HOST
  using the existing extractAppProxyTarget function, with
  deterministic shell-var fallback (sorted, not Go-map-iter
  randomized — caught by audit when agora flipped between
  `filebrowser` and `agora` between sync runs). Full audit
  documented in `docs/audits/community-catalog-integration-audit-2026-05-13.md`.'

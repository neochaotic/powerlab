kind: Fixed
body: 'Chown bind-mount source directories to the container''s
  ``user:`` field during install (#334). Docker auto-creates
  missing host paths as ``root:root``; postgres / mariadb /
  redis images running as non-root then fail ``initdb`` with
  ``Operation not permitted``. Catalog apps such as blinko and
  activepieces (which declare ``user: 1000:1000`` on their db
  services) now reach ``healthy`` on first install instead of
  restart-looping forever.'
custom:
  Issue: "334"

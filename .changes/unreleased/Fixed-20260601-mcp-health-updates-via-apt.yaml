kind: Fixed
body: >-
  `get_system_health` now reports OS-update state correctly. The original
  P1.5 implementation called `coreproxy.GetFrom(ctx, "/v1/sys/updates", ...)`
  but that endpoint does not exist on core — `system://updates` reads
  `apt list --upgradable` output directly via the apt runner in
  resources_system_updates.go. The proxy call therefore failed with 404
  on every Linux host, reporting `updates=unknown` regardless of pending
  package count. Smoke (added in PR #662) caught it on Lima. Fix: wire
  the same `collectUpdates` helper the resource already uses, with a
  testable apt-runner seam so the tests don't depend on the host having
  apt.
time: 2026-06-01T16:00:00.000000-03:00

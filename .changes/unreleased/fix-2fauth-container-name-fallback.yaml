kind: Fixed
body: >-
  Catalog apps that set explicit ``container_name:`` no longer surface
  spurious "Error during start: no container found for project X"
  failures during install. Root cause (#397): docker-compose v2 strips
  the ``com.docker.compose.project`` label from containers with an
  explicit ``container_name`` override. ``compose-go``'s ``Start()``
  filters by that label and reports zero matches even though the
  containers ARE running. The lifecycle now falls back to a name-
  based check via ``projectHasContainers()`` — exact match (the
  ``container_name`` case), hyphen form ``<project>-<svc>-<idx>``
  (compose v2 default), or underscore form ``<project>_<svc>_<idx>``
  (compose v1). 8 unit-test cases pin the matcher including a
  prefix-only false-positive guard (project "blink" must not match
  container "blinko-db-1"). Affects 2fauth, adventurelog (server),
  and any catalog entry with the same pattern.
custom:
  Issue: "397"

kind: Added
body: >-
  Settings → Logs pane: read-only viewer for the .log files under
  ``/var/log/powerlab/``. Shows the last 200 KB of each service's
  stdout (app-management, gateway, user, upgrade, ...) so operators
  can debug a failed install or a routing issue without SSH-ing in.
  Distinct from Settings → Audit, which exposes the HTTP request
  JSONL; this pane exposes raw service output. Two new gateway
  endpoints — ``GET /v1/logs/files`` (list ``.log`` files newest-
  first) and ``GET /v1/logs/files/{name}`` (tail content). Filename
  validated against a strict allowlist before any filesystem access
  (path-traversal hardening). Default tail 200 KB, max 5 MB.
  Rotated archives (``.log.gz``) and live follow are deliberate
  non-goals — separate feature.

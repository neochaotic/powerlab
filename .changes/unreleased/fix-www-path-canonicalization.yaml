kind: Fixed
body: >-
  Gateway's ``-w`` flag default and the systemd unit's ``-w``
  argument now share a single source of truth
  (``constants.DefaultWWWPath``). Previously they diverged: main.go
  defaulted to ``$DefaultDataPath/www`` (= ``/var/lib/powerlab/www``)
  while the systemd unit emitted by ``scripts/package-linux.sh``
  hard-coded ``/usr/share/powerlab/www``. A dev hot-swap or manual
  binary run wrote the UI to the WRONG path; the running gateway
  silently kept serving the stale bundle. The AuditPane
  "disappeared" from the user's view during v0.6.12 verify because
  of this drift. Three new regression tests lock the contract:
  static handler refuses to silently fall back to an alternate
  root, refuses to 2xx for a missing root, and the platform constant
  matches the systemd unit's ``-w`` value on Linux.

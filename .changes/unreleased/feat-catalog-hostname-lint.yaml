kind: Internal
body: >-
  Sprint 20 PR 4a/9 — adds ``scripts/check-catalog-hostnames.sh`` +
  ``Catalog hostnames`` CI job. Scans every
  ``community-catalog/Apps/*/docker-compose.yml`` for the legacy
  docker-compose v1 hostname pattern ``<project>_<service>_<idx>``
  in env-var values and reports findings as PR annotations.
  Discovered during PR 2 investigation: 156 findings across 66
  catalog files — apps point at ``<proj>_<svc>_1`` hostnames but
  docker-compose v2 (what PowerLab ships) creates containers with
  hyphens; the underscored form never resolves. Phase-in: warn-only
  by default (``POWERLAB_CATALOG_LINT_STRICT=0``); flips to strict
  after PR 4b's 66-app sweep lands. Meta-test
  (``check-catalog-hostnames_test.sh``) pins detection on 4 synthetic
  fixtures including the prefix-only false-positive guard. Tracking:
  #402.

kind: Added
body: 'ESLint flat config (``ui/eslint.config.js``) banning raw
  ``fetch()`` calls in stores, routes, components, and the api
  client folder (Sprint 15 #353). Routes through the api client
  at ``$lib/api/client`` so the JWT ``Authorization`` header is
  always injected — closes the bug class that produced the
  v0.6.7 → v0.6.10 upgrade-401 saga (#352). 5 intentional raw-
  fetch callers (the api client itself + 4 public-probe paths)
  are explicitly allow-listed with justification comments. New
  ``npm run lint`` script + ``scripts/check-eslint-fetch-ban_test.sh``
  meta-test asserts the rule fires in both directions (clean main
  passes; contrived violator triggers exactly one error). Wired
  into the Frontend CI job between the manifest-size check and
  svelte-check.'
custom:
  Issue: "353"

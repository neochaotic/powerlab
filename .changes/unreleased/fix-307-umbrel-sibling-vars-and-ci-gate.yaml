kind: Fixed
body: 'Umbrel-catalog import — Phase 7.5 (#307) — extends the volume
  placeholder substitution to catch two more Umbrel-ecosystem variables
  surfaced by the new CI gate. `${APP_<NAME>_DATA_DIR}` (sibling-app
  data dirs — e.g. an app referencing `${APP_LIGHTNING_NODE_DATA_DIR}`)
  and `${UMBREL_ROOT}` (Umbrel installation root, used by apps that
  read from the shared `/data/storage/downloads` tree) now substitute
  to PowerLab paths so the catalog parses. The new
  `production_catalog_test.go` walks every `community-catalog/Apps/<id>/
  docker-compose.yml` in the repo and feeds it through the SAME loader
  BuildCatalog uses at runtime — a CI gate that blocks any release
  carrying a broken catalog. Caught 18 apps that would have shipped
  broken in v0.6.3 (agora, audiobookshelf, bazarr, downtify, duplicati,
  emby, file-browser, home-assistant, jackett, …). Catalog re-emitted
  + verified: 245 apps in `community-catalog/Apps/`, 245/245 parse.'

kind: Added
body: 'Umbrel-catalog wire-up — Phase 4.5 (#307) — registers the local
  `community-catalog/` directory as a third app store source so apps synced by
  the weekly sync workflow show up in the PowerLab catalog UI without further
  configuration. Dev conf (`backend/app-management/app-management.conf`) reads
  `../../community-catalog`; production sample + bundled `install.sh` create
  `/var/lib/powerlab/community-catalog/` and ship pre-bundled apps in the
  release tarball. `community-catalog/.gitkeep` is committed so the dir exists
  before the first sync run. Adds `backend/sync-catalog/sync-catalog` build
  artifact to .gitignore.'
custom:
  Issue: "307"

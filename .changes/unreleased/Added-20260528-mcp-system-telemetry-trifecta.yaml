kind: Added
body: 'powerlab-mcp system telemetry trifecta — system://disk, system://network, system://gpu, plus a system://schema covering the whole namespace. ADR-0044 hybrid pattern: system://disk + system://network thin-proxy core (/v1/sys/disk + /v1/sys/net) so the agent reads the same data the panel dashboard does — including SMART metadata and per-interface state — without us re-implementing /proc parsers. system://gpu imports common/external::GetGPUUtilization directly (same code path as the panel''s GPU widget): Apple Silicon via ioreg, Nvidia via nvidia-smi, "no GPU detected" returns an empty model string rather than an error. system://schema is the agent''s discovery index — describes every resource (independent vs proxied), the field shapes per resource, and the canonical core_unavailable proxy-error shape. Smoke client extended to assert each new resource (proxied: WARN on core_unavailable, fallback hint check; GPU: shape contract + percent in 0..100); assertSchemaPayload relaxed to accept both the single-fields pattern (audit/journal) and the per-resource fields_* pattern (system). resources/list now advertises 10 resources. Live-verified on macOS: GPU detected as Apple M5 (46% util, 538 MiB used).'

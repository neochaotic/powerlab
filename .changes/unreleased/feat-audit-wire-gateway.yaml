kind: Added
body: 'Wire audit pipeline into the gateway service (Sprint 16 #357
  B1c). ``main.go`` initialises ``audit.Service`` at boot under
  ``/var/lib/powerlab/gateway/audit.db`` (persistent — NOT
  ``/run/powerlab`` which is tmpfs); ``fx`` provides it to
  ``ManagementRoute``; the route mounts the echo middleware globally
  (with skipper for ``/ping`` + ``/v1/audit/*``) and registers
  ``/v1/audit/recent`` + ``/v1/audit/stats``. Lifecycle hook drains
  recorder + retention + DB on shutdown. Audit init failure is
  non-fatal (gateway still serves; observability is not a hard
  dependency). Live-verified on .142: ``/var/lib/powerlab/gateway/audit.db``
  created with the right schema. **Scope limitation:** the gateway''s
  public-facing route bundle uses stdlib ``http.ServeMux`` not echo,
  so this slice does NOT yet capture end-user traffic — only
  service-to-gateway internal management calls. Follow-up issue
  filed for a stdlib middleware variant to cover the public side.'
custom:
  Issue: "357"

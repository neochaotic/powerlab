kind: Added
body: 'Playwright E2E (``upgrade-flow.spec.ts``) for the in-UI upgrade
  button (Sprint 15 L2 — follow-up to #344 install-flow). Drives
  Settings → AboutPane, mocks the updater check + install POST +
  version poll, and asserts (a) the install POST carries a non-empty
  ``Authorization`` header — the bug-class signature that caused
  v0.6.7 → v0.6.10 — and (b) no ``effect_update_depth_exceeded``
  console error appears. Sanity-verified by temporarily reverting
  the v0.6.10 ``api.post`` fix: the spec correctly FAILS with raw
  fetch, PASSES with the fix. Mandatory pre-tag gate.'
custom:

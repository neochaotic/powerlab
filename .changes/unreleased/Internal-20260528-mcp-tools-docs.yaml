body: 'docs(mcp): document the Tools surface alongside the existing resources. mcp-server.md gains a Tools section right before Operator controls — three tiers per ADR-0046 (READ ONLY: journal_search, check_disk_free; SIDE EFFECT bounded: restart_app; DESTRUCTIVE gated: install_app, uninstall_app), per-tool reference with input shape + side-effect class + threat-model notes, the install_app layered-defence story (composevalidator deny-list runs FIRST before app-management ever sees the YAML), the standalone powerlab-mcp-validate CLI for pre-validating compose YAML without MCP, the EnableDestructiveTools opt-in flow + threat model, and explicit "what is NOT a tool yet" pointers (prune_orphans waits on app-management endpoint #619; restart_service / read_file deliberately out of scope). Operator-controls section "custom paths" callout grew to mention the new mcp.conf key. Roadmap rewritten: items shipped (3 tools, validator, CLI) removed; pending items focus on what genuinely doesn''t exist yet (panel approval UI, audit recorder dogfood, JWT forwarding, more sysadmin resources). References include ADR-0046. README "Talk to your homelab" section updated: resource bullets unchanged but a Tools subsection added showing all 5 tools by tier, with the destructive flag prominently labelled as default-OFF.'

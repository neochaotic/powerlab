kind: Fixed
body: 'Version-mismatch banner now closeable (X button) and has a
  cache-busted "Forçar atualização" button that adds
  `?powerlab_v=<ts>` to the URL so cache-aggressive proxies and the
  browser cache cannot serve the same stale JS bundle on reload.
  After 2 force-reload attempts that did not resolve the mismatch
  (counter persisted in localStorage), the banner text switches to
  "Bundle desatualizado no servidor" with admin/install.sh guidance
  rather than wheel-spinning. Surfaced post-v0.6.6 cut: the user
  saw "UI v0.3.1 vs Server v0.6.5" because the UI was rebuilt
  locally during the v0.6.6 E2E session without `POWERLAB_VERSION`
  env set, so Vite stamped the bundle with `ui/package.json`
  version which had stayed at 0.3.1 since the v0.3.1 era (commit
  d8c1214, 2026-05-07) — 30+ tags later. Same PR also lands the
  defense-in-depth that prevents the bug class from shipping
  again: L1 (`npm version $VERSION` in scripts/package-linux.sh
  before every build), L2 (CI gate
  `check-ui-package-version-fresh_test.sh` fails when pkg.json
  is older than the latest git tag), L3 (sanity grep of the built
  JS for the version literal in scripts/package-linux.sh that
  aborts the tarball seal if the wrong literal landed). Plus
  `scripts/prepare-release.sh` automates the cut-time
  `changie batch` + `npm version` + staging steps so the
  pkg.json bump cannot be forgotten in the release commit.
  Sandboxed regression test `scripts/prepare-release_test.sh`
  locks the release-auth invariant (script never commits, pushes,
  or tags). 13 unit tests in versionHandshake.test.ts lock the
  new banner state machine (dismiss, forceReload with
  query-param-preserving cache-buster, persistentFailure
  threshold, reloadAttempts counter reset on match). pt-BR / en
  / es i18n updated with the new strings.'

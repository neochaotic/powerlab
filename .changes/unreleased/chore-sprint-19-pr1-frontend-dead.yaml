kind: Internal
body: >-
  Remove 3 dead frontend artefacts (~165 LOC) per the Sprint 19 dead-code
  removal plan (PR 1 of 5): ``ui/src/lib/components/terminal/SshModal.svelte``
  (110 LOC — has existed since v0.1.0, never wired into any route),
  ``ui/src/lib/stores/theme.svelte.ts`` + its test (~50 LOC — exports
  ``useTheme()`` but nobody calls it; the app is hard-coded dark and no
  theme toggle is planned), and ``ui/src/lib/api/index.ts`` (3 LOC barrel
  file with zero importers — every component imports
  ``$lib/api/client`` directly). Grep-proof captured in the PR body
  before delete. vitest 563/563, Playwright 18/18, svelte-check 0/0
  post-delete.

# powerlab-mcp demo config. Baked into ghcr.io/neochaotic/powerlab-mcp-demo
# at /etc/powerlab/mcp.conf. Glama Inspector + the awesome-mcp-servers
# gate run the image with this config — everything is read-only, no
# host docker socket, no destructive tier.
#
# Production install.sh writes a different mcp.conf with EnableDestructiveTools
# decided by the operator; this demo always pins it false.

Disabled = false
ListenAddr = 0.0.0.0:9090

# Service-discovery runtime path is empty in this image — no PowerLab
# core/app-management/gateway are running here. Tools that proxy to
# them (get_system_health for memory/disk/services, install_app for
# the upstream POST) surface a structured "service unavailable" error
# instead of a synthetic value. journal_search returns the classified
# "journald unavailable" error because alpine has no systemd-journald.
RuntimePath = /run/powerlab

AuditDir = /var/log/powerlab
ConceptsDir = /usr/share/powerlab/docs/concepts
CatalogDir = /usr/share/powerlab/catalog
OpenAPIDir = /usr/share/powerlab/openapi
SystemdSystemDir = /etc/systemd/system

# Both opt-in tiers stay off for the demo. This is the security stance
# the operator-opt-in model exists to enforce — Glama Inspector calling
# tools/list sees ONLY the read-only Tool surface; install_app /
# uninstall_app / restart_app / journal://system/auth /
# journal://system/failures are not advertised.
EnableDestructiveTools = false
EnableSensitiveTier = false

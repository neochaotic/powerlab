name: multi-svc-test
services:
  web:
    image: nginx:1.27
    restart: unless-stopped
    ports:
      - 8088:80
    volumes:
      - /DATA/PowerLabAppData/multi-svc-test/web:/usr/share/nginx/html:ro
  worker:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - /DATA/PowerLabAppData/multi-svc-test/redis:/data
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=changeme
    volumes:
      - /DATA/PowerLabAppData/multi-svc-test/db:/var/lib/postgresql/data
version: "3.7"


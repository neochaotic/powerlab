[common]
RuntimePath = ../runtime

[app]
LogPath = ../logs
LogSaveName = app-management
LogFileExt = log
AppStorePath = ../data/appstore
AppsPath = ../data/apps

[server]
appstore = https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/store/main.zip
appstore = https://github.com/bigbeartechworld/big-bear-casaos/archive/refs/heads/master.zip
# Local PowerLab community catalog — populated weekly by sync-umbrel-catalog
# (see docs/architecture/community-catalog.md). Absolute path resolved at
# runtime to <repo>/community-catalog when running from this dev conf.
appstore = ../../community-catalog
[common]
RuntimePath = ../runtime

[app]
LogPath = ../logs
LogSaveName = app-management
LogFileExt = log
AppStorePath = ../data/appstore
AppsPath = ../data/apps

[server]
# ADR-0038: only the local PowerLab community catalog is enabled by
# default. External community catalogs (CasaOS upstream, big-bear,
# Umbrel-via-toggle) live behind operator opt-in to bound the trust
# surface — they're unaudited community content. CasaOS jsdelivr and
# big-bear zips, which were seeded here historically, are stripped at
# startup by the legacy-store migration in pkg/config/init.go.
appstore = ../../community-catalog
openapi: 3.0.3

info:
  title: PowerLab Gateway API
  version: v1
  description: |-
    <p align="center"><img src="/docs/logo.svg" width="100" alt="PowerLab"></p>
    
    PowerLab — self-hosted home server panel. This API covers request routing, mDNS announcement, and TLS termination for the panel.
    
    Source: [github.com/neochaotic/powerlab](https://github.com/neochaotic/powerlab).
servers:
  - url: /v1/gateway

tags:
  - name: USB methods
    description: |-
      USB methods

security:
  - access_token: []

paths:
  /port:
    put:
      summary: Set gateway port
      description: |-
        Set gateway port
      operationId: setGatewayPort
      tags:
        - Gateway methods
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                port:
                  type: string
                  description: Gateway port
                  example: "80"
      responses:
        "200":
          $ref: "#/components/responses/ResponseOK"
    get:
      summary: Get gateway port
      description: |-
        Get gateway port
      operationId: getGatewayPort
      tags:
        - Gateway methods
      responses:
        "200":
          $ref: "#/components/responses/ResponseStringOK"
        "400":
          $ref: "#/components/responses/ResponseBadRequest"
        "500":
          $ref: "#/components/responses/ResponseInternalServerError"

components:
  securitySchemes:
    access_token:
      type: apiKey
      in: header
      name: Authorization

  responses:
    ResponseOK:
      description: OK
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BaseResponse"
    ResponseStringOK:
      description: OK
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SuccessResponseString"
    ResponseBadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            readOnly: true
            allOf:
              - $ref: "#/components/schemas/BaseResponse"
          example:
            message: "Bad Request"
    ResponseInternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            readOnly: true
            allOf:
              - $ref: "#/components/schemas/BaseResponse"
          example:
            message: "Internal Server Error"
  schemas:
    BaseResponse:
      properties:
        message:
          readOnly: true
          description: message returned by server side if there is any
          type: string
          example: ""

    SuccessResponseString:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - properties:
            data:
              type: string
              description: When the interface returns success, this field is the specific success information

site_name: PowerLab
site_description: One pane of glass for everything you self-host. Apps, files, AI — your home server, finally beautiful.
site_url: https://neochaotic.github.io/powerlab/
repo_url: https://github.com/neochaotic/powerlab
repo_name: neochaotic/powerlab
edit_uri: edit/main/docs/

# `docs/` is the source dir; site_dir is .gitignored output.
docs_dir: docs
site_dir: docs-site

theme:
  name: material
  favicon: img/favicon.png
  logo: img/login.png
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  # pymdownx.highlight + pymdownx.inlinehilite removed for now —
  # they trigger an AttributeError("'NoneType' object has no
  # attribute 'replace'") in pygments' html_formatter when
  # pymdown's highlight bridge passes filename=None for blocks
  # without a filename annotation. Reproduces with mkdocs 1.6.1
  # + mkdocs-material 9.5.42 + pymdown-extensions 10.11.2 +
  # pygments 2.20.0 on the architecture/casaos-strangler.md page.
  # mkdocs-material's superfences alone provides syntax-highlighted
  # code blocks (just without anchor lines); good enough for the
  # foundation. Re-add via a follow-up PR once the upstream bug
  # resolves or an alternate highlight pipeline is configured.
  - pymdownx.snippets
  # superfences with mermaid custom_fence: lets ```mermaid blocks
  # render via Mermaid.js (Material auto-loads mermaid for 9.0+
  # when this fence is present) instead of being shown as raw code.
  # Architecture pages are full of flowcharts and need this.
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

# Mermaid.js loader + initialiser. Material 9.5+ documents auto-loading
# when the superfences custom_fence is present, but in practice (verified
# on the live site) the script is NOT pulled — diagrams stay as <pre>
# blocks instead of rendering. Loading explicitly + a small init that
# re-runs on Material's `navigation.instant` page-swaps fixes both the
# initial render AND the SPA-style navigation case.
#
# mermaid.min.js is vendored at docs/js/ (not loaded from unpkg) so:
#   - the docs site works fully offline (CI builds, self-hosted mirrors)
#   - no SRI is needed (local file, no third-party trust)
#   - version is pinned by file content, not URL
# To update: download the version from
# https://unpkg.com/mermaid@<X>/dist/mermaid.min.js + commit. ~3.3MB.
extra_javascript:
  - js/mermaid.min.js
  - js/mermaid-init.js

# Explicit nav so the surface is curated. Files NOT listed here still
# get built and remain reachable by URL but don't appear in nav.

name: Docs site

# Builds the mkdocs-material documentation site and deploys it to
# GitHub Pages on every push to main. PRs also build (without deploy)
# so a doc-broken markdown is caught at review time, not after merge.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'mkdocs-requirements.txt'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'mkdocs-requirements.txt'
      - '.github/workflows/docs.yml'

# Single concurrent run per ref; in-flight runs are cancelled when a
# new commit lands. Avoids deploying an older build over a newer one.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # mkdocs's git-revision-date plugin would need full history;
          # we don't use it yet but keep this here for the day we do.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: mkdocs-requirements.txt

      - name: Install mkdocs + theme
        run: pip install -r mkdocs-requirements.txt

      - name: Build site (strict — warnings fail the build)
        # --strict turns missing-link / missing-page warnings into errors,
        # so a moved file or a typo in a relative link breaks the PR
        # build instead of silently producing a broken page.
        run: mkdocs build --strict

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

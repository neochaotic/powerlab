name: Browser E2E (real backend)

# Runs the Playwright @smoke specs against a REAL PowerLab stack (the
# browser-level counterpart to the Go `backend-integration` job). These
# specs skip in the per-PR `frontend-e2e` job because no backend URL is
# set there; this workflow stands up the full stack and points them at it.
#
# Deliberately NOT on every PR: standing up the stack + browser is slow
# and flakier than the mock suite, and the real-backend contract is
# already gated per-PR by `backend-integration`. This runs where it pays
# off — nightly, before a release tag, and on demand.
#
# Out of scope: the journald-stream @smoke needs systemd units (a
# packaged install), which this background-process stack doesn't provide;
# it is excluded via --grep-invert.

on:
  push:
    # TEMP (remove before merge): run on this branch so the workflow can
    # be validated on real CI — workflow_dispatch/schedule only fire from
    # the default branch, so they can't exercise an unmerged branch.
    branches:
      - 'ci/browser-e2e-real'
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  browser-e2e-real:
    name: Browser @smoke vs real stack
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      POWERLAB_E2E_PORT: '8085'
      POWERLAB_E2E_USER: ci-admin
      POWERLAB_E2E_PASSWORD: ci-smoke-pass-12345
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Docker is available
        run: docker version

      - name: Install CGO build deps
        # user-service links libpam, local-storage links libfuse — both
        # are CGO and need their dev headers to compile on the runner.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libpam0g-dev libfuse-dev pkg-config

      - name: Build UI
        working-directory: ui
        run: |
          npm install
          npm run build

      - name: Install Playwright chromium
        working-directory: ui
        run: npx playwright install --with-deps chromium

      - name: Bring up the real PowerLab stack
        run: |
          chmod +x scripts/ci-e2e-stack.sh
          scripts/ci-e2e-stack.sh
          echo "POWERLAB_E2E_BASE=http://127.0.0.1:${POWERLAB_E2E_PORT}" >> "$GITHUB_ENV"

      - name: Run browser @smoke against the real backend
        working-directory: ui
        # App-lifecycle golden path that a synthetic (no-systemd) stack runs
        # reliably end-to-end: install (Docker pull → compose up → SSE phase
        # markers) → container present → uninstall. This is the highest-value
        # real-backend browser check.
        #
        # Deliberately NOT here: the auth-contract (login-flow), audit, and
        # logs/journald specs depend on the packaged install's gateway
        # config (JWT enforcement, audit pipeline, systemd units) that this
        # background-process stack doesn't replicate — they're covered by the
        # Go backend-integration job + manual Lima checks. Revisit if the
        # stack is later built from the real install (run install.sh on the
        # runner) rather than raw binaries.
        #
        # --workers=1 + --retries=0: real-backend login is rate-limited
        # (HTTP 429) and the token cache is per-process, so parallel workers
        # or retries each re-login and trip the limit — serial, no retry.
        # install-uninstall is the stable golden-path gate (passes reliably).
        # adventurelog-install is excluded: its app image is heavy and the
        # cold Docker pull exceeds the request timeout on a CI runner
        # (flaky "context closed"); it stays runnable manually / on Lima.
        run: |
          npx playwright test \
            tests/install-uninstall.smoke.spec.ts \
            --workers=1 --retries=0 --reporter=line

      - name: Dump backend logs on failure
        if: failure()
        run: |
          echo "=== gateway ===";        tail -n 120 backend/logs/gateway.log        2>/dev/null || true
          echo "=== app-management ==="; tail -n 120 backend/logs/app-management.log 2>/dev/null || true
          echo "=== user-service ===";   tail -n 120 backend/logs/user-service.log   2>/dev/null || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-real-backend
          path: ui/playwright-report/
          retention-days: 7

# Weekly sync of the Umbrel App Store catalogue into PowerLab's
# `community-catalog/`. Reviewable: every run produces a PR with the
# diff; nothing lands in `main` without human approval.
#
# Design: Phase 3 of issue #307 (ADR-0024).
#
# Run cadence: Monday 06:00 UTC. Chosen for the audit window (#307
# Phase 0): daily was rejected as too much PR-noise; weekly captures
# new upstream apps within a sprint and keeps the review queue
# bounded.
#
# Manual trigger via the Actions UI for ad-hoc syncs (testing the
# next-week diff early, or running after fixing the binary).
name: Sync umbrel catalog

on:
  schedule:
    # Monday 06:00 UTC — low-traffic time, before working hours
    # in any timezone the team uses.
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      allow_categories:
        description: 'Comma-separated Tier-2 categories to opt back in (e.g. "Bitcoin,Lightning"). Empty = default deny.'
        required: false
        default: ''
      dry_run:
        description: 'Skip PR open + just log the scan + filter summary'
        required: false
        default: 'false'

# Each weekly run produces a fresh branch + PR. Concurrency cancels
# any older still-running scheduled invocation if a manual trigger
# fires — manual takes precedence.
concurrency:
  group: sync-umbrel-catalog
  cancel-in-progress: true

permissions:
  # Push the sync branch + open the PR
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Build sync-catalog + run + open PR
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout PowerLab (full history for branch creation)
        uses: actions/checkout@v4
        with:
          # We're creating + pushing a branch — fetch-depth: 0 is
          # required for git push to know the divergence point.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/sync-catalog/go.sum

      - name: Build sync-catalog binary
        working-directory: backend/sync-catalog
        run: go build -o /usr/local/bin/sync-catalog .

      - name: Compute target branch + PR title
        id: vars
        run: |
          # Date-stamped branch keeps the weekly history easy to scan.
          DATE=$(date -u +%Y-%m-%d)
          echo "branch=catalog/umbrel-sync-${DATE}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "pr_title=catalog: weekly umbrel-apps sync — ${DATE}" >> "$GITHUB_OUTPUT"

      - name: Run sync-catalog
        id: sync
        env:
          ALLOW_CATEGORIES: ${{ inputs.allow_categories }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          ARGS=(
            --source umbrel
            --output community-catalog
            --upstream https://github.com/getumbrel/umbrel-apps.git
          )
          if [[ -n "${ALLOW_CATEGORIES}" ]]; then
            ARGS+=(--allow-categories "${ALLOW_CATEGORIES}")
          fi
          if [[ "${DRY_RUN}" == "true" ]]; then
            ARGS+=(--dry-run)
          fi

          # Capture the summary into the GH Actions log AND a file
          # we can splice into the PR description below.
          sync-catalog "${ARGS[@]}" | tee /tmp/sync-output.txt

          # The summary lives at the tail; grab it for the PR body.
          tail -10 /tmp/sync-output.txt > /tmp/sync-summary.txt

      - name: Diff vs main
        id: diff
        run: |
          # Stage what changed; if nothing, exit early.
          git add community-catalog/
          if git diff --cached --quiet; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "[sync-catalog] no diff — nothing to PR"
          else
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
            git diff --cached --stat > /tmp/diff-stat.txt
            echo "[sync-catalog] diff:"
            cat /tmp/diff-stat.txt
          fi

      - name: Bail out on dry-run OR no changes
        if: inputs.dry_run == 'true' || steps.diff.outputs.no_changes == 'true'
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "::notice::dry-run requested — no PR opened"
          else
            echo "::notice::no catalog changes this week — no PR opened"
          fi
          exit 0

      - name: Configure git identity for the sync bot
        if: steps.diff.outputs.no_changes == 'false'
        run: |
          git config user.name "powerlab-catalog-bot"
          git config user.email "noreply@powerlab.local"

      - name: Create sync branch + commit + push
        if: steps.diff.outputs.no_changes == 'false'
        run: |
          set -euo pipefail
          git checkout -b "${{ steps.vars.outputs.branch }}"
          git commit -m "catalog: umbrel-apps weekly sync — ${{ steps.vars.outputs.date }}

          Automated weekly sync of the public Umbrel App Store catalogue
          into community-catalog/, applying the four-tier filter from
          ADR-0024. Generated by .github/workflows/sync-umbrel-catalog.yml.

          See PR body for the per-app diff stat."
          git push --set-upstream origin "${{ steps.vars.outputs.branch }}"

      - name: Open PR with diff summary
        if: steps.diff.outputs.no_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BODY="$(cat <<EOF
          ## Automated weekly sync

          Run by \`.github/workflows/sync-umbrel-catalog.yml\` on Monday
          06:00 UTC (or via manual \`workflow_dispatch\`).

          ## Filter summary

          \`\`\`
          $(cat /tmp/sync-summary.txt)
          \`\`\`

          ## Diff stat

          \`\`\`
          $(cat /tmp/diff-stat.txt)
          \`\`\`

          ## Review checklist

          - [ ] Apps newly added look reasonable (skim by category)
          - [ ] Apps newly removed have a plausible reason in the upstream (a removed Umbrel app is a soft-keep on PowerLab side — confirm by spot-check)
          - [ ] No apps slipped through the Tier-1 filter (grep for \`getumbrel/\` in the new appfile.json files — none should appear)
          - [ ] No description.md contains the Umbrel-curated marketing copy (description is fetched from the app's own README per ADR-0024)

          Refs: #307 (umbrella), ADR-0024
          EOF
          )"
          # PR-create + labeling are split so a missing label never blocks
          # PR creation (the first run hit this — `gh pr create --label X`
          # validates the label upfront and exits non-zero if it doesn't
          # exist, leaving the branch pushed but no PR open). `gh pr edit`
          # is best-effort.
          gh pr create \
            --base main \
            --head "${{ steps.vars.outputs.branch }}" \
            --title "${{ steps.vars.outputs.pr_title }}" \
            --body "$BODY"
          gh pr edit "${{ steps.vars.outputs.branch }}" --add-label "catalog" 2>/dev/null || true

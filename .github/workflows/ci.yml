name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Frontend: type-check + unit tests + production build.
  # No cache-dependency-path because package-lock.json is gitignored;
  # `npm install` resolves the tree fresh each run.
  # ─────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (svelte-check + vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ui
        run: npm install

      - name: Type check (svelte-check)
        working-directory: ui
        run: npx svelte-check --tsconfig ./tsconfig.json --threshold error

      - name: Unit tests (vitest)
        working-directory: ui
        run: npx vitest run

      - name: Production build
        working-directory: ui
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────
  # Backend: matrix per service. Each service has its own go.mod.
  # `local-storage` needs libfuse to compile (Linux-only dependency).
  # `cli` is excluded — its codegen sub-packages live in a separate
  # repository (CasaOS-CLI) that we have not forked yet.
  # ─────────────────────────────────────────────────────────────────────
  backend:
    name: Backend ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - common
          - gateway
          - core
          - user-service
          - message-bus
          - app-management
          - local-storage
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/${{ matrix.service }}/go.sum

      # local-storage uses bazil.org/fuse + Linux extended attribute syscalls;
      # libfuse must be installed before the test build can succeed.
      - name: Install fuse (local-storage only)
        if: matrix.service == 'local-storage'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libfuse-dev fuse pkg-config

      # user-service links against libpam (CGO) for native Linux auth.
      # The header lives in libpam0g-dev on Debian/Ubuntu; install it so
      # the test build succeeds. CGO_ENABLED defaults to 1 on Linux when
      # a C toolchain is present, which it always is on actions/setup-go.
      - name: Install libpam (user-service only)
        if: matrix.service == 'user-service'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libpam0g-dev

      # Each service has its own //go:generate directives that produce
      # codegen/ from OpenAPI specs. They are .gitignored, so we
      # regenerate before the tests run. `gateway` is the only service
      # with no generate step.
      - name: Run go generate
        if: matrix.service != 'gateway'
        working-directory: backend/${{ matrix.service }}
        run: go generate ./...

      - name: Test
        working-directory: backend/${{ matrix.service }}
        run: go test -race ./...

  # ─────────────────────────────────────────────────────────────────────
  # Smoke build for the production tarballs the release pipeline will
  # produce. Confirms cross-compilation works for both target archs.
  #
  # NOT gated behind frontend/backend — runs in parallel so total wall
  # time on a push to main is max(frontend, backend, package) instead
  # of frontend+backend then package. Cross-compile catches issues
  # neither frontend nor backend tests would surface (e.g. a CGO
  # dependency that fails on the linux/arm64 toolchain), so we keep
  # it on every push as the safety net for tag-time releases.
  # ─────────────────────────────────────────────────────────────────────
  package:
    name: Package smoke (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      # Cross-compile prerequisites.
      # · libfuse-dev / pkg-config — local-storage's bazil.org/fuse uses
      #   `unsafe` + syscalls (no C linkage), but the headers are still
      #   needed for some build-tag compile checks downstream.
      # · libpam0g-dev — user-service CGO build against libpam.
      #   amd64 only: arm64 PAM cross-compile requires a multi-arch apt
      #   setup that varies per Ubuntu version. The arm64 tarball uses
      #   the no-CGO PAM stub and falls back to SetupWizard auth at
      #   runtime — tracked as a follow-up release item.
      - name: Install cross-compile deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libfuse-dev pkg-config
          if [[ "${{ matrix.arch }}" == "amd64" ]]; then
            sudo apt-get install -y -qq libpam0g-dev
          fi

      - name: Install frontend dependencies
        working-directory: ui
        run: npm install

      # Use the tag name (vX.Y.Z → X.Y.Z) when triggered by a tag push,
      # otherwise stamp the build with `0.0.0-ci`. This keeps the artifact
      # name predictable for the release upload step below.
      - name: Compute version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-ci" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run packaging script
        run: ./scripts/package-linux.sh ${{ matrix.arch }} ${{ steps.version.outputs.version }}

      - name: Upload tarball (always)
        uses: actions/upload-artifact@v4
        with:
          name: powerlab-linux-${{ matrix.arch }}
          # Both the versioned and the stable filename — `releases/latest`
          # URLs in the README depend on the stable name.
          # manifest.json is intentionally NOT uploaded here: the package
          # matrix runs in parallel and each job only sees its own arch's
          # tarball, so its manifest would be incomplete. The release
          # job re-computes the canonical manifest from BOTH tarballs.
          path: |
            dist/powerlab-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}.tar.gz
            dist/powerlab-linux-${{ matrix.arch }}.tar.gz

  # ─────────────────────────────────────────────────────────────────────
  # Release: only runs on `vX.Y.Z` tag pushes. Pulls the tarballs the
  # `package` matrix just built, attaches them to a GitHub Release.
  # Requires the default GITHUB_TOKEN to have `contents: write` (set
  # at the job level below).
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download all tarballs
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: powerlab-linux-*
          merge-multiple: true

      - name: List tarballs
        run: ls -la dist/

      # Build the canonical manifest.json with BOTH per-arch tarball
      # SHA-256s. The package matrix could not do this (each job only
      # saw its own arch), so we recompute here. The manifest is then
      # uploaded as a release asset alongside the tarballs.
      - name: Build release manifest
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          go run ./scripts/build-manifest \
            -version "$VERSION" \
            -amd64-tarball "dist/powerlab-$VERSION-linux-amd64.tar.gz" \
            -arm64-tarball "dist/powerlab-$VERSION-linux-arm64.tar.gz" \
            > dist/manifest.json
          cat dist/manifest.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/manifest.json
          generate_release_notes: true
          name: PowerLab ${{ github.ref_name }}
          body: |
            ### Install

            **Linux amd64:**
            ```bash
            curl -L https://github.com/neochaotic/powerlab/releases/download/${{ github.ref_name }}/powerlab-${{ github.ref_name == 'v0.1.0' && '0.1.0' || github.ref_name }}-linux-amd64.tar.gz | tar xz
            cd powerlab-*-linux-amd64 && sudo ./install.sh
            ```

            **Linux arm64:**
            ```bash
            curl -L https://github.com/neochaotic/powerlab/releases/download/${{ github.ref_name }}/powerlab-${{ github.ref_name == 'v0.1.0' && '0.1.0' || github.ref_name }}-linux-arm64.tar.gz | tar xz
            cd powerlab-*-linux-arm64 && sudo ./install.sh
            ```

            Then open <http://powerlab.local> from any device on the LAN.

            ---

            See the [README](https://github.com/neochaotic/powerlab#readme) for the full feature tour, screenshots, and architecture overview.
          retention-days: 7

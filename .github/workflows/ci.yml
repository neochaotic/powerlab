name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  # Manual trigger for release-candidate builds. Lets us push a
  # prep branch and produce a Linux tarball as a workflow artifact
  # (NOT a public release) to hand to a tester. The release job is
  # gated on a tag push, so dispatch runs stop after `package`.
  workflow_dispatch:
    inputs:
      version_label:
        description: "Version label to stamp in the binary (e.g. 0.3.2-rc1)"
        required: true
        default: "0.3.2-rc1"

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Changelog fragment gate. Every PR that touches code (backend/, ui/src/,
  # scripts/) MUST add at least one .changes/unreleased/*.yaml fragment.
  # Eliminates the conflict-on-CHANGELOG.md class — see CONTRIBUTING.md.
  # Issue #98 + adoption ADR.
  # ─────────────────────────────────────────────────────────────────────
  changelog-fragment:
    name: Changelog fragment present
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed files (PR vs base)
        id: diff
        run: |
          # List files changed by this PR. We use the base ref the PR
          # targets (typically main) so this works for stacked PRs too.
          git diff --name-only origin/${{ github.base_ref }}...HEAD > /tmp/changed.txt
          cat /tmp/changed.txt

      - name: Verify fragment present when code changed
        run: |
          set -e
          # If any of the watched paths changed, require a fragment.
          if grep -qE '^(backend/|ui/src/|scripts/)' /tmp/changed.txt; then
            if ! grep -qE '^\.changes/unreleased/[^/]+\.yaml$' /tmp/changed.txt; then
              echo "::error::This PR touches code under backend/, ui/src/, or scripts/ but does not add a changelog fragment under .changes/unreleased/."
              echo "::error::Run 'changie new' (or hand-write a YAML fragment) and include it in the PR."
              echo "::error::See CONTRIBUTING.md for the workflow."
              exit 1
            fi
            echo "✓ Changelog fragment present"
          else
            echo "✓ No code change watched; fragment not required"
          fi

  # ─────────────────────────────────────────────────────────────────────
  # Frontend: type-check + unit tests + production build.
  # No cache-dependency-path because package-lock.json is gitignored;
  # `npm install` resolves the tree fresh each run.
  # ─────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (svelte-check + vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ui
        run: npm install

      # ─── Defense-in-depth gates (v0.6.6 retro, see docs/UPDATE_MANIFEST.md
      # "Defense in depth" section). The v0.6.6 cycle shipped a UI bundle
      # stamped with __APP_VERSION__ = "0.3.1" (pkg.json fallback from
      # the v0.3.1 era, never bumped across 30+ tags). The script gates
      # below fail-fast if either:
      #   L2 — ui/package.json version != latest git tag
      #   L1+L3 — package-linux.sh missing the `npm version` sync or
      #           the built-bundle sanity grep
      # ────────────────────────────────────────────────────────────────────
      - name: L2 — ui/package.json version freshness
        run: bash scripts/check-ui-package-version-fresh_test.sh

      - name: L1+L3 — package-linux.sh defense-in-depth wiring
        run: bash scripts/check-package-linux-ui-version_test.sh

      - name: L3 — injection test (gate detects wrong-version bundle)
        run: bash scripts/check-built-ui-version_test.sh

      - name: Cut-script structural + sandboxed behavioral tests
        run: bash scripts/prepare-release_test.sh

      - name: release-manifest summary ≤ 250 chars
        run: bash scripts/check-manifest-summary-size_test.sh

      - name: ESLint raw-fetch ban (Sprint 15 #353)
        run: bash scripts/check-eslint-fetch-ban_test.sh

      - name: Type check (svelte-check)
        working-directory: ui
        run: npx svelte-check --tsconfig ./tsconfig.json --threshold error

      - name: Unit tests (vitest) with coverage
        working-directory: ui
        run: npx vitest run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-${{ github.run_id }}
          path: ui/coverage/
          retention-days: 14
          if-no-files-found: warn

      - name: Production build
        working-directory: ui
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────
  # Frontend E2E: Playwright + chromium. Baseline is a single smoke
  # test per #86. Real feature coverage is added per kill PR / per new
  # feature. Runs alongside `frontend` so total wall time isn't
  # serialized.
  # ─────────────────────────────────────────────────────────────────────
  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ui
        run: npm install

      - name: Install Playwright chromium
        working-directory: ui
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: ui
        run: npm run test:e2e

      # Always upload so test failures can be diagnosed from artifacts.
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────
  # Backend: matrix per service. Each service has its own go.mod.
  # `local-storage` needs libfuse to compile (Linux-only dependency).
  # `cli` is excluded — its codegen sub-packages live in a separate
  # repository (CasaOS-CLI) that we have not forked yet.
  # ─────────────────────────────────────────────────────────────────────
  backend:
    name: Backend ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - common
          - gateway
          - core
          - user-service
          - message-bus
          - app-management
          - local-storage
          - pkg
          - sync-catalog
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/${{ matrix.service }}/go.sum

      # local-storage uses bazil.org/fuse + Linux extended attribute syscalls;
      # libfuse must be installed before the test build can succeed.
      - name: Install fuse (local-storage only)
        if: matrix.service == 'local-storage'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libfuse-dev fuse pkg-config

      # user-service links against libpam (CGO) for native Linux auth.
      # The header lives in libpam0g-dev on Debian/Ubuntu; install it so
      # the test build succeeds. CGO_ENABLED defaults to 1 on Linux when
      # a C toolchain is present, which it always is on actions/setup-go.
      - name: Install libpam (user-service only)
        if: matrix.service == 'user-service'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libpam0g-dev

      # Each service has its own //go:generate directives that produce
      # codegen/ from OpenAPI specs. They are .gitignored, so we
      # regenerate before the tests run. `gateway` is the only service
      # with no generate step.
      - name: Run go generate
        if: matrix.service != 'gateway'
        working-directory: backend/${{ matrix.service }}
        run: go generate ./...

      - name: Test (with coverage)
        working-directory: backend/${{ matrix.service }}
        # -race + -coverprofile requires -covermode=atomic. Atomic
        # is slightly slower than the default `set` mode but the
        # race detector overhead dwarfs it anyway. Issue #150 wires
        # this measurement; the actual gate (if any) lands after
        # we have a 2-data-point trend per the Sprint 11 retro.
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        working-directory: backend/${{ matrix.service }}
        run: |
          echo "=== ${{ matrix.service }} coverage ==="
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ matrix.service }}-${{ github.run_id }}
          path: backend/${{ matrix.service }}/coverage.out
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────
  # Backend deadcode gate (Sprint 19 PR 5). Runs
  # `golang.org/x/tools/cmd/deadcode` per service. Sprint 1 ran this
  # tool once and flagged 5 packages "verify before deletion" — 2 of
  # them were never followed up and sat dead through 15 sprints. This
  # gate ensures the next miss is caught at PR time.
  #
  # Phase-in: warn-only by default (POWERLAB_DEADCODE_STRICT=0). After
  # Sprint 19 lands and the existing dead code is gone, flip to strict
  # for v0.7.0 (memory feedback_no_v1_without_alignment — major bumps
  # require explicit user approval).
  # ─────────────────────────────────────────────────────────────────────
  backend-deadcode:
    name: Backend deadcode (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: backend
    strategy:
      fail-fast: false
      matrix:
        service:
          - common
          - gateway
          - core
          - user-service
          - message-bus
          - app-management
          - local-storage
          - sync-catalog
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/${{ matrix.service }}/go.sum

      - name: Install fuse (local-storage only)
        if: matrix.service == 'local-storage'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libfuse-dev fuse pkg-config

      - name: Install libpam (user-service only)
        if: matrix.service == 'user-service'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libpam0g-dev

      - name: Run go generate
        if: matrix.service != 'gateway' && matrix.service != 'common'
        working-directory: backend/${{ matrix.service }}
        run: go generate ./...

      - name: Run deadcode
        run: ./scripts/check-deadcode.sh ${{ matrix.service }}
        env:
          # delta mode: fail when the count exceeds the per-service
          # baseline in scripts/deadcode-baseline/<svc>.txt. ADR-0037
          # explains why we abandoned the zero-strict goal.
          POWERLAB_DEADCODE_MODE: 'delta'

  # ─────────────────────────────────────────────────────────────────────
  # Catalog hostname lint (Sprint 20 PR 4a). Scans every
  # community-catalog/Apps/*/docker-compose.yml for the legacy
  # docker-compose v1 hostname pattern `<project>_<service>_<idx>` and
  # reports findings as PR annotations. PowerLab ships docker-compose
  # v2 which creates containers with hyphens (`<project>-<service>-
  # <idx>`); the underscore form never resolves and the app crashes
  # in a DNS-error loop (Sprint 20 PR 2 surfaced this against
  # Activepieces; sweep found 67 affected apps).
  #
  # Phase-in: warn-only by default. After Sprint 20 PR 4b (the actual
  # 67-app sweep) lands, flip to strict so re-introduced findings
  # block PRs. Tracking issue: #402.
  # ─────────────────────────────────────────────────────────────────────
  catalog-hostnames:
    name: Catalog hostnames
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Self-test the lint script
        run: ./scripts/check-catalog-hostnames_test.sh
      - name: Run catalog hostname lint
        run: ./scripts/check-catalog-hostnames.sh
        env:
          # Sprint 21 PR 6 flipped this to strict after PR 1 (#418) cleaned the
          # existing 154 findings and PR 2 (#419) added the sync-catalog auto-
          # rewrite so future upstream syncs can't regress. A non-zero finding
          # now hard-fails the run (issue #402).
          POWERLAB_CATALOG_LINT_STRICT: '1'

  # ─────────────────────────────────────────────────────────────────────
  # Catalog app safety lint (ADR-0039 Sprint 22 PR 6). Compose-level
  # security gate — rejects privileged, docker.sock mounts, host
  # networking/PID/IPC, dangerous capabilities, system-path binds.
  # Runs strict from the start; there's no "warn-only" phase because
  # no apps were curated under the previous model.
  # ─────────────────────────────────────────────────────────────────────
  catalog-app-safety:
    name: Catalog app safety
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Self-test the safety lint
        run: ./scripts/check-catalog-app-safety_test.sh
      - name: Run catalog app safety lint
        # Warn-only during Sprint 22 ship phase: existing
        # community-catalog/ entries inherited from the pre-ADR-0039
        # Umbrel passthrough model have ~45 findings across 27 apps.
        # The initial curated catalog PR (Sprint 22 PR 7) will wipe
        # them and re-seed clean; flip this to strict once that's
        # merged.
        run: ./scripts/check-catalog-app-safety.sh
        env:
          POWERLAB_CATALOG_SAFETY_STRICT: '0'

  # ─────────────────────────────────────────────────────────────────────
  # Backend integration tests (Phase 3 of #150 — Sprint 13.5). Build
  # tag `integration` keeps these out of the default `go test ./...`
  # so dev machines without Docker don't fail them on every commit.
  # GitHub-hosted ubuntu-latest runners have Docker available by
  # default — `docker ps` works without further setup.
  #
  # Currently exercises: Docker daemon ping, image-list API. Future
  # additions: real install round-trip (Pull + Up + container check),
  # secret-substitution → docker compose up against a test catalog
  # entry. The minimal pair here proves the wiring works.
  # ─────────────────────────────────────────────────────────────────────
  backend-integration:
    name: Backend integration (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: backend # only run if unit tests pass
    strategy:
      fail-fast: false
      matrix:
        service:
          - app-management
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/${{ matrix.service }}/go.sum

      - name: Run go generate
        working-directory: backend/${{ matrix.service }}
        run: go generate ./...

      - name: Verify Docker is available
        run: docker version

      # Warm the Docker daemon + pull a tiny no-op image so the
      # first containerd operation inside the tests doesn't pay the
      # cold-start tax. The v0.6.12 release SHA hit a 2m timeout on
      # this exact line because the test process started before
      # containerd was ready. The pull is cheap (~5s for hello-world)
      # and skips the network entirely on a warm runner.
      - name: Warm Docker daemon
        run: |
          docker info >/dev/null
          docker pull hello-world

      # 5m timeout (was 2m). Race-detector overhead + cold daemon
      # + testcontainer cold-start can push past 2m on a shared CI
      # runner. The tests themselves are fast; the timeout is a
      # safety net against runner-state pathologies, not a budget.
      - name: Integration tests
        working-directory: backend/${{ matrix.service }}
        run: go test -tags=integration -race -timeout=5m ./service/...

  # ─────────────────────────────────────────────────────────────────────
  # Local-storage fuse build-tag tests (Phase 4 of #150 — Sprint 13.5).
  # Mount-syscall lives on Linux only; the `fuse` tag also gates these
  # so dev machines without libfuse don't get broken builds.
  # GitHub-hosted ubuntu runners support FUSE in privileged steps;
  # an unprivileged actual mount would need user-namespace fiddling
  # we're not doing in this PR. The scaffolded test exercises the
  # bazil.org/fuse API surface without mounting — Sprint 14 adds
  # the actual mount → r/w → unmount round trip with the priv setup.
  # ─────────────────────────────────────────────────────────────────────
  backend-fuse:
    name: Backend fuse (local-storage)
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/local-storage/go.sum

      - name: Install fuse
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libfuse-dev fuse pkg-config

      - name: Run go generate
        working-directory: backend/local-storage
        run: go generate ./...

      - name: Fuse-tagged tests
        working-directory: backend/local-storage
        run: go test -tags=fuse -race -timeout=2m ./service/...

  # ─────────────────────────────────────────────────────────────────────
  # Smoke build for the production tarballs the release pipeline will
  # produce. Confirms cross-compilation works for both target archs.
  #
  # NOT gated behind frontend/backend — runs in parallel so total wall
  # time on a push to main is max(frontend, backend, package) instead
  # of frontend+backend then package. Cross-compile catches issues
  # neither frontend nor backend tests would surface (e.g. a CGO
  # dependency that fails on the linux/arm64 toolchain), so we keep
  # it on every push as the safety net for tag-time releases.
  # ─────────────────────────────────────────────────────────────────────
  package:
    name: Package smoke (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      # Cross-compile prerequisites.
      # · libfuse-dev / pkg-config — local-storage's bazil.org/fuse uses
      #   `unsafe` + syscalls (no C linkage), but the headers are still
      #   needed for some build-tag compile checks downstream.
      # · libpam0g-dev — user-service CGO build against libpam.
      #   amd64 only: arm64 PAM cross-compile requires a multi-arch apt
      #   setup that varies per Ubuntu version. The arm64 tarball uses
      #   the no-CGO PAM stub and falls back to SetupWizard auth at
      #   runtime — tracked as a follow-up release item.
      - name: Install cross-compile deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libfuse-dev pkg-config
          if [[ "${{ matrix.arch }}" == "amd64" ]]; then
            sudo apt-get install -y -qq libpam0g-dev
          fi

      - name: Install frontend dependencies
        working-directory: ui
        run: npm install

      # Use the tag name (vX.Y.Z → X.Y.Z) when triggered by a tag push,
      # otherwise stamp the build with `0.0.0-ci`. This keeps the artifact
      # name predictable for the release upload step below.
      - name: Compute version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            # Manual dispatch: stamp with the user-supplied label so the
            # tarball binary reports a meaningful version (e.g. 0.3.2-rc1)
            # instead of the generic CI placeholder. Still NOT a release —
            # the release job is gated on tag push.
            LABEL="${{ inputs.version_label }}"
            echo "version=${LABEL}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-ci" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run packaging script
        run: ./scripts/package-linux.sh ${{ matrix.arch }} ${{ steps.version.outputs.version }}

      - name: Upload tarball (always)
        uses: actions/upload-artifact@v4
        with:
          name: powerlab-linux-${{ matrix.arch }}
          # Both the versioned and the stable filename — `releases/latest`
          # URLs in the README depend on the stable name.
          # manifest.json is intentionally NOT uploaded here: the package
          # matrix runs in parallel and each job only sees its own arch's
          # tarball, so its manifest would be incomplete. The release
          # job re-computes the canonical manifest from BOTH tarballs.
          path: |
            dist/powerlab-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}.tar.gz
            dist/powerlab-linux-${{ matrix.arch }}.tar.gz

  # ─────────────────────────────────────────────────────────────────────
  # Release: only runs on `vX.Y.Z` tag pushes. Pulls the tarballs the
  # `package` matrix just built, attaches them to a GitHub Release.
  # Requires the default GITHUB_TOKEN to have `contents: write` (set
  # at the job level below).
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download all tarballs
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: powerlab-linux-*
          merge-multiple: true

      - name: List tarballs
        run: ls -la dist/

      # Build the canonical manifest.json with BOTH per-arch tarball
      # SHA-256s. The package matrix could not do this (each job only
      # saw its own arch), so we recompute here. The manifest is then
      # uploaded as a release asset alongside the tarballs.
      - name: Build release manifest
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          go run ./scripts/build-manifest \
            -version "$VERSION" \
            -amd64-tarball "dist/powerlab-$VERSION-linux-amd64.tar.gz" \
            -arm64-tarball "dist/powerlab-$VERSION-linux-arm64.tar.gz" \
            > dist/manifest.json
          cat dist/manifest.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/manifest.json
          generate_release_notes: true
          name: PowerLab ${{ github.ref_name }}
          body: |
            ### Install

            **Linux amd64:**
            ```bash
            curl -L https://github.com/neochaotic/powerlab/releases/download/${{ github.ref_name }}/powerlab-${{ github.ref_name == 'v0.1.0' && '0.1.0' || github.ref_name }}-linux-amd64.tar.gz | tar xz
            cd powerlab-*-linux-amd64 && sudo ./install.sh
            ```

            **Linux arm64:**
            ```bash
            curl -L https://github.com/neochaotic/powerlab/releases/download/${{ github.ref_name }}/powerlab-${{ github.ref_name == 'v0.1.0' && '0.1.0' || github.ref_name }}-linux-arm64.tar.gz | tar xz
            cd powerlab-*-linux-arm64 && sudo ./install.sh
            ```

            Then open <http://powerlab.local> from any device on the LAN.

            ---

            See the [README](https://github.com/neochaotic/powerlab#readme) for the full feature tour, screenshots, and architecture overview.
          retention-days: 7

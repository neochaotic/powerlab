<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background — squircle with subtle dark gradient + emerald glow.
       Matches the LoginScreen tile and Launchpad app icons. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1d"/>
      <stop offset="100%" stop-color="#08080a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.6" r="0.7">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="topShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- iOS-style squircle (radius ~22% of side) -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#glow)"/>

  <!-- Top inner highlight — gives the icon the "lit from above" feel -->
  <rect x="16" y="12" width="480" height="220" rx="100" ry="100" fill="url(#topShine)"/>

  <!-- The wordmark: bold "P" in white + emerald dot.
       Geometry tuned so the optical center sits at 50%/50% of the canvas
       once the period is included. -->
  <text x="160" y="370"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
        font-size="320"
        font-weight="800"
        fill="#ffffff"
        letter-spacing="-12">P</text>

  <!-- Emerald accent dot — the same period that ends "PowerLab." in the UI
       wordmark. Slightly raised baseline for visual balance with the P. -->
  <circle cx="370" cy="345" r="32" fill="url(#dot)"/>

  <!-- Subtle border on the squircle so it pops on light backgrounds when
       the OS uses light-mode chrome (e.g. macOS dock at low transparency). -->
  <rect x="1" y="1" width="510" height="510" rx="111" ry="111" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="2"/>
</svg>

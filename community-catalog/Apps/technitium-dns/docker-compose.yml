name: technitium-dns
services:
    dns-server:
        environment:
            - DNS_SERVER_DOMAIN=${DEVICE_DOMAIN_NAME}
            - DNS_SERVER_ADMIN_PASSWORD=${APP_PASSWORD}
        image: technitium/dns-server:15.2.0@sha256:23d3b63d959e997800b095fe93009b3fae271b5258234ff2ade8535cb33682c8
        network_mode: host
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/technitium-dns/data:/etc/dns
version: "3.7"


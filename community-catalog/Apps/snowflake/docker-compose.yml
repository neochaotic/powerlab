name: snowflake
services:
    proxy:
        command: -log /data/snowflake.log -verbose
        image: thetorproject/snowflake-proxy:v2.12.1@sha256:53658adcf8183ed387a8abce383536f45d72b4688638e078d6c1686970199feb
        restart: on-failure
        stop_grace_period: 1m
        volumes:
            - /DATA/PowerLabAppData/snowflake/data:/data
    web:
        command: gotty --port 3800 --index "/snowflake/index.html" --title-format "Tor Snowflake Proxy" bash -c 'tail -n 10000 -f /snowflake/snowflake.log | grep "Traffic Relayed"'
        image: sorenisanerd/gotty:v1.6.0@sha256:23b4669973e96d8d7d37b3bfd9e6566bdd701aa1a56eee2dc0e0362bd927ed88
        ports:
            - 3800:3800
        restart: on-failure
        stop_grace_period: 1m
        volumes:
            - /DATA/PowerLabAppData/snowflake/data:/snowflake
version: "3.7"

x-powerlab:
    store_app_id: snowflake
    title:
        en_us: Tor Snowflake Proxy
    tagline:
        en_us: Help defeat internet censorship
    icon: https://getumbrel.github.io/umbrel-apps-gallery/snowflake/icon.svg
    category: networking
    port_map: "3800"
    author: The Tor Project, Inc.
    developer: The Tor Project, Inc.
    source:
        catalog: umbrel-apps
        upstream_id: snowflake
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 8a60bdaddda5062fa19b2b13a47966de5af986cf
        upstream_path: snowflake/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T15:43:45Z"

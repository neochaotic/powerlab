name: komodo
services:
    core:
        depends_on:
            - ferretdb
        environment:
            KOMODO_DATABASE_ADDRESS: komodo_ferretdb_1:27017
            KOMODO_DATABASE_PASSWORD: admin
            KOMODO_DATABASE_USERNAME: admin
            KOMODO_FIRST_SERVER: https://komodo_periphery_1:8120
            KOMODO_JWT_SECRET: ${APP_SEED}
            KOMODO_PASSKEY: ${APP_PASSWORD}
        image: ghcr.io/moghtech/komodo-core:2.2.0@sha256:7afbcfa99674bf3f51539ec3aa7235795e9b994af9b7099a6c4c654d5d8a5b6b
        init: true
        labels:
            komodo.skip: null
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/komodo/data/core:/backups
            - /DATA/PowerLabAppData/komodo/data/keys:/config/keys
    docker:
        command: |
            dockerd
              --bridge dind0
              --data-root /data/data
              --exec-root /data/exec
              --host unix:///data/docker.sock
              --pidfile /data/docker.pid
        entrypoint: /entrypoint.sh
        environment:
            DOCKER_ENSURE_BRIDGE: dind0:10.32.0.1/16
        image: docker:28.3.0-dind@sha256:d33eb93fe02683e984e6f8a93c0b3d85bb74f56ec83922bc39fb34ba23ab42bc
        network_mode: host
        privileged: true
        restart: on-failure
        stop_grace_period: 1m
        volumes:
            - /DATA/PowerLabAppData/komodo/entrypoint.sh:/entrypoint.sh
            - /DATA/PowerLabAppData/komodo/data/docker:/data
    ferretdb:
        depends_on:
            - postgres
        environment:
            FERRETDB_POSTGRESQL_URL: postgres://admin:admin@komodo_postgres_1:5432/postgres
        image: ghcr.io/ferretdb/ferretdb:2.3.1@sha256:1170bd36c39378614edd3f1d2b92f0c5a9b30e482a79ea0c3fc0fe11baba3afa
        labels:
            komodo.skip: null
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/komodo/data/ferretdb:/state
    periphery:
        environment:
            COMPOSE_KOMODO_IMAGE_TAG: latest
            KOMODO_PASSKEY: ${APP_PASSWORD}
            PERIPHERY_DISABLE_TERMINALS: "false"
            PERIPHERY_INCLUDE_DISK_MOUNTS: /etc/hostname
            PERIPHERY_LOGGING_PRETTY: "false"
            PERIPHERY_PASSKEYS: ${APP_PASSWORD}
            PERIPHERY_PRETTY_STARTUP_CONFIG: "false"
            PERIPHERY_ROOT_DIRECTORY: /etc/komodo
            PERIPHERY_SSL_ENABLED: "true"
            TZ: Europe/Berlin
        image: ghcr.io/moghtech/komodo-periphery:2.2.0@sha256:7fb1a4807d125ce036a17d37c940b4001402afcaf342a2c720c98d096b1b54da
        labels:
            komodo.skip: null
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/komodo/data/docker:/var/run
            - /proc:/proc
            - /DATA/PowerLabAppData/komodo/data/periphery:/etc/komodo
    postgres:
        environment:
            POSTGRES_DB: postgres
            POSTGRES_PASSWORD: admin
            POSTGRES_USER: admin
        image: ghcr.io/ferretdb/postgres-documentdb:17-0.104.0@sha256:1d709fc03dcb82faa2e3aa02c0f80ea10e483b38aff08a05da36a6faa2098608
        labels:
            komodo.skip: null
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/komodo/data/postgres:/var/lib/postgresql/data
version: "3.7"

x-powerlab:
    store_app_id: komodo
    title:
        en_us: Komodo
    tagline:
        en_us: A tool to build and deploy software
    icon: https://getumbrel.github.io/umbrel-apps-gallery/komodo/icon.svg
    category: developer
    port_map: "9120"
    author: mogh.tech
    developer: mogh.tech
    source:
        catalog: umbrel-apps
        upstream_id: komodo
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 8a60bdaddda5062fa19b2b13a47966de5af986cf
        upstream_path: komodo/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T14:50:14Z"

name: nginx-proxy-manager
services:
    docker-host:
        cap_add:
            - NET_ADMIN
            - NET_RAW
        hostname: $DEVICE_DOMAIN_NAME
        image: qoomon/docker-host:3.3.1@sha256:ec9d214d7fa88932e9186ca2f4419d44661376929931248525b08e7fa9e270f7
        restart: on-failure
    web:
        hostname: nginx-proxy-manager_web_1
        image: jc21/nginx-proxy-manager:2.14.0@sha256:2aa69b382a384b676c0d4f1d6f2eac40ecd478fcf7af1cfb3f9f1d3cd0c81e12
        ports:
            - 40080:80
            - 40443:443
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/nginx-proxy-manager/data/npm-data:/data
            - /DATA/PowerLabAppData/nginx-proxy-manager/data/letsencrypt:/etc/letsencrypt
version: "3.7"


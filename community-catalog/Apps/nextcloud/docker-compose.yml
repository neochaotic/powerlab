name: nextcloud
services:
    cron:
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_started
        entrypoint: /cron.sh
        image: nextcloud:33.0.3-apache@sha256:76f04e434a82572dbfee7ad6dca313229eade89ee538fccd2bf6396f4440d48b
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/nextcloud/data/nextcloud:/var/www/html
    db:
        command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
        environment:
            - MYSQL_ROOT_PASSWORD=moneyprintergobrrr
            - MYSQL_PASSWORD=moneyprintergobrrr
            - MYSQL_DATABASE=nextcloud
            - MYSQL_USER=nextcloud
            - MARIADB_AUTO_UPGRADE=1
        healthcheck:
            interval: 10s
            retries: 3
            start_period: 10s
            test:
                - CMD
                - healthcheck.sh
                - --connect
                - --innodb_initialized
            timeout: 5s
        image: mariadb:10.6.21@sha256:8a16204dc96c08ed0ee2c52c0f9324aa5d2dd0e43ad23a471d447a39f75765b5
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/nextcloud/data/db:/var/lib/mysql
    redis:
        image: redis:6.2.2-buster@sha256:e10f55f92478715698a2cef97c2bbdc48df2a05081edd884938903aa60df6396
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/nextcloud/data/redis:/data
    web:
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_started
        environment:
            - MYSQL_HOST=db
            - REDIS_HOST=redis
            - MYSQL_PASSWORD=moneyprintergobrrr
            - MYSQL_DATABASE=nextcloud
            - MYSQL_USER=nextcloud
            - TRUSTED_PROXIES=${NETWORK_IP}/16
            - NEXTCLOUD_ADMIN_USER=umbrel
            - NEXTCLOUD_ADMIN_PASSWORD=${APP_PASSWORD}
            - NEXTCLOUD_TRUSTED_DOMAINS=${APP_DOMAIN}:${APP_NEXTCLOUD_PORT} ${APP_HIDDEN_SERVICE} ${DEVICE_HOSTNAME}:${APP_NEXTCLOUD_PORT} ${APP_NEXTCLOUD_LOCAL_IPS} web
            - PHP_UPLOAD_LIMIT=1024G
        image: nextcloud:33.0.3-apache@sha256:76f04e434a82572dbfee7ad6dca313229eade89ee538fccd2bf6396f4440d48b
        ports:
            - 8081:80
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/nextcloud/data/nextcloud:/var/www/html
version: "3.7"

x-powerlab:
    store_app_id: nextcloud
    title:
        en_us: Nextcloud
    tagline:
        en_us: Productivity platform that keeps you in control
    icon: https://getumbrel.github.io/umbrel-apps-gallery/nextcloud/icon.svg
    category: files
    port_map: "8081"
    author: Nextcloud GmbH
    developer: Nextcloud GmbH
    main: web
    source:
        catalog: umbrel-apps
        upstream_id: nextcloud
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 931a2146a30e8398b127434cf4fd2f20ae77bb4f
        upstream_path: nextcloud/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-13T17:26:49Z"

name: blinko
services:
    app:
        depends_on:
            db:
                condition: service_healthy
        environment:
            DATABASE_URL: postgresql://blinkouser:blinkopass@blinko_db_1:5432/blinko
            NEXT_PUBLIC_BASE_URL: http://${DEVICE_DOMAIN_NAME}:1111
            NEXTAUTH_SECRET: ${APP_SEED}
            NEXTAUTH_URL: http://${DEVICE_DOMAIN_NAME}:1111
            NODE_ENV: production
        healthcheck:
            interval: 30s
            retries: 5
            start_period: 30s
            test:
                - CMD
                - curl
                - -f
                - http://localhost:1111
            timeout: 10s
        image: blinkospace/blinko:1.8.7@sha256:f7c1167f8c86db586599d849539a732929d89adb10977046e7b427813b2a84b4
        logging:
            options:
                max-file: "3"
                max-size: 10m
        ports:
            - 1111:1111
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/blinko/data/app:/app/.blinko:rw
    db:
        environment:
            POSTGRES_DB: blinko
            POSTGRES_PASSWORD: blinkopass
            POSTGRES_USER: blinkouser
        healthcheck:
            interval: 10s
            retries: 10
            test:
                - CMD
                - pg_isready
                - -q
                - -d
                - blinko
                - -U
                - blinkouser
            timeout: 45s
        image: postgres:17.3@sha256:6e3358e46e34dae6c184f48fd06fe1b3dbf958ad5b83480031907e52b9ec2a7d
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/blinko/data/db:/var/lib/postgresql/data:rw
version: "3.7"


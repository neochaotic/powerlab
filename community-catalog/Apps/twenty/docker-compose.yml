name: twenty
services:
    db:
        environment:
            POSTGRES_DB: default
            POSTGRES_PASSWORD: postgres
            POSTGRES_USER: postgres
        healthcheck:
            interval: 10s
            retries: 10
            test: pg_isready -U postgres -h localhost -d postgres
            timeout: 30s
        image: postgres:16.8@sha256:74e7a26f7db1d5bbce23b4132fb4855ed0987ec9dc44f6d078ba8800892dc927
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/twenty/data/db-data:/var/lib/postgresql/data
    redis:
        image: redis:7.4.2@sha256:bd41d55aae1ecff61b2fafd0d66761223fe94a60373eb6bb781cfbb570a84079
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/twenty/data/redis:/data
    server:
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_started
        environment:
            APP_SECRET: 2Gn5puuVCH0SI386E9RqOqHm0hGIAyrB
            NODE_PORT: 3000
            PG_DATABASE_URL: postgres://postgres:postgres@twenty_db_1:5432/default
            REDIS_URL: redis://twenty_redis_1:6379
            SERVER_URL: http://${DEVICE_DOMAIN_NAME}:2020
        healthcheck:
            interval: 10s
            retries: 10
            start_period: 120s
            test: curl --fail http://localhost:3000/healthz
            timeout: 30s
        image: twentycrm/twenty:v1.20.0@sha256:b3120df567a73c849a7a1ae58fa4f3d7bdd5072939312be702375960ed601557
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/twenty/data/server-local-data:/app/packages/twenty-server/.local-storage
            - /DATA/PowerLabAppData/twenty/data/docker-data:/app/docker-data
    worker:
        command:
            - yarn
            - worker:prod
        depends_on:
            db:
                condition: service_healthy
            server:
                condition: service_healthy
        environment:
            APP_SECRET: 2Gn5puuVCH0SI386E9RqOqHm0hGIAyrB
            DISABLE_CRON_JOBS_REGISTRATION: "true"
            DISABLE_DB_MIGRATIONS: "true"
            PG_DATABASE_URL: postgres://postgres:postgres@twenty_db_1:5432/default
            REDIS_URL: redis://twenty_redis_1:6379
            SERVER_URL: http://${DEVICE_DOMAIN_NAME}:2020
        image: twentycrm/twenty:v1.20.0@sha256:b3120df567a73c849a7a1ae58fa4f3d7bdd5072939312be702375960ed601557
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/twenty/data/server-local-data:/app/packages/twenty-server/.local-storage
version: "3.7"


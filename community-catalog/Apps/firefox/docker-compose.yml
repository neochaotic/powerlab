version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: firefox_server_1
      APP_PORT: 3000

  server:
    image: linuxserver/firefox:139.0.4@sha256:01c090309f63bc619a1df80bf14fdc87cb6fd922d956da48a968a60ab5a0df6d
    restart: on-failure
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
    shm_size: "1gb"

x-powerlab:
    store_app_id: firefox
    title:
        en_us: Firefox
    tagline:
        en_us: Firefox is a free and open-source web browser
    icon: https://getumbrel.github.io/umbrel-apps-gallery/firefox/icon.svg
    category: networking
    port_map: "3434"
    author: Mozilla Foundation
    developer: Mozilla Foundation
    source:
        catalog: umbrel-apps
        upstream_id: firefox
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 0299c400450d07fee62d3dcb0e6c24b00f359b51
        upstream_path: firefox/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T03:53:06Z"

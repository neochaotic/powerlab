name: linkwarden
services:
    app:
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            - DATABASE_URL=postgresql://postgres:linkwarden@linkwarden_postgres_1:5432/postgres
            - NEXTAUTH_URL=http://${DEVICE_DOMAIN_NAME}:8233/api/v1/auth
            - NEXTAUTH_SECRET=linkwarden
        image: ghcr.io/linkwarden/linkwarden:v2.14.1@sha256:31cf4bd2a2e111991fa5c9de03174c8698869c83722105c6ce529e4c911e6861
        ports:
            - 8233:3000
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/linkwarden/data/app:/data/data
    postgres:
        environment:
            - POSTGRES_PASSWORD=linkwarden
        healthcheck:
            interval: 10s
            retries: 5
            test:
                - CMD-SHELL
                - pg_isready -U postgres
            timeout: 5s
        image: postgres:16-alpine@sha256:0366402213df5db03c47ff80bcc697e92c8be0c213d03c941df1fc42d1ba9560
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/linkwarden/data/db:/var/lib/postgresql/data
version: "3.7"

x-powerlab:
    store_app_id: linkwarden
    title:
        en_us: Linkwarden
    tagline:
        en_us: Bookmark Preservation for Individuals and Teams
    description:
        en_us: '<div align="center"> <img src="./assets/logo.png" width="100px" /> <h1>Linkwarden</h1> <h3>Bookmarks, Evolved</h3> <a href="https://trendshift.io/repositories/4006" target="_blank"><img src="https://trendshift.io/api/badge/repositories/4006" alt="linkwarden%2Flinkwarden | Trendshift" style="width: 250px; height: 55px;" width="250" height="55"/></a> <a href="https://discord.com/invite/CtuYV47nuJ"><img src="https://img.shields.io/discord/1117993124669702164?logo=discord&style=flat" alt="Discord"></a> <a href="https://twitter.com/LinkwardenHQ"><img src="https://img.shields.io/twitter/follow/linkwarden" alt="Twitter"></a> <a href="https://news.ycombinator.com/item?id=43856801"><img src="https://img.shields.io/badge/Hacker%20News-301-%23FF6600"></img></a> <a href="https://github.com/linkwarden/linkwarden/releases"><img alt="GitHub release" src="https://img.shields.io/github/v/release/linkwarden/linkwarden"></a> <a href="https://crowdin.com/project/linkwarden"> <img src="https://badges.crowdin.net/linkwarden/localized.svg" alt="Crowdin" /></a> <a href="https://opencollective.com/linkwarden"><img src="https://img.shields.io/opencollective/all/linkwarden" alt="Open Collective"></a> </div> <div align=''center''> « LAUNCH DEMO » Cloud · Website · Features · Docs <img src="./assets/home.png" /> </div> Intro & motivation **Linkwarden is a self-hosted, open-source collaborative bookmark manager to collect, read, annotate, and fully preserve what matters, all in one place.** The objective is to organize useful webpages and articles you find across the web in one place, and since useful webpages can go away (see the inevitability of Link Rot), Linkwarden also saves a copy of each webpage as a Screenshot and PDF, ensuring accessibility even if the original content is no longer available. In addition to preservation, Linkwarden provides a user-friendly reading and annotation experience that blends the simplicity of a “read-it-later” tool with the reliability of a web archive. Whether you’re highlighting key ideas, jotting down thoughts, or revisiting content long after it’s disappeared from the web, Linkwarden keeps your knowledge accessible and organized. Linkwarden is also…'

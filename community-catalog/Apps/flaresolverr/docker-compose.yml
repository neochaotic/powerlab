name: flaresolverr
services:
    server:
        environment:
            LOG_LEVEL: info
        image: ghcr.io/flaresolverr/flaresolverr:v3.4.6@sha256:7962759d99d7e125e108e0f5e7f3cdbcd36161776d058d1d9b7153b92ef1af9e
        restart: on-failure
    web:
        environment:
            - URL=http://server:8191/v1
        healthcheck:
            interval: 30s
            retries: 3
            start_period: 40s
            test:
                - CMD
                - curl
                - -f
                - http://localhost:8000/health
            timeout: 10s
        image: mrsunglasses/flaresolverr-status:0.0.2@sha256:5a12b6ee183b64b87546b5f30537abaf333f7b2cd83856e6e2bcca874d165dc9
        ports:
            - 8191:8000
        restart: on-failure


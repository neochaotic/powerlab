    store_app_id: kiwix
    title:
        en_us: Kiwix
    tagline:
        en_us: Access knowledge anytime, anywhere without an internet connection
    description:
        en_us: 'Kiwix tools The Kiwix tools is a collection of Kiwix related command line tools: * kiwix-manage: Manage XML based library of ZIM files * kiwix-search: Full text search in ZIM files * kiwix-serve: HTTP daemon serving ZIM files [](https://download.kiwix.org/release/kiwix-tools/) [](https://github.com/kiwix/kiwix-tools/wiki/Repology) [](https://ghcr.io/kiwix/kiwix-tools) ) [](https://github.com/kiwix/kiwix-tools/actions/workflows/ci.yml?query=branch%3Amain) [](https://kiwix-tools.readthedocs.org/en/latest/?badge=latest) [](https://www.codefactor.io/repository/github/kiwix/kiwix-tools) [](https://www.gnu.org/licenses/gpl-3.0) Disclaimer This document assumes you have a little knowledge about software compilation. If you experience difficulties with the dependencies or with the Kiwix tools compilation itself, we recommend to have a look to kiwix-build. Preamble Although the Kiwix tools can be compiled/cross-compiled on/for many systems, the following documentation explains how to do it on POSIX ones. It is primarily thought for GNU/Linux systems and has been tested on recent releases of Debian/Ubuntu and Fedora. Dependencies The Kiwix tools rely on a few third party software libraries. They are prerequisites to the Kiwix tools compilation. Therefore, following libraries need to be available: * libkiwix (package on Debian/Ubuntu) * libzim (package on Debian/Ubuntu) These dependencies may or may not be packaged by your operating system. They may also be packaged but only in an older version. They may be also packaged but without providing a static version. The compilation script will tell you if one of…'

name: kiwix
services:
    web:
        command: |
            /data/*.zim -k
        image: ghcr.io/kiwix/kiwix-serve:3.8.2@sha256:0b6541355b250c6b45d2d7725e88f22f1d6a0f45ad9480d9c0bd4bc58436a12f
        ports:
            - 8898:8080
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/data/storage/downloads:/data
version: "3.7"


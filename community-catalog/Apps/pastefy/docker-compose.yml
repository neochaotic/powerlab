version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: pastefy_app_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  db:
    image: mariadb:11.4.5@sha256:5dfb3093333fa0ea53194ddef0a2bfa21d3b1e1353bd228b22610cd6fc0c04da
    user: "1000:1000"
    environment:
      MYSQL_ROOT_PASSWORD: "tyooe"
      MYSQL_DATABASE: "pastefy"
      MYSQL_USER: "pastefy"
      MYSQL_PASSWORD: "tyooe"
    volumes:
      - ${APP_DATA_DIR}/data/db:/var/lib/mysql:rw
    restart: on-failure

  app:
    image: interaapps/pastefy:7.1.6@sha256:353ce246ccf24ab1dec42e3c387744b47925065c207699f0bf1ce8e560619ca9
    user: "1000:1000"
    environment:
      HTTP_SERVER_CORS: "*"
      DATABASE_DRIVER: "mysql"
      DATABASE_NAME: "pastefy"
      DATABASE_USER: "pastefy"
      DATABASE_PASSWORD: "tyooe"
      DATABASE_HOST: "pastefy_db_1"
      DATABASE_PORT: "3306"
      SERVER_NAME: "http://${DEVICE_DOMAIN_NAME}:9900"
      # OAUTH2_PROVIDER_CLIENT_ID: 
      # OAUTH2_PROVIDER_CLIENT_SECRET: 
    restart: on-failure
    depends_on:
      - db

x-powerlab:
    store_app_id: pastefy
    title:
        en_us: Pastefy
    tagline:
        en_us: An easy paste for seamless sharing
    icon: https://getumbrel.github.io/umbrel-apps-gallery/pastefy/icon.svg
    category: developer
    port_map: "9900"
    author: InteraApps
    developer: InteraApps
    source:
        catalog: umbrel-apps
        upstream_id: pastefy
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 0299c400450d07fee62d3dcb0e6c24b00f359b51
        upstream_path: pastefy/umbrel-app.yml
        transform_version: "1.0"

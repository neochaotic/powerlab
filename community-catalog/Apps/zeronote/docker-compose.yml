x-powerlab:
    store_app_id: zeronote
    title:
        en_us: ZeroNote
    tagline:
        en_us: All your notes, passwords, bookmarks, and 2FA in one secure, offline-first app
    description:
        en_us: 'ZeroNote: One Notes App for Everything ZeroNote is an open-source, offline-first unified app that replaces your password manager, bookmark manager, notes app, and 2FA authenticator with a single encrypted note-taking system powered by smart tags, where everything is stored locally on your device with zero-knowledge encryption and optional peer-to-peer or S3 sync. **Stop juggling multiple apps.** One password manager. One bookmark manager. One notes app. One cloud service. One subscription. One privacy concern after another. **ZeroNote simplifies your digital life** with a single, intelligent note system that becomes whatever you need—password vault, bookmark organizer, document storage, or personal knowledge base. Everything is just a note with smart tags. Why ZeroNote? Your Data, Your Control In a world where companies control your passwords, notes, and bookmarks—**ZeroNote puts you back in charge.** - **Offline-First**: Works completely without internet. Your data lives on your device, not someone''s cloud. - **P2P Sync**: Share between your devices directly using peer-to-peer—no servers, no middlemen. - **S3 Backup**: Want cloud backup? Use your own S3 storage. Not theirs. - **Zero-Knowledge Encryption**: Even if someone gets your backup, they can''t read it without your master password. **The only person who should hold your data is you.** One App,…'

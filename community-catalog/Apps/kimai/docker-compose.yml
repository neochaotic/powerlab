name: kimai
services:
    app:
        depends_on:
            - db
        environment:
            ADMINMAIL: umbrel@umbrel.local
            ADMINPASS: changeme
            DATABASE_URL: mysql://kimaiuser:${APP_PASSWORD}@kimai_db_1/kimai?charset=utf8mb4&serverVersion=8.3.0
        image: kimai/kimai2:apache-2.56.0@sha256:16204b18bb3dad54d249027f5bdf6b5a70d7e60ddac7c9f6b34e9f29dbdef2b9
        ports:
            - 8734:8001
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/kimai/data/app:/opt/kimai/var/data
            - /DATA/PowerLabAppData/kimai/data/app/plugins:/opt/kimai/var/plugins
    db:
        environment:
            MYSQL_DATABASE: kimai
            MYSQL_PASSWORD: $APP_PASSWORD
            MYSQL_ROOT_PASSWORD: $APP_PASSWORD
            MYSQL_USER: kimaiuser
        healthcheck:
            interval: 20s
            retries: 3
            start_period: 10s
            test: mysqladmin -p$$MYSQL_ROOT_PASSWORD ping -h localhost
            timeout: 10s
        image: mariadb:11.4.5@sha256:5dfb3093333fa0ea53194ddef0a2bfa21d3b1e1353bd228b22610cd6fc0c04da
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/kimai/data/db:/var/lib/mysql
version: "3.7"


        en_us: "Excalidraw Persist A self-hostable app with server-side persistence and multiple boards based on Excalidraw. <img width=\"1440\" height=\"790\" alt=\"Screenshot\" src=\"https://github.com/user-attachments/assets/18f0f065-58d1-42d8-94d6-b29531b4b685\" /> Features - \U0001F4BE Server-side persistence of drawings, images, library objects - \U0001F4D1 Multiple boards/tabs support - \U0001F5D1️ Trash functionality for deleted boards - \U0001F5C3️ SQLite database for simple deployment TODO - [ ] Collaboration support Development This project uses pnpm workspaces as a monorepo. Make sure to create a file with necessary values. You can take a look at as a starting point. Prerequisites - Node.js (v22 or newer) - pnpm (v10 or newer) - Git Deployment Options Option 1: Docker (Recommended) The easiest way to deploy Excalidraw Persist is using Docker and Docker Compose. Prerequisites - Docker - Docker Compose Deployment Steps 1. Clone the repository: 2. Start the containers: 3. Access the application at (or your server's IP/domain) or run 1. 2. Access the application at (or your server's IP/domain) Using npm Scripts There are some convenience scripts included in the root : - - Build the Docker images - - Start the containers in detached mode - - Stop and remove the containers - - View the container logs in follow mode Configuration The Docker setup uses…"

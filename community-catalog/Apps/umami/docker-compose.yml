name: umami
services:
    app:
        depends_on:
            - db
        environment:
            APP_SECRET: ${APP_SEED}
            DATABASE_TYPE: postgresql
            DATABASE_URL: postgresql://umami:umami@umami_db_1:5432/umami
        image: ghcr.io/umami-software/umami:3.1.0@sha256:e3f80c0625aad7179b49da27d475357cabb1068b8cacd9a792cfd6966888b123
        ports:
            - 25727:3000
        restart: on-failure
        stop_grace_period: 1m
        user: 1001:1001
    db:
        environment:
            POSTGRES_DB: umami
            POSTGRES_PASSWORD: umami
            POSTGRES_USER: umami
        image: postgres:15-alpine@sha256:8a8d55343d6fc456cb183453e3094ff140b984157b36b48f817dd581654f2aec
        restart: on-failure
        stop_grace_period: 1m
        volumes:
            - /DATA/PowerLabAppData/umami/data/db:/var/lib/postgresql/data
version: "3.7"

x-powerlab:
    store_app_id: umami
    title:
        en_us: Umami
    tagline:
        en_us: Simple, fast, privacy-focused alternative to Google Analytics
    icon: https://getumbrel.github.io/umbrel-apps-gallery/umami/icon.svg
    category: developer
    port_map: "25727"
    author: Umami
    developer: Umami
    source:
        catalog: umbrel-apps
        upstream_id: umami
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 8a60bdaddda5062fa19b2b13a47966de5af986cf
        upstream_path: umami/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T15:43:49Z"

version: "3.7"

services:
  app:
    image: ghcr.io/umami-software/umami:3.1.0@sha256:e3f80c0625aad7179b49da27d475357cabb1068b8cacd9a792cfd6966888b123
    user: "1001:1001"
    restart: on-failure
    stop_grace_period: 1m
    ports:
      - 25727:3000
    environment:
      DATABASE_URL: postgresql://umami:umami@umami_db_1:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${APP_SEED}
    depends_on:
      - db

  db:
    image: postgres:15-alpine@sha256:8a8d55343d6fc456cb183453e3094ff140b984157b36b48f817dd581654f2aec
    restart: on-failure
    stop_grace_period: 1m
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami
    volumes:
      - ${APP_DATA_DIR}/data/db:/var/lib/postgresql/data

x-powerlab:
    store_app_id: umami
    title:
        en_us: Umami
    tagline:
        en_us: Simple, fast, privacy-focused alternative to Google Analytics
    icon: https://getumbrel.github.io/umbrel-apps-gallery/umami/icon.svg
    category: developer
    port_map: "25727"
    author: Umami
    developer: Umami
    source:
        catalog: umbrel-apps
        upstream_id: umami
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 0299c400450d07fee62d3dcb0e6c24b00f359b51
        upstream_path: umami/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T03:53:18Z"

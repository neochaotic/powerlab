        en_us: An intelligent way to organize tasks and chores
    description:
        en_us: '<img src="assets/icon.png" alt="drawing" width="45"/>Donetick **Simplify Tasks & Chores, Together!** Donetick is an open-source, user-friendly app designed to help you organize tasks and chores effectively. featuring customizable options to help you and others stay organized [](https://discord.gg/6hSH6F33q7) [](https://www.reddit.com/r/donetick) Features Task & Chore Management **Collaborative**: Create and manage tasks either solo or with family and friends. You can create a group and share or assign some of the tasks or chores with others. **Natural Language Task Creation**: Describe what you need to do in plain English. Donetick automatically extracts dates, times, and recurrence patterns from phrases like “Change water filter every 6 months” or “Take the trash out every Monday and Tuesday at 6:15 pm.” **Task Advanced Scheduling**: - Supports flexible scheduling: daily, weekly, monthly, yearly, specific months, specific days of the week, or even adaptive scheduling — where Donetick learns from historical completions to suggest due dates automatically. - Due Date vs Completion Date Based Recurrence: Choose whether recurring tasks should be scheduled from the previous due date (ideal for a consistent cadence) or from the actual completion date (useful when tasks are often delayed). - Assignee Rotation: Automatically rotate task assignments based on who has completed the fewest tasks, randomly, or…'

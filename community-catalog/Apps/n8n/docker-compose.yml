name: n8n
services:
    server:
        environment:
            - PUID=1000
            - PGID=1000
            - N8N_HOST=$DEVICE_DOMAIN_NAME
            - N8N_SECURE_COOKIE=false
            - N8N_DIAGNOSTICS_ENABLED=false
            - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
            - N8N_RUNNERS_ENABLED=true
        image: n8nio/n8n:2.21.0@sha256:4b8acf6a9e21ee4234850557b3c1c46b940f4025a8ddb0f697f858b788103ebe
        ports:
            - 5678:5678
        restart: on-failure
        stop_grace_period: 1m
        volumes:
            - /DATA/PowerLabAppData/n8n/data:/home/node/.n8n
version: "3.7"

x-powerlab:
    store_app_id: n8n
    title:
        en_us: n8n
    tagline:
        en_us: Build complex workflows, really fast
    icon: https://getumbrel.github.io/umbrel-apps-gallery/n8n/icon.svg
    category: automation
    port_map: "5678"
    author: n8n
    developer: n8n
    main: server
    source:
        catalog: umbrel-apps
        upstream_id: n8n
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git

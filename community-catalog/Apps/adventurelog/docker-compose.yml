name: adventurelog
services:
    db:
        environment:
            POSTGRES_DB: database
            POSTGRES_PASSWORD: adventure
            POSTGRES_USER: adventure
        image: ghcr.io/baosystems/postgis:15-3.5@sha256:ac619116c8ee81a386eb878956950d798b57c502985c12eb6e7be1598aa8d02f
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/adventurelog/data/db:/var/lib/postgresql/data/
    server:
        container_name: adventurelogserver1
        depends_on:
            - db
        environment:
            - PGHOST=adventurelog_db_1
            - PGDATABASE=database
            - PGUSER=adventure
            - PGPASSWORD=adventure
            - SECRET_KEY=adventure
            - DJANGO_ADMIN_USERNAME=admin
            - DJANGO_ADMIN_PASSWORD=admin
            - DJANGO_ADMIN_EMAIL=admin@example.com
            - PUBLIC_URL=http://${DEVICE_DOMAIN_NAME}:8016
            - CSRF_TRUSTED_ORIGINS=http://${DEVICE_DOMAIN_NAME}:8015
            - DEBUG=False
            - FRONTEND_URL=http://${DEVICE_DOMAIN_NAME}:8015
        image: ghcr.io/seanmorley15/adventurelog-backend:v0.12.0@sha256:68725d6a3692333e0049607f32078e865e95ebdb8a13e0c5512a01ef766770ae
        ports:
            - 8016:80
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/adventurelog/data/app:/code/media/
    web:
        depends_on:
            - server
        environment:
            BODY_SIZE_LIMIT: Infinity
            ORIGIN: http://${DEVICE_DOMAIN_NAME}:8015
            PUBLIC_SERVER_URL: http://adventurelogserver1:8000
        image: ghcr.io/seanmorley15/adventurelog-frontend:v0.12.0@sha256:9aa653603eb1305f3c34c61bc99b40a394295aed3fecd8c9777a9e5c04c7155e
        ports:
            - 8015:3000
        restart: on-failure
version: "3.7"

x-powerlab:
    store_app_id: adventurelog
    title:
        en_us: AdventureLog
    tagline:
        en_us: Self-hostable travel tracker and trip planner
    description:
        en_us: "<div align=\"center\"> <img src=\"brand/adventurelog.png\" alt=\"logo\" width=\"200\" height=\"auto\" /> <h1>AdventureLog</h1> <p> The ultimate travel companion for the modern-day explorer. </p> <h4> <a href=\"https://demo.adventurelog.app\">View Demo</a> <span> · </span> <a href=\"https://adventurelog.app\">Documentation</a> <span> · </span> <a href=\"https://discord.gg/wRbQ9Egr8C\">Discord</a> <span> · </span> <a href=\"https://seanmorley.com/sponsor\">Support \U0001F496</a> </h4> </div> <br /> <!-- Table of Contents --> Table of Contents - About the Project - Screenshots - Tech Stack - Features - Roadmap - Contributing - Translation - License - Contact - Acknowledgements - Supporters <!-- About the Project --> ⭐ About the Project Starting from a simple idea of tracking travel locations, AdventureLog has grown into a full-fledged travel companion. With AdventureLog, you can log your adventures, keep track of where you've been on the world map, plan your next trip collaboratively, and share your experiences with friends and family. AdventureLog was created to solve a problem: the lack of a modern, open-source, user-friendly travel companion. Many existing travel apps are either too complex, too expensive, or too closed-off to be useful for the average traveler. AdventureLog aims to be the opposite: simple, beautiful, and open to everyone. <!-- Screenshots --> \U0001F4F7 Screenshots <div align=\"center\"> <img src=\"./brand/screenshots/adventures.png\" alt=\"Locations\" /> <p>Displays the locations you have visited and the ones…"
    icon: https://getumbrel.github.io/umbrel-apps-gallery/adventurelog/icon.svg

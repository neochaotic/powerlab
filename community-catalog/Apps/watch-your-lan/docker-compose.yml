name: watch-your-lan
services:
    web:
        environment:
            HOST: 0.0.0.0
            IFACES: eth0 wlan0 enp1s0
            PORT: "8840"
            TZ: UTC
        image: aceberg/watchyourlan:2.1.4@sha256:f77532ca7c3c9a4398cb094df7674013a3d7fcf4699386f1e456c24df6fef00e
        init: true
        network_mode: host
        restart: on-failure
        stop_grace_period: 1m
        volumes:
            - /DATA/PowerLabAppData/watch-your-lan/data:/data/WatchYourLAN
version: "3.7"

x-powerlab:
    store_app_id: watch-your-lan
    title:
        en_us: WatchYourLAN
    tagline:
        en_us: Lightweight network IP scanner
    description:
        en_us: '<h1><a href="https://github.com/aceberg/WatchYourLAN"> <img src="https://raw.githubusercontent.com/aceberg/WatchYourLAN/main/assets/logo.png" width="20" /> </a>WatchYourLAN</h1> <br/> [](https://github.com/aceberg/WatchYourLAN/actions/workflows/main-docker-all.yml) [](https://goreportcard.com/report/github.com/aceberg/WatchYourLAN) [](https://hub.docker.com/r/aceberg/watchyourlan) [](https://github.com/aceberg/WatchYourLAN/discussions) <a href="https://trendshift.io/repositories/11642" target="_blank"><img src="https://trendshift.io/api/badge/repositories/11642" alt="aceberg%2FWatchYourLAN | Trendshift" style="width: 250px; height: 55px;" width="250" height="55"/></a> Lightweight network IP scanner with web GUI. Features: - Send notification when new host is found - Monitor hosts online/offline history - Keep a list of all hosts in the network - Send data to or to make a dashboard > [!IMPORTANT] > Please, consider making a donation. Even $10 will make a difference to me. More screenshots <details> <summary>Expand</summary> </details> Quick start <details> <summary>Expand</summary> Replace with correct time zone and with network interface you want to scan. Network mode must be . Set for container to save data: Web GUI should be at http://localhost:8840 </details> Auth <details> <summary>Expand</summary> **WatchYourLAN** does not have built-in auth option. But you can use it with SSO tools like Authelia, or my simple auth app ForAuth. Here is an example docker-compose-auth.yml. > :warning: **WARNING!** > Please, don''t forget that WYL needs network mode to work. So, WYL port will be exposed in this setup. You need to limit access to it with firewall or other measures. </details> Install on Linux <details> <summary>Expand</summary> All binary packages can be found in…'

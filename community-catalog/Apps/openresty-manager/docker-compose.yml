name: openresty-manager
services:
    web:
        environment:
            - OM_USE_HTTPS=no
            - NGINX_RESOLVER=resolver 127.0.0.11 valid=30s ipv6=off local=on;
            - PUID=1000
            - PGID=1000
        hostname: openresty-manager_web_1
        image: uusec/openresty-manager:2.4.2@sha256:008cdf48b77961e04120863991c83fb6fdcfe6b19057281a4e411f283502b26b
        ports:
            - 3080:80
            - 3443:443
        restart: on-failure
        volumes:
            - /etc/localtime:/etc/localtime:ro
            - /DATA/PowerLabAppData/openresty-manager/data/acme:/opt/om/acme
            - /DATA/PowerLabAppData/openresty-manager/data/data:/opt/om/data
            - /DATA/PowerLabAppData/openresty-manager/data/conf:/opt/om/nginx/conf
            - /DATA/PowerLabAppData/openresty-manager/data/logs:/opt/om/nginx/logs
version: "3.7"


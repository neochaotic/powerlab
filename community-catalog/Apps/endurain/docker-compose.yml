name: endurain
services:
    app:
        depends_on:
            db:
                condition: service_healthy
        environment:
            BEHIND_PROXY: "true"
            DB_HOST: endurain_db_1
            DB_PASSWORD: endurain
            DB_PORT: 5432
            DB_TYPE: postgres
            GID: "1000"
            SECRET_KEY: ${APP_PASSWORD}
            UID: "1000"
        image: ghcr.io/endurain-project/endurain:v0.17.7@sha256:af3d2b50667c081211e9af6b3590f6cbfbaacb73f63910902574f9d65c24b346
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/endurain/data/app:/app/backend/data
            - /DATA/PowerLabAppData/endurain/data/logs:/app/backend/logs
    db:
        environment:
            PGDATA: /var/lib/postgresql/data/pgdata
            POSTGRES_DB: endurain
            POSTGRES_PASSWORD: endurain
            POSTGRES_USER: endurain
        healthcheck:
            interval: 5s
            retries: 5
            test:
                - CMD-SHELL
                - pg_isready -U endurain
            timeout: 5s
        image: postgres:17.4@sha256:4aed4b0525233308fc5de1b8d47f92326460d598dc5f004d14b41f183360b4e9
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/endurain/data/db:/var/lib/postgresql/data
version: "3.7"

x-powerlab:
    store_app_id: endurain
    title:
        en_us: Endurain
    tagline:
        en_us: Fitness tracking, Open Source, Self-Hosted
    icon: https://getumbrel.github.io/umbrel-apps-gallery/endurain/icon.svg
    category: social
    port_map: "8865"

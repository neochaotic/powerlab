name: penpot
services:
    penpot-backend:
        depends_on:
            - penpot-postgres
            - penpot-valkey
        environment:
            - PENPOT_FLAGS=enable-registration enable-login-with-password disable-email-verification disable-smtp enable-prepl-server disable-secure-session-cookies
            - PENPOT_SECRET_KEY=${APP_SEED}
            - PENPOT_DATABASE_URI=postgresql://penpot-postgres/penpot
            - PENPOT_DATABASE_USERNAME=penpot
            - PENPOT_DATABASE_PASSWORD=penpot
            - PENPOT_REDIS_URI=redis://penpot-valkey/0
            - PENPOT_ASSETS_STORAGE_BACKEND=assets-fs
            - PENPOT_STORAGE_ASSETS_FS_DIRECTORY=/opt/data/assets
            - PENPOT_TELEMETRY_ENABLED=false
            - PENPOT_PUBLIC_URI=http://${DEVICE_DOMAIN_NAME}:${APP_PENPOT_UI_PORT}
        image: penpotapp/backend:2.15.3@sha256:7f16f70119a17b0f8abb90cd3fe800bbb5bc4472729cc1454775c2eb8d4f4803
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/penpot/data/assets:/opt/data/assets
    penpot-exporter:
        environment:
            - PENPOT_SECRET_KEY=${APP_SEED}
            - PENPOT_PUBLIC_URI=http://penpot-frontend
            - PENPOT_REDIS_URI=redis://penpot-valkey/0
        image: penpotapp/exporter:2.15.3@sha256:6c982fd76a1b8ded11ff650eb8abb063e9a37e7eb7b1152f875a8233bdee34b0
        restart: on-failure
        user: 1000:1000
    penpot-frontend:
        depends_on:
            - penpot-backend
            - penpot-exporter
            - penpot-mcp
        environment:
            - PENPOT_FLAGS=enable-registration enable-login-with-password
        image: penpotapp/frontend:2.15.3@sha256:ea3bb808a1439bd27e698f08e3b6d502a0e6cef9acb703b74ce0fb3aae882b72
        ports:
            - 9001:8080
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/penpot/data/assets:/opt/data/assets
    penpot-mcp:
        image: penpotapp/mcp:2.15.3@sha256:4535bd5d58e13a1e20beb6fc932b8013c4f0178d3e7e6b46b974e90fd00f71c4
        restart: on-failure
        user: 1000:1000
    penpot-postgres:
        environment:
            - POSTGRES_INITDB_ARGS=--data-checksums
            - POSTGRES_DB=penpot
            - POSTGRES_USER=penpot
            - POSTGRES_PASSWORD=penpot
        image: postgres:15@sha256:546445ad21cb5893c0997080b831ee45945e798c4359270e16413c8bd93575db
        restart: on-failure
        stop_signal: SIGINT
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/penpot/data/postgres:/var/lib/postgresql/data
    penpot-valkey:
        healthcheck:
            interval: 1s
            retries: 5
            start_period: 3s
            test:
                - CMD-SHELL
                - valkey-cli ping | grep PONG
            timeout: 3s
        image: valkey/valkey:8.1.3@sha256:facc1d2c3462975c34e10fccb167bfa92b0e0dbd992fc282c29a61c3243afb11
        restart: on-failure
        user: 1000:1000
version: "3.7"


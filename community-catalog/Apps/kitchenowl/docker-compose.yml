name: kitchenowl
services:
    db:
        environment:
            POSTGRES_DB: kitchenowl
            POSTGRES_PASSWORD: password
            POSTGRES_USER: kitchenowl
        healthcheck:
            interval: 30s
            retries: 5
            start_period: 80s
            test:
                - CMD-SHELL
                - pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
            timeout: 60s
        image: postgres:17.4@sha256:fe3f571d128e8efadcd8b2fde0e2b73ebab6dbec33f6bfe69d98c682c7d8f7bd
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/kitchenowl/data/kitchenowl_db:/var/lib/postgresql/data
    web:
        depends_on:
            - db
        environment:
            DB_DRIVER: postgresql
            DB_HOST: db
            DB_NAME: kitchenowl
            DB_PASSWORD: password
            DB_USER: kitchenowl
            JWT_SECRET_KEY: ${APP_PASSWORD}
        image: tombursch/kitchenowl:v0.7.8@sha256:9f8d7e7849c68b3b516c92938b0489dc6173568f266c48e429556de0cb9d8d82
        ports:
            - 8474:8080
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/kitchenowl/data/kitchenowl_files:/data
version: "3.7"


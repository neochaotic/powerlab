name: localai
services:
    api:
        environment:
            - MODELS_PATH=/models
        healthcheck:
            interval: 1m
            retries: 5
            test:
                - CMD
                - curl
                - -f
                - http://localhost:8080/readyz
            timeout: 20m
        image: localai/localai:v4.2.6@sha256:c41d534c4cae8f2e51b99e6dae48a221f2c3d9e0cefd02736283dbce2fc63dcd
        ports:
            - 8793:8080
        volumes:
            - /DATA/PowerLabAppData/localai/data/models:/models:cached
            - /DATA/PowerLabAppData/localai/data/backends:/backends:cached
            - /DATA/PowerLabAppData/localai/data/data:/data:cached
            - /DATA/PowerLabAppData/localai/data/configuration:/configuration:cached
            - /DATA/PowerLabAppData/localai/data/images/:/tmp/generated/images/
version: "3.7"

x-powerlab:
    store_app_id: localai
    title:
        en_us: LocalAI
    tagline:
        en_us: Drop-in OpenAI replacement
    icon: https://getumbrel.github.io/umbrel-apps-gallery/localai/icon.svg
    category: ai
    port_map: "8793"
    author: Ettore Di Giacinto
    developer: Ettore Di Giacinto
    main: api
    source:
        catalog: umbrel-apps
        upstream_id: localai
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 7d224ca6c493d2279a49086ed9e7bf45d642d9e6
        upstream_path: localai/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-18T10:13:43Z"

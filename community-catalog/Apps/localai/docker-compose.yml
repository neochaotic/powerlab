name: localai
services:
    api:
        environment:
            - MODELS_PATH=/models
        healthcheck:
            interval: 1m
            retries: 5
            test:
                - CMD
                - curl
                - -f
                - http://localhost:8080/readyz
            timeout: 20m
        image: localai/localai:v4.1.3@sha256:a6af99e17a73a92caa134e70ae84492cc47b67645c1676268a7522ad14f4c09d
        volumes:
            - /DATA/PowerLabAppData/localai/data/models:/models:cached
            - /DATA/PowerLabAppData/localai/data/images/:/tmp/generated/images/
version: "3.7"

x-powerlab:
    store_app_id: localai
    title:
        en_us: LocalAI
    tagline:
        en_us: Drop-in OpenAI replacement
    icon: https://getumbrel.github.io/umbrel-apps-gallery/localai/icon.svg
    category: ai
    port_map: "8793"
    author: Ettore Di Giacinto
    developer: Ettore Di Giacinto
    source:
        catalog: umbrel-apps
        upstream_id: localai
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 8a60bdaddda5062fa19b2b13a47966de5af986cf
        upstream_path: localai/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T15:02:19Z"

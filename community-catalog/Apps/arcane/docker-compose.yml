name: arcane
services:
    arcane:
        depends_on:
            - docker
        environment:
            APP_URL: http://${DEVICE_DOMAIN_NAME}:3552
            ENCRYPTION_KEY: ${APP_PASSWORD}
            JWT_SECRET: ${APP_PASSWORD}
            PGID: 1000
            PUID: 1000
        image: ghcr.io/getarcaneapp/arcane:v1.19.4@sha256:df4345bcd39a1b442082568f96e0a8d8f1c31061d455acd0bbc6b3f8f385e9c6
        ports:
            - 3552:3552
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/arcane/data/app_data:/app/data
            - /DATA/PowerLabAppData/arcane/data/projects:/app/data/projects
            - /DATA/PowerLabAppData/arcane/data/docker:/var/run
    docker:
        command: |
            dockerd
              --bridge dind0
              --data-root /data/data
              --exec-root /data/exec
              --host unix:///data/docker.sock
              --pidfile /data/docker.pid
        entrypoint: /entrypoint.sh
        environment:
            DOCKER_ENSURE_BRIDGE: dind0:10.32.0.1/16
        image: docker:27.2.0-dind@sha256:f9f72ad901a78f27be922b2d320bbc263174f12919c1b37e6a01f828fa904565
        network_mode: host
        privileged: true
        restart: on-failure
        stop_grace_period: 1m
        volumes:
            - /DATA/PowerLabAppData/arcane/entrypoint.sh:/entrypoint.sh
            - /DATA/PowerLabAppData/arcane/data/docker:/data
version: "3.7"


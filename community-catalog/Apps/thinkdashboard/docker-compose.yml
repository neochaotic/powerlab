        en_us: "ThinkDashboard A lightweight, self-hosted bookmark dashboard built with Go and vanilla JavaScript. ✨ Features - **Minimalist Design**: Clean, text-based interface - **Keyboard Shortcuts**: Assign keys shortcuts to quickly open bookmarks - **Customizable Categories**: Organize bookmarks into categories - **Theme Support**: Dark and light themes - **Theme customization**: Full theme customization support with possibility to create infinite variants - **Responsive Design**: Works on desktop and mobile devices \U0001F5BC️ Screenshots | | | |--------------------------|--------------------------| | | | <p align=\"center\"> \U0001F4F1Mobile view<br> <img src=\"screenshots/5.png\" width=\"25%\"> <img src=\"screenshots/6.png\" width=\"25%\"> </p> \U0001F680 Quick Start Using Docker Compose Using Docker 1. Run the container: 3. Open your browser and navigate to Using Go 1. Clone the repository: 2. Install dependencies: 3. Run the application: 4. Open your browser and navigate to ⚙️ Configuration Access the configuration page by navigating to or clicking the \"config\" link in the top-right corner of the dashboard. *You can also access it by typing in the Search bar.* \U0001F3A8 Color Customization Access the color customization page by navigating to or clicking the \"customize colors\" in the config page. *You can also access it by typing in the Search bar.* ⌨️ Keyboard Shortcuts Assign keys shortcuts to your bookmarks for quick access.…"

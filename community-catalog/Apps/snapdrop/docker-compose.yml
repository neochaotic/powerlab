name: snapdrop
services:
  snapdrop:
    environment:
    - PGID=$PGID
    - PUID=$PUID
    - TZ=$TZ
    image: linuxserver/snapdrop:version-eac78009@sha256:54ef8d7543de2c699883af0c514db9064bbec05ff5f22d63342f90b953d7b138
    network_mode: bridge
    ports:
    - target: 443
      published: '443'
      protocol: tcp
    - target: 80
      published: '89'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/snapdrop/config
      target: /config
    privileged: false
version: '3.7'
x-powerlab:
  store_app_id: snapdrop
  title:
    en_us: Snapdrop
  tagline:
    en_us: Snapdrop
  category: System

version: "3.7"
services:
  app_proxy:
    environment:
      APP_HOST: chromium_chromium_1
      APP_PORT: 3000

  chromium:
    image: ghcr.io/linuxserver/chromium:version-8d3cb5f1@sha256:d7c5f7faf5fe524117fd73c4d446e1bf81bccd0d64d073a30b8c9819fdf105d6
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ${APP_DATA_DIR}/data:/config
    shm_size: "1gb"
    restart: on-failure

x-powerlab:
    store_app_id: chromium
    title:
        en_us: Chromium
    tagline:
        en_us: The open-source browser project
    icon: https://getumbrel.github.io/umbrel-apps-gallery/chromium/icon.svg
    category: networking
    port_map: "30099"
    author: The Chromium Project
    developer: The Chromium Project
    source:
        catalog: umbrel-apps
        upstream_id: chromium
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 0299c400450d07fee62d3dcb0e6c24b00f359b51
        upstream_path: chromium/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T03:53:05Z"

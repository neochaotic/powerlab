x-powerlab:
    store_app_id: databag
    title:
        en_us: Databag
    tagline:
        en_us: A tiny self-hosted federated messenger for the decentralized web
    description:
        en_us: '[](https://contribute.design/balzack/databag) <div align="center"> <a href="#"><img src="/doc/icon_v2.png" width="8%" style="border-radius:50%"></a> <h3 align="center">Databag</h3> <p align="center">A federated messenger for self-hosting</p> </div> <p align="center"> <a href="/doc/design_overview.md">-> Design Overview <-</a> </p> <br> <p align="center"> <a href="/doc/mobile.png"><img src="/doc/mobile.png" width="48%"/></a> &nbsp;&nbsp; <a href="/doc/browser.png"><img src="/doc/browser.png" width="48%"/></a> </p> <p align="center"> <sub>Mobile and Browser App Screens</sub> </p> <br> Databag is designed for efficiency, consuming minimal hosting resources. Notable features include: - Decentralized (direct communication between app and server node) - Federated (accounts on different nodes can communicate) - Public-Private key based identity (not bound to any blockchain or hosting domain) - End-to-End encryption (the hosting admin cannot view topics if sealed) - Audio and Video Calls (nat traversal requires separate relay server) - Topic based threads (messages organized by topic not contacts) - Unlimited participants (no limit on group thread members) - Lightweight (server can run on a raspberry pi zero v1.3) - Low latency (use of websockets for push events to avoid polling) - Unlimited accounts per node (host for your whole family) - Mobile alerts for new contacts, messages, and calls (supports UnifiedPush, FCM, APN) - Multi-Factor Authentication (integrates with TOTP apps) <br> <p align="center"> <a href="https://f-droid.org/en/packages/com.databag/"> <img src="/doc/fdroid.png" width="18%"> </a> <a href="https://apps.apple.com/us/app/databag/id6443741428"> <img src="/doc/astore.png" width="18%"> </a> <a href="https://play.google.com/store/apps/details?id=com.databag">…'
    icon: https://getumbrel.github.io/umbrel-apps-gallery/databag/icon.svg

    title:
        en_us: Budibase
    tagline:
        en_us: The low code platform you'll enjoy using
    icon: https://getumbrel.github.io/umbrel-apps-gallery/budibase/icon.svg
    category: developer
    port_map: "6733"
    author: Budibase
    developer: Budibase
    source:
        catalog: umbrel-apps
        upstream_id: budibase
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 0299c400450d07fee62d3dcb0e6c24b00f359b51
        upstream_path: budibase/umbrel-app.yml

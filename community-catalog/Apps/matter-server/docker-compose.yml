version: "3.7"

services:
  server:
    image: ghcr.io/matter-js/python-matter-server:8.1.2@sha256:6827e352011e2d8c2bde771e446fcf72acc49150ef66bad978816bac1762aad3
    restart: on-failure
    # Required for mDNS to work correctly
    network_mode: host
    # UI at default port 5580
    security_opt:
      # Needed for Bluetooth via dbus
      - apparmor:unconfined
    volumes:
      - ${APP_DATA_DIR}/data:/data/
      # Required for Bluetooth via D-Bus
      - /run/dbus:/run/dbus:ro

x-powerlab:
    store_app_id: matter-server
    title:
        en_us: Matter Server
    tagline:
        en_us: A Matter Controller Server over WebSockets
    description:
        en_us: "Open Home Foundation Matter Server The Open Home Foundation Matter Server is an officially certified Software Component to create a Matter controller. It serves as the foundation to provide Matter support to Home Assistant but its universal approach makes it suitable to be used in other projects too. This project implements a Matter Controller Server over WebSockets using the official Matter (formerly CHIP) SDK as a base and provides both a server and client implementation. > [!IMPORTANT] > We’re excited to share that the Matter Server is being rewritten on top of matter.js! \U0001F389 > This means that the current project has moved into **maintenance mode** — we’ll still fix important bugs if they come up, but all new features will land in the new project instead. > We’ll post a link as soon as the first **alpha version** is ready for you to try out. \U0001F680 The Open Home Foundation Matter Server software component is funded by Nabu Casa (a member of the CSA) and donated to The Open Home Foundation. Support For developers, making use of this component or contributing to it, use the issue tracker within this repository and/or reach out on discord. For users of Home…"
    icon: https://getumbrel.github.io/umbrel-apps-gallery/matter-server/icon.svg
    category: automation
    port_map: "5580"
    author: Home Assistant
    developer: Home Assistant
    source:
        catalog: umbrel-apps
        upstream_id: matter-server
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 0299c400450d07fee62d3dcb0e6c24b00f359b51
        upstream_path: matter-server/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T03:53:11Z"

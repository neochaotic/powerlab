name: homehub
services:
    web:
        environment:
            - FLASK_ENV=production
            - SECRET_KEY=${APP_SEED}
        image: ghcr.io/surajverma/homehub:0.2.3.2@sha256:7ffa2ed369b39bb090b6eae1ee7d27b803215939794107b3e4cbeede627338ec
        ports:
            - 5059:5000
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/homehub/data/uploads:/app/uploads
            - /DATA/PowerLabAppData/homehub/data/media:/app/media
            - /DATA/PowerLabAppData/homehub/data/pdfs:/app/pdfs
            - /DATA/PowerLabAppData/homehub/data/app_data:/app/data
            - /DATA/PowerLabAppData/homehub/data/config/config.yml:/app/config.yml:ro
version: "3.7"


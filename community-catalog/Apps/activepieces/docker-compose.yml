name: activepieces
services:
    app:
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_started
        environment:
            AP_API_KEY: ${APP_PASSWORD}
            AP_ENCRYPTION_KEY: ${APP_AP_ENCRYPTION_KEY}
            AP_ENGINE_EXECUTABLE_PATH: dist/packages/engine/main.js
            AP_ENVIRONMENT: prod
            AP_EXECUTION_MODE: UNSANDBOXED
            AP_FLOW_TIMEOUT_SECONDS: 600
            AP_FRONTEND_URL: http://${DEVICE_DOMAIN_NAME}:8146
            AP_JWT_SECRET: ${APP_PASSWORD}
            AP_POSTGRES_DATABASE: activepieces
            AP_POSTGRES_HOST: activepieces_db_1
            AP_POSTGRES_PASSWORD: activepieces
            AP_POSTGRES_PORT: 5432
            AP_POSTGRES_USERNAME: activepieces
            AP_REDIS_HOST: activepieces_redis_1
            AP_REDIS_PORT: 6379
            AP_TELEMETRY_ENABLED: "true"
            AP_TEMPLATES_SOURCE_URL: https://cloud.activepieces.com/api/v1/flow-templates
            AP_TRIGGER_DEFAULT_POLL_INTERVAL: 5
            AP_WEBHOOK_TIMEOUT_SECONDS: 30
        image: ghcr.io/activepieces/activepieces:0.83.0@sha256:fd21bb9a433d54ec708197826094a3f9e67d8dfa48cdc9ec7fd155c95a73986c
        ports:
            - 8146:80
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/activepieces/data/app/cache:/usr/src/app/cache
    db:
        environment:
            POSTGRES_DB: activepieces
            POSTGRES_PASSWORD: activepieces
            POSTGRES_USER: activepieces
        healthcheck:
            interval: 5s
            retries: 5
            test:
                - CMD-SHELL
                - pg_isready -U activepieces
            timeout: 5s
        image: postgres:17.4@sha256:4aed4b0525233308fc5de1b8d47f92326460d598dc5f004d14b41f183360b4e9
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/activepieces/data/db:/var/lib/postgresql/data
    redis:
        image: redis:7.4.3@sha256:ee8ec723c831b815c3e2f2c6fbd1c145c68d1c04ba284f044ec1434fbca0fee8
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/activepieces/data/redis:/data

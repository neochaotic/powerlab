name: file-browser
services:
    server:
        environment:
            - FB_PORT=80
            - FB_DATABASE=/database/filebrowser.db
            - FB_ROOT=/data
            - FB_NOAUTH=true
        image: filebrowser/filebrowser:v2.63.3@sha256:289c5dd677c56662440f26eeb44266ed9746fe563d2e9100f546bff558534d70
        ports:
            - 7421:80
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/file-browser/data:/database/
            - /DATA/PowerLabAppData/file-browser/data:/config/
            - /DATA/data/storage:/data
version: "3.7"

x-powerlab:
    store_app_id: file-browser
    title:
        en_us: File Browser
    tagline:
        en_us: Browse and manage the files you download on your Umbrel
    icon: https://getumbrel.github.io/umbrel-apps-gallery/file-browser/icon.svg
    category: files
    port_map: "7421"
    author: File Browser
    developer: File Browser
    source:
        catalog: umbrel-apps
        upstream_id: file-browser
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 8a60bdaddda5062fa19b2b13a47966de5af986cf
        upstream_path: file-browser/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T15:42:56Z"

version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: file-browser_server_1
      APP_PORT: 80

  server:
    image: filebrowser/filebrowser:v2.63.3@sha256:289c5dd677c56662440f26eeb44266ed9746fe563d2e9100f546bff558534d70
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data:/database/
      - ${APP_DATA_DIR}/data:/config/
      - ${UMBREL_ROOT}/data/storage:/data
    environment:
      - FB_PORT=80
      - FB_DATABASE=/database/filebrowser.db
      - FB_ROOT=/data
      - FB_NOAUTH=true

x-powerlab:
    store_app_id: file-browser
    title:
        en_us: File Browser
    tagline:
        en_us: Browse and manage the files you download on your Umbrel
    icon: https://getumbrel.github.io/umbrel-apps-gallery/file-browser/icon.svg
    category: files
    port_map: "7421"
    author: File Browser
    developer: File Browser
    source:
        catalog: umbrel-apps
        upstream_id: file-browser
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 0299c400450d07fee62d3dcb0e6c24b00f359b51

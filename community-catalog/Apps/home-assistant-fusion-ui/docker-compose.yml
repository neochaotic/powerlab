name: home-assistant-fusion-ui
services:
    web:
        environment:
            HASS_URL: http://${DEVICE_DOMAIN_NAME}:8123
        extra_hosts:
            - ${DEVICE_DOMAIN_NAME}:${APP_HAFUSION_MACHINE_IP}
        image: ghcr.io/matt8707/ha-fusion:2024.10.1@sha256:5eea4634ab2b1e7c7523943996d13318d109b293abe8e9e86c38daf5c41830cb
        ports:
            - 5023:5050
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/home-assistant-fusion-ui/data/fusion:/app/data
version: "3.7"

x-powerlab:
    store_app_id: home-assistant-fusion-ui
    title:
        en_us: HA-Fusion
    tagline:
        en_us: A modern, easy-to-use and performant custom Home Assistant dashboard

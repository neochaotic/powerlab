name: cloudflared
services:
    connector:
        environment:
            CLOUDFLARED_METRICS_PORT: ${APP_CLOUDFLARED_METRICS_PORT}
            CLOUDFLARED_TOKEN_FILE: ./data/token
        extra_hosts:
            - host.docker.internal:host-gateway
            - ${APP_DOMAIN}:host-gateway
        hostname: cloudflared-connector
        image: ghcr.io/radiokot/umbrel-cloudflared-connector:1.0.1-cf.2026.3.0@sha256:8f883ef254bbf44ba94a2647233b36723fe51cf84690ba9b5311145f3b2a8892
        restart: on-failure
        stop_grace_period: 3s
        volumes:
            - /DATA/PowerLabAppData/cloudflared/data:/data
    web:
        depends_on:
            - connector
        environment:
            CLOUDFLARED_HOSTNAME: cloudflared-connector
            CLOUDFLARED_METRICS_PORT: ${APP_CLOUDFLARED_METRICS_PORT}
            CLOUDFLARED_TOKEN_FILE: /app/data/token
        hostname: cloudflared-web
        image: ghcr.io/radiokot/umbrel-cloudflared:1.0.2@sha256:9660fb4e90317036d2b418f1c9437cc2cdb7f7bdd8d820084237a0c37bb94f5b
        restart: on-failure
        stop_grace_period: 1s
        volumes:
            - /DATA/PowerLabAppData/cloudflared/data:/app/data
version: "3.7"

x-powerlab:
    store_app_id: cloudflared
    title:
        en_us: Cloudflare Tunnel
    tagline:
        en_us: Access your Umbrel apps from the Internet using Cloudflare network
    description:
        en_us: 'Umbrel Cloudflare Tunnel client Access your Umbrel apps from the Internet using Cloudflare network. Learn more about tunnels on Cloudflare website. Get the app from: - Umbrel app store - Radiokot''s Umbrel apps How to use it To use this app, you must have a set up Cloudflare account with added domains. Once you''ve done setting it up, check out the guide with examples to configure your own tunnel. Sponsors <img src="https://avatars.githubusercontent.com/u/103765434?s=100" alt="BrutusBondBTC" height=70 /> <br> …and 2 anonymous sponsors. *I am very grateful to everyone supporting this project ❤️ To join this public list, email me the transaction reference once it is complete.* Development notes This web UI for cloudflared is intended to be used only in docker-compose deployment under Umbrel. The connector image it uses is umbrel-cloudflared-connector. Versioning This app uses Semantic Versioning 2.0.0. All the user-facing changes in the app are listed in the changelog file. Environment variables |Name|Meaning| |-|-| ||Hostname or IP of the connector container| || metrics server port in the connector container. The corresponding value must be set for connector| ||Path to a file to store the connector token. The corresponding value must be set for the connector|'
    icon: https://getumbrel.github.io/umbrel-apps-gallery/cloudflared/icon.svg

    title:
        en_us: PocketBase
    tagline:
        en_us: Open Source backend for your next SaaS and Mobile app in 1 file
    icon: https://getumbrel.github.io/umbrel-apps-gallery/pocketbase/icon.svg
    category: developer
    port_map: "5400"
    author: PocketBase
    developer: PocketBase
    source:

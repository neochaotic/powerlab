name: mosquitto
services:
    broker:
        image: eclipse-mosquitto:2.1.2-alpine@sha256:9cfdd46ad59f3e3e5f592f6baf57ab23e1ad00605509d0f5c1e9b179c5314d87
        ports:
            - 1883:1883
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/mosquitto/data/config:/mosquitto/config:rw
            - /DATA/PowerLabAppData/mosquitto/data/mosquitto:/mosquitto/data:rw
            - /DATA/PowerLabAppData/mosquitto/data/log:/mosquitto/log:rw
    web:
        depends_on:
            - broker
        image: nginx:1.27@sha256:124b44bfc9ccd1f3cedf4b592d4d1e8bddb78b51ec2ed5056c52d3692baebc19
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/mosquitto/data/www:/usr/share/nginx/html:ro
            - /DATA/PowerLabAppData/mosquitto/data/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

x-powerlab:
    store_app_id: mosquitto
    title:
        en_us: Mosquitto
    tagline:
        en_us: An open source MQTT broker
    icon: https://getumbrel.github.io/umbrel-apps-gallery/mosquitto/icon.svg
    category: automation
    port_map: "9021"
    author: Eclipse Foundation
    developer: Eclipse Foundation
    source:
        catalog: umbrel-apps
        upstream_id: mosquitto
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 8a60bdaddda5062fa19b2b13a47966de5af986cf
        upstream_path: mosquitto/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T15:02:25Z"

name: karakeep
services:
    chrome:
        command:
            - --no-sandbox
            - --disable-gpu
            - --disable-dev-shm-usage
            - --remote-debugging-address=0.0.0.0
            - --remote-debugging-port=9222
            - --hide-scrollbars
        image: zenika/alpine-chrome:124@sha256:31758da502f606986ab6d229694d7953741a89f106715d7fa5f2c939b247deeb
        restart: on-failure
        user: 1000:1000
    meilisearch:
        environment:
            MEILI_MASTER_KEY: ${APP_SEED}
            MEILI_NO_ANALYTICS: "true"
        image: getmeili/meilisearch:v1.41.0@sha256:860fa4baed04ae1c235de870edab0c8006227546dea1bbb6411fbfc5e27cf1db
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/karakeep/data/meilisearch_data:/meili_data
    web:
        depends_on:
            - chrome
            - meilisearch
        environment:
            BROWSER_WEB_URL: http://karakeep_chrome_1:9222
            DATA_DIR: /data
            KARAKEEP_VERSION: release
            MEILI_ADDR: http://karakeep_meilisearch_1:7700
            MEILI_MASTER_KEY: ${APP_SEED}
            NEXTAUTH_SECRET: ${APP_SEED}
            NEXTAUTH_URL: http://${DEVICE_DOMAIN_NAME}:8620
        image: ghcr.io/karakeep-app/karakeep:0.32.0@sha256:64d6a9bbf2d37b5c808cf06b5d87f1f1c7846fdd3844724145a9741aeb06fd31
        ports:
            - 8620:3000
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/karakeep/data/karakeep_data:/data
version: "3.7"

x-powerlab:
    store_app_id: karakeep
    title:
        en_us: Karakeep
    tagline:
        en_us: A bookmark-everything app
    description:
        en_us: "<div align=\"center\"> <a href=\"https://github.com/karakeep-app/karakeep/actions/workflows/ci.yml\"> <img alt=\"GitHub Actions Workflow Status\" src=\"https://img.shields.io/github/actions/workflow/status/karakeep-app/karakeep/ci.yml\" /> </a> <a href=\"https://github.com/karakeep-app/karakeep/releases\"> <img alt=\"GitHub Release\" src=\"https://img.shields.io/github/v/release/karakeep-app/karakeep\" /> </a> <a href=\"https://discord.gg/NrgeYywsFh\"> <img alt=\"Discord\" src=\"https://img.shields.io/discord/1223681308962721802?label=chat%20on%20discord\" /> </a> <a href=\"https://hosted.weblate.org/engage/hoarder/\"> <img src=\"https://hosted.weblate.org/widget/hoarder/hoarder/svg-badge.svg\" alt=\"Translation status\" /> </a> </div> <img height=\"50px\" src=\"./screenshots/logo.png\" /> Karakeep (previously Hoarder) is a self-hostable bookmark-everything app with a touch of AI for the data hoarders out there. Features - \U0001F517 Bookmark links, take simple notes and store images and pdfs. - ⬇️ Automatic fetching for link titles, descriptions and images. - \U0001F4CB Sort your bookmarks into lists. - \U0001F465 Collaborate with others on the same list. - \U0001F50E Full text search of all the content stored. - ✨ LLM-based automatic tagging and summarization. With supports for local models using ollama! - \U0001F916 LLM Agents (e.g. OpenClaw, Hermes) friendly with powerful CLI, and official skills. - ⚙️ Rule-based engine for customized management. - \U0001F386 OCR for extracting text from images. - \U0001F516 Chrome plugin, Firefox addon, and Safari extension for quick bookmarking. - \U0001F4F1 An iOS app, and an Android app. - \U0001F4F0 Auto hoarding from RSS feeds. - \U0001F50C REST API and multiple clients. - \U0001F310 Multi-language support. - \U0001F58D️ Mark and store highlights from your hoarded content.…"
    icon: https://getumbrel.github.io/umbrel-apps-gallery/karakeep/icon.svg
    category: files
    port_map: "8620"
    author: karakeep.app
    developer: karakeep.app
    source:
        catalog: umbrel-apps
        upstream_id: karakeep
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 8a60bdaddda5062fa19b2b13a47966de5af986cf
        upstream_path: karakeep/umbrel-app.yml

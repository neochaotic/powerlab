        en_us: '<p align="center"> <img src="https://github.com/user-attachments/assets/bf441748-0ec5-4c8a-b3e5-11301ee3f0bd" alt="VERT''s logo" height="100"> </p> <h1 align="center"><a href="https://vert.sh">VERT.sh</a></h1> VERT is a file conversion utility that uses WebAssembly to convert files on your device instead of a cloud. Check out the live instance at vert.sh. VERT is built in Svelte and TypeScript. Screenshots | Upload page | Conversion page | | :--------------------------------------------------: | :------------------------------------------------------: | | | | Features - Convert files directly on your device using WebAssembly\* - No file or file size limits - Convert images, audio, documents, and video\* - Supports over **250+** file formats - Conversion settings - User-friendly interface built with Svelte <sup>\* Non-local video conversion is available with our official instance, but the daemon is easily self-hostable to maintain privacy and fully local functionality.</sup> Documentation - FAQ - Getting Started - Using Docker - Video Conversion License This project is licensed under the AGPL-3.0 License, please see the LICENSE file for details. Star History <a href="https://www.star-history.com/#VERT-sh/VERT&Date"> <picture> <source media="(prefers-color-scheme: dark)" srcset="https://api.star-history.com/svg?repos=VERT-sh/VERT&type=Date&theme=dark" /> <source media="(prefers-color-scheme: light)" srcset="https://api.star-history.com/svg?repos=VERT-sh/VERT&type=Date" /> <img alt="Star History Chart" src="https://api.star-history.com/svg?repos=VERT-sh/VERT&type=Date" /> </picture> </a>'

name: poznote
services:
    app:
        environment:
            HTTP_WEB_PORT: 80
            SQLITE_DATABASE: /var/www/html/data/database/poznote.db
        healthcheck:
            interval: 30s
            retries: 3
            start_period: 10s
            test:
                - CMD
                - wget
                - --quiet
                - --tries=1
                - --timeout=5
                - -O
                - /dev/null
                - http://127.0.0.1/api/health
            timeout: 10s
        image: ghcr.io/timothepoznanski/poznote:6.10.0@sha256:0767aa6e1d40b551795a5798f8ea922694db4118628a2537f2a64943c19037f2
        ports:
            - 8389:80
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/poznote/data:/var/www/html/data
    mcp:
        depends_on:
            - app
        environment:
            POZNOTE_API_URL: http://app:80/api/v1
            POZNOTE_DEBUG: ${POZNOTE_DEBUG:-false}
        image: ghcr.io/timothepoznanski/poznote-mcp:6.10.0@sha256:8ee0b5cb86c2481cdda404e4159d934b4fe466270a33e7fb966d48d7559f918f
        ports:
            - 8340:8045
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/poznote/data:/var/www/html/data:ro
version: "3.7"


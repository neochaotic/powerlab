name: poznote
services:
    app:
        environment:
            HTTP_WEB_PORT: 80
            SQLITE_DATABASE: /var/www/html/data/database/poznote.db
        healthcheck:
            interval: 30s
            retries: 3
            start_period: 10s
            test:
                - CMD
                - wget
                - --quiet
                - --tries=1
                - --timeout=5
                - -O
                - /dev/null
                - http://127.0.0.1/api/health
            timeout: 10s
        image: ghcr.io/timothepoznanski/poznote:6.9.9@sha256:eab73cbcbae32c1b7fcbfec56e8a3b169f27b922fa1fcbe1b2646f031c99dfe0
        ports:
            - 8389:80
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/poznote/data:/var/www/html/data
    mcp:
        depends_on:
            - app
        environment:
            POZNOTE_API_URL: http://poznote_app_1:80/api/v1
            POZNOTE_DEBUG: ${POZNOTE_DEBUG:-false}
        image: ghcr.io/timothepoznanski/poznote-mcp:6.9.9@sha256:47086020356fda556fb8819d7cd48ded901543c445b540859f1b408c278f193e
        ports:
            - 8340:8045
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/poznote/data:/var/www/html/data:ro
version: "3.7"


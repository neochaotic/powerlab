    title:
        en_us: Baikal
    tagline:
        en_us: A lightweight calendar and contacts server
    icon: https://getumbrel.github.io/umbrel-apps-gallery/baikal/icon.svg
    category: networking
    port_map: "8890"
    author: fruux GmbH
    developer: fruux GmbH
    source:
        catalog: umbrel-apps
        upstream_id: baikal
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git

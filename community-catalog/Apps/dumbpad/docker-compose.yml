    description:
        en_us: 'DumbPad A stupid simple, no auth (unless you want it!), modern notepad application with auto-save functionality and dark mode support. <p align="center"> <img src="https://img.shields.io/github/package-json/v/dumbwareio/dumbpad" alt="GitHub package.json version" /> <a href="https://hub.docker.com/r/dumbwareio/dumbpad" target="_blank"><img src="https://img.shields.io/docker/v/dumbwareio/dumbpad?logo=docker&label=Docker" alt="Docker Image Version" /></a> <img src="https://img.shields.io/docker/pulls/dumbwareio/dumbpad" alt="Docker Pulls" /> <img src="https://img.shields.io/badge/license-GPL--3.0-blue.svg" alt="License" /> <img src="https://img.shields.io/github/actions/workflow/status/dumbwareio/dumbpad/docker-publish.yml" alt="GitHub Actions Workflow Status" /> <!-- <a href="https://dumbpad.dumbware.io/" target="_blank"> <img alt="Static Badge" src="https://img.shields.io/badge/demo-site?label=dumbpad" /> </a> --> </p> Table of Contents - Features - Quick Start - Prerequisites - Option 1: Docker - Option 2: Docker Compose - Option 3: Running Locally - Important: Docker Permissions - Configuration - Security - Technical Details - Links - Contributing - Future Features Features - Simple, clean interface - Auto-saving - Dark mode support - Responsive design - Docker support - Optional PIN protection (4-10 digits) - File-based storage - Data persistence across updates - Markdown Formatting with enhanced support - GitHub-style alert blocks (Note, Tip, Important, Warning, Caution) - Extended table formatting - Auto-expand collapsible details in print (configurable) - Code syntax highlighting in - Direct notepad linking with URL parameters - Copy shareable notepad links - Browser navigation support (back/forward buttons) - Fuzzy Search (by filename and file contents) - PWA Support with automatic cache…'

name: linkstack
services:
    linkstack:
        hostname: linkstack
        image: linkstackorg/linkstack:latest@sha256:1c8b05399ee459ac601bac3eede7fbe765d1b6b7be725663b57f3220610958bf
        ports:
            - 8190:80
        restart: on-failure
        volumes:
            - linkstack_data:/htdocs
version: "3.7"
volumes:
    linkstack_data:
        driver: local
        driver_opts:
            device: ${APP_DATA_DIR}/data
            o: bind
            type: none


name: tubearchivist
services:
    elasticsearch:
        environment:
            - ELASTIC_PASSWORD=verysecret
            - ES_JAVA_OPTS=-Xms1g -Xmx1g
            - xpack.security.enabled=true
            - discovery.type=single-node
            - path.repo=/usr/share/elasticsearch/data/snapshot
        image: elasticsearch:8.19.6@sha256:e2d7e20893ad820bcad241bf47b89958787f6b38225478dfe100b66937840b0f
        restart: on-failure
        ulimits:
            memlock:
                hard: -1
                soft: -1
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/tubearchivist/data/elasticsearch:/usr/share/elasticsearch/data
    redis:
        depends_on:
            - elasticsearch
        image: redis:8.2.2-bookworm@sha256:4521b581dbddea6e7d81f8fe95ede93f5648aaa66a9dacd581611bf6fe7527bd
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/tubearchivist/data/redis:/data
    server:
        depends_on:
            - elasticsearch
            - redis
        environment:
            - ES_URL=http://elasticsearch:9200
            - REDIS_CON=redis://redis:6379
            - HOST_UID=1000
            - HOST_GID=1000
            - TA_HOST=http://${DEVICE_DOMAIN_NAME}:8079
            - TA_USERNAME=admin
            - TA_PASSWORD=${APP_PASSWORD}
            - ELASTIC_PASSWORD=verysecret
            - TZ=UTC
        image: bbilly1/tubearchivist:v0.5.10@sha256:dfe723cf008520e1758ecc3e59e6ea8761dd10d5bb099cd87289e80f5bd66567
        ports:
            - 8079:8000
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/tubearchivist/data/media:/youtube
            - /DATA/PowerLabAppData/tubearchivist/data/cache:/cache
version: "3.7"

x-powerlab:
    store_app_id: tubearchivist
    title:
        en_us: Tube Archivist
    tagline:
        en_us: Self hosted YouTube media server
    icon: https://getumbrel.github.io/umbrel-apps-gallery/tubearchivist/icon.svg
    category: media
    port_map: "8079"
    author: tubearchivist
    developer: tubearchivist
    main: server
    source:
        catalog: umbrel-apps
        upstream_id: tubearchivist
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 931a2146a30e8398b127434cf4fd2f20ae77bb4f
        upstream_path: tubearchivist/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-13T17:27:04Z"

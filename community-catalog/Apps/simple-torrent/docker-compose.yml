version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: simple-torrent_server_1
      APP_PORT: 8086

  server:
    image: boypt/cloud-torrent:1.3.9@sha256:90cc62869ebaabbdba31535cdff4c66ede98b341956d2ebcd6650610a37e9819
    user: "1000:1000"
    restart: on-failure
    command: >
      --port=8086
      --config-path /config/simple-torrent.json
    volumes:
      - ${APP_DATA_DIR}/data/torrents:/torrents
      - ${UMBREL_ROOT}/data/storage/downloads:/downloads
      - ${APP_DATA_DIR}/data/config:/config

x-powerlab:
    store_app_id: simple-torrent
    title:
        en_us: SimpleTorrent
    tagline:
        en_us: Download torrents with your Umbrel
    icon: https://getumbrel.github.io/umbrel-apps-gallery/simple-torrent/icon.svg
    category: networking
    port_map: "8086"
    author: Preston
    developer: Preston
    source:
        catalog: umbrel-apps
        upstream_id: simple-torrent
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 0299c400450d07fee62d3dcb0e6c24b00f359b51
        upstream_path: simple-torrent/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T03:53:16Z"

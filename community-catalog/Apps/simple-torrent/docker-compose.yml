name: simple-torrent
services:
    server:
        command: |
            --port=8086 --config-path /config/simple-torrent.json
        image: boypt/cloud-torrent:1.3.9@sha256:90cc62869ebaabbdba31535cdff4c66ede98b341956d2ebcd6650610a37e9819
        ports:
            - 8086:8086
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/simple-torrent/data/torrents:/torrents
            - /DATA/data/storage/downloads:/downloads
            - /DATA/PowerLabAppData/simple-torrent/data/config:/config
version: "3.7"

x-powerlab:
    store_app_id: simple-torrent
    title:
        en_us: SimpleTorrent
    tagline:
        en_us: Download torrents with your Umbrel
    icon: https://getumbrel.github.io/umbrel-apps-gallery/simple-torrent/icon.svg
    category: networking
    port_map: "8086"
    author: Preston
    developer: Preston
    main: server
    source:
        catalog: umbrel-apps
        upstream_id: simple-torrent
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 931a2146a30e8398b127434cf4fd2f20ae77bb4f
        upstream_path: simple-torrent/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-13T17:27:00Z"

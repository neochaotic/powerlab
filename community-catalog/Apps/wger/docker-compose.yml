name: wger
services:
    cache:
        healthcheck:
            interval: 10s
            retries: 5
            start_period: 30s
            test: redis-cli ping
            timeout: 5s
        image: redis:8.0.3-alpine@sha256:25c0ae32c6c2301798579f5944af53729766a18eff5660bbef196fc2e6214a9c
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/wger/data/redis-data:/data
    celery_beat:
        command: /start-beat
        depends_on:
            celery_worker:
                condition: service_healthy
        image: wger/server:2.5@sha256:1cac2c62b8d85b54dab16291df802a1cdbf66828201b8df6104db0400320f0df
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/wger/data/celery-beat:/DATA/PowerLabAppData/wger/beat/
    celery_worker:
        command: /start-worker
        depends_on:
            web:
                condition: service_healthy
        healthcheck:
            interval: 10s
            retries: 5
            start_period: 30s
            test: celery -A wger inspect ping
            timeout: 5s
        image: wger/server:2.5@sha256:1cac2c62b8d85b54dab16291df802a1cdbf66828201b8df6104db0400320f0df
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/wger/data/media:/home/wger/media
    db:
        environment:
            POSTGRES_DB: wger
            POSTGRES_PASSWORD: wger
            POSTGRES_USER: wger
            TZ: Europe/Berlin
        healthcheck:
            interval: 10s
            retries: 5
            start_period: 30s
            test: pg_isready -U wger
            timeout: 5s
        image: postgres:17.5-alpine@sha256:6567bca8d7bc8c82c5922425a0baee57be8402df92bae5eacad5f01ae9544daa
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/wger/data/postgres-data:/var/lib/postgresql/data/
    nginx:
        depends_on:
            - web
        healthcheck:
            interval: 10s
            retries: 5
            start_period: 30s
            test:
                - CMD
                - wget
                - --quiet
                - --tries=1
                - --spider
                - http://127.0.0.1:80/
            timeout: 5s
        image: nginx:alpine3.22@sha256:d67ea0d64d518b1bb04acde3b00f722ac3e9764b3209a9b0a98924ba35e4b779
        ports:
            - 8450:80
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/wger/config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
            - /DATA/PowerLabAppData/wger/data/static:/wger/static:ro
            - /DATA/PowerLabAppData/wger/data/media:/wger/media:ro
    web:
        depends_on:
            cache:
                condition: service_healthy
            db:
                condition: service_healthy
        environment:
            CSRF_TRUSTED_ORIGINS: http://${DEVICE_DOMAIN_NAME}:${APP_WGER_PORT},http://${DEVICE_HOSTNAME}:${APP_WGER_PORT},${APP_WGER_LOCAL_URLS}
            MEDIA_URL: http://${DEVICE_DOMAIN_NAME}:8450/media/
            SECRET_KEY: ${APP_SEED}
            SIGNING_KEY: ${APP_SEED}
            SITE_URL: http://${DEVICE_DOMAIN_NAME}:8450
        healthcheck:
            interval: 10s
            retries: 5
            start_period: 300s
            test: wget --no-verbose --tries=1 --spider http://localhost:8000
            timeout: 5s
        image: wger/server:2.5@sha256:1cac2c62b8d85b54dab16291df802a1cdbf66828201b8df6104db0400320f0df
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/wger/data/static:/home/wger/static
            - /DATA/PowerLabAppData/wger/data/media:/home/wger/media
version: "3.7"

x-powerlab:
    store_app_id: wger
    title:
        en_us: wger
    tagline:
        en_us: A fitness tracker for workouts and nutrition
    icon: https://getumbrel.github.io/umbrel-apps-gallery/wger/icon.svg
    category: files
    port_map: "8450"
    author: wger Project
    developer: wger Project
    main: nginx
    source:
        catalog: umbrel-apps
        upstream_id: wger
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 931a2146a30e8398b127434cf4fd2f20ae77bb4f
        upstream_path: wger/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-13T17:27:05Z"

name: readur
services:
    app:
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            ADMIN_PASSWORD: readur2024
            ALLOWED_FILE_TYPES: pdf,png,jpg,jpeg,tiff,bmp,gif,txt,rtf,doc,docx
            CONCURRENT_OCR_JOBS: 4
            CPU_PRIORITY: normal
            DATABASE_URL: postgresql://readur:readur_password@postgres:5432/readur
            FILE_STABILITY_CHECK_MS: 500
            JWT_SECRET: ${APP_SEED}
            MAX_FILE_AGE_HOURS: 168
            MAX_FILE_SIZE_MB: 50
            MEMORY_LIMIT_MB: 512
            OCR_LANGUAGE: eng
            OCR_TIMEOUT_SECONDS: 300
            SERVER_ADDRESS: 0.0.0.0:8000
            UPLOAD_PATH: /app/uploads
            WATCH_FOLDER: /app/watch
            WATCH_INTERVAL_SECONDS: 30
        healthcheck:
            interval: 30s
            retries: 3
            start_period: 40s
            test:
                - CMD
                - curl
                - -f
                - http://localhost:8000/api/health
            timeout: 10s
        image: ghcr.io/readur/readur:2.9.1@sha256:16aa8b1d7df218ab0f4fc57fbf890d125020fca416bc3555aa7731e7329020dc
        ports:
            - 8111:8000
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/readur/data/uploads:/app/uploads
            - /DATA/PowerLabAppData/readur/data/watch:/app/watch
    postgres:
        environment:
            POSTGRES_DB: readur
            POSTGRES_PASSWORD: readur_password
            POSTGRES_USER: readur
        healthcheck:
            interval: 10s
            retries: 5
            test:
                - CMD-SHELL
                - pg_isready -U readur
            timeout: 5s
        image: postgres:17.5@sha256:3962158596daaef3682838cc8eb0e719ad1ce520f88e34596ce8d5de1b6330a1
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/readur/data/postgres_data:/var/lib/postgresql/data
version: "3.7"


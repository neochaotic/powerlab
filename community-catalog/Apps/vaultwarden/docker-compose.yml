name: vaultwarden
services:
    server:
        environment:
            ROCKET_PORT: 8089
        image: vaultwarden/server:1.34.3@sha256:84fd8a47f58d79a1ad824c27be0a9492750c0fa5216b35c749863093bfa3c3d7
        restart: on-failure
        stop_grace_period: 1m
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/vaultwarden/data:/data
version: "3.7"

x-powerlab:
    store_app_id: vaultwarden
    title:
        en_us: Vaultwarden
    tagline:
        en_us: Unofficial Bitwarden® compatible server
    description:
        en_us: 'An alternative server implementation of the Bitwarden Client API, written in Rust and compatible with official Bitwarden clients [disclaimer], perfect for self-hosted deployment where running the official resource-heavy service might not be ideal. [](https://github.com/dani-garcia/vaultwarden/releases/latest) [](https://github.com/dani-garcia/vaultwarden/pkgs/container/vaultwarden) [](https://hub.docker.com/r/vaultwarden/server) [](https://quay.io/repository/vaultwarden/server) <br> [](https://github.com/dani-garcia/vaultwarden/graphs/contributors) [](https://github.com/dani-garcia/vaultwarden/network/members) [](https://github.com/dani-garcia/vaultwarden/stargazers) [](https://github.com/dani-garcia/vaultwarden/issues) [](https://github.com/dani-garcia/vaultwarden/issues?q=is%3Aissue+is%3Aclosed) [](https://github.com/dani-garcia/vaultwarden/blob/main/LICENSE.txt) <br> %3D''svg''%5D%2F*%5Blocal-name()%3D''g''%5D%5B2%5D%2F*%5Blocal-name()%3D''text''%5D%5B4%5D&style=flat-square&logo=rust&label=dependencies&color=005AA4) [](https://github.com/dani-garcia/vaultwarden/actions/workflows/release.yml) [](https://github.com/dani-garcia/vaultwarden/actions/workflows/build.yml) <br> [](https://matrix.to/#/#vaultwarden:matrix.org) [](https://github.com/dani-garcia/vaultwarden/discussions) [](https://vaultwarden.discourse.group/) > [!IMPORTANT] > **When using this server, please report any bugs or suggestions directly to us (see Get in touch), regardless of whatever clients you are using (mobile, desktop, browser...). DO NOT use the official Bitwarden support channels.** <br> Features A nearly complete implementation of the Bitwarden Client API is provided, including: * Personal Vault * Send * Attachments * Website icons * Personal API Key * Organizations - Collections, Password Sharing, Member Roles, Groups, Event Logs, Admin Password Reset, Directory Connector, Policies * Multi/Two Factor Authentication - Authenticator, Email, FIDO2 WebAuthn, YubiKey, Duo * Emergency Access * Vaultwarden Admin Backend * Modified Web Vault client (Bundled within our containers) <br> Usage > [!IMPORTANT] > The web-vault requires the use of HTTPS and a secure context for the Web Crypto API. <br> > That means it will only work if you enable HTTPS. <br> > We also suggest…'

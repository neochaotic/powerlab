name: campfire
services:
    redis:
        command: redis-server --save 60 1 --save 300 10 --save 900 100 --appendonly yes --loglevel warning
        deploy:
            resources:
                limits:
                    cpus: "0.5"
                    memory: 1G
                reservations:
                    cpus: "0.25"
                    memory: 256M
        image: redis:7-alpine@sha256:ee64a64eaab618d88051c3ade8f6352d11531fcf79d9a4818b9b183d8c1d18ba
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/campfire/data/redis:/data
    server:
        depends_on:
            - redis
        deploy:
            resources:
                limits:
                    cpus: "4"
                    memory: 8G
                reservations:
                    cpus: "1"
                    memory: 2G
        environment:
            DISABLE_SSL: "true"
            RAILS_ENV: production
            REDIS_URL: redis://redis:6379
            SECRET_KEY_BASE: ${APP_SEED}
            SENTRY_DSN: ${SENTRY_DSN:-}
            VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
            VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
        image: ghcr.io/basecamp/once-campfire:1.4.3@sha256:21a419dd93b10b3598a25634e5eed2305bec1c75347b260ed1665dbc70864dd8
        ports:
            - 8004:80
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/campfire/data/app:/rails/storage
version: "3.7"


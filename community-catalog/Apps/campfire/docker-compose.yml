        en_us: 'Campfire Campfire is a web-based chat application. It supports many of the features you''d expect, including: - Multiple rooms, with access controls - Direct messages - File attachments with previews - Search - Notifications (via Web Push) - @mentions - API, with support for bot integrations Deploying with Docker Campfire''s Docker image contains everything needed for a fully-functional, single-machine deployment. This includes the web app, background jobs, caching, file serving, and SSL. To persist storage of the database and file attachments, map a volume to . To configure additional features, you can set the following environment variables: - - enable automatic SSL via Let''s Encrypt for the given domain name - - alternatively, set to serve over plain HTTP - / - set these to a valid keypair to allow sending Web Push notifications. You can generate a new keypair by running - - to enable error reporting to sentry in production, supply your DSN here For example: docker build -t campfire . docker run \ --publish 80:80 --publish 443:443 \ --restart unless-stopped \ --volume campfire:/rails/storage \ --env SECRET_KEY_BASE=$YOUR_SECRET_KEY_BASE \ --env VAPID_PUBLIC_KEY=$YOUR_PUBLIC_KEY \ --env VAPID_PRIVATE_KEY=$YOUR_PRIVATE_KEY \ --env TLS_DOMAIN=chat.example.com \ campfire Running in development bin/setup bin/rails server Worth Noting When you…'

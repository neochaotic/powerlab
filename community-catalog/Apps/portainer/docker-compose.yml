name: portainer
services:
    docker:
        command: |
            dockerd
              --bridge dind0
              --data-root /data/data
              --exec-root /data/exec
              --host unix:///data/docker.sock
              --pidfile /data/docker.pid
        entrypoint: /entrypoint.sh
        environment:
            DOCKER_ENSURE_BRIDGE: dind0:10.32.0.1/16
        image: docker:27.2.0-dind@sha256:f9f72ad901a78f27be922b2d320bbc263174f12919c1b37e6a01f828fa904565
        network_mode: host
        privileged: true
        restart: on-failure
        stop_grace_period: 1m
        volumes:
            - /DATA/PowerLabAppData/portainer/entrypoint.sh:/entrypoint.sh
            - /DATA/PowerLabAppData/portainer/data/docker:/data
    portainer:
        command: --host unix:///var/run/docker.sock --admin-password-file=/default-password
        image: portainer/portainer-ce:2.39.1-alpine@sha256:2d423f0e4598833b6cdccca4baf59b552522b68d90a8906f11044bbe91e427f6
        ports:
            - 9000:9000
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/portainer/default-password:/default-password
            - /DATA/PowerLabAppData/portainer/data/portainer:/data
            - /DATA/PowerLabAppData/portainer/data/docker:/var/run
version: "3.7"

x-powerlab:
    store_app_id: portainer
    title:
        en_us: Portainer
    tagline:
        en_us: Run custom Docker containers on your Umbrel
    icon: https://getumbrel.github.io/umbrel-apps-gallery/portainer/icon.svg
    category: developer
    port_map: "9000"
    author: Portainer
    developer: Portainer
    source:
        catalog: umbrel-apps
        upstream_id: portainer
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 8a60bdaddda5062fa19b2b13a47966de5af986cf
        upstream_path: portainer/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T15:43:38Z"

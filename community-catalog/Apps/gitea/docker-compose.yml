name: gitea
services:
    db:
        environment:
            MYSQL_DATABASE: gitea
            MYSQL_PASSWORD: moneyprintergobrrr
            MYSQL_ROOT_PASSWORD: gitea
            MYSQL_USER: gitea
        image: mariadb:11.2.4@sha256:e9ea1dbab6783ff0281e41e3357d950a5f598b2033559b8443e03b181807910b
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/gitea/data/db:/var/lib/mysql
    server:
        environment:
            GITEA__database__DB_TYPE: mysql
            GITEA__database__HOST: gitea_db_1:3306
            GITEA__database__NAME: gitea
            GITEA__database__PASSWD: moneyprintergobrrr
            GITEA__database__USER: gitea
            GITEA__security__INSTALL_LOCK: "true"
            GITEA__server__DOMAIN: ${APP_DOMAIN}
            GITEA__server__HTTP_PORT: 8085
            GITEA__server__SSH_DOMAIN: ${APP_DOMAIN}
            GITEA__server__SSH_LISTEN_PORT: ${APP_GITEA_SSH_PORT}
            GITEA__server__SSH_PORT: ${APP_GITEA_SSH_PORT}
            GITEA__server__START_SSH_SERVER: "true"
        image: gitea/gitea:1.26.1-rootless@sha256:4c4256497e2e237ddebdd30986c7ce52cb6f936b3e90c34bb9f4665714599f62
        ports:
            - 8085:8086
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/gitea/data/gitea/data:/var/lib/gitea
            - /DATA/PowerLabAppData/gitea/data/gitea/config:/etc/gitea
version: "3.7"

x-powerlab:
    store_app_id: gitea
    title:
        en_us: Gitea
    tagline:
        en_us: A painless self-hosted Git service
    description:
        en_us: 'Gitea [](https://github.com/go-gitea/gitea/actions/workflows/release-nightly.yml?query=branch%3Amain "Release Nightly") [](https://discord.gg/Gitea "Join the Discord chat at https://discord.gg/Gitea") [](https://goreportcard.com/report/code.gitea.io/gitea "Go Report Card") [](https://pkg.go.dev/code.gitea.io/gitea "GoDoc") [](https://github.com/go-gitea/gitea/releases/latest "GitHub release") [](https://www.codetriage.com/go-gitea/gitea "Help Contribute to Open Source") [](https://opencollective.com/gitea "Become a backer/sponsor of gitea") [](https://opensource.org/licenses/MIT "License: MIT") [](https://translate.gitea.com "Crowdin") 繁體中文 | 简体中文 Purpose The goal of this project is to make the easiest, fastest, and most painless way of setting up a self-hosted Git service. As Gitea is written in Go, it works across **all** the platforms and architectures that are supported by Go, including Linux, macOS, and Windows on x86, amd64, ARM and PowerPC architectures. This project has been forked from Gogs since November of 2016, but a lot has changed. For online demonstrations, you can visit demo.gitea.com. For accessing free Gitea service (with a limited number of repositories), you can visit gitea.com. To quickly deploy your own dedicated Gitea instance on Gitea Cloud, you can start a free trial at cloud.gitea.com. Documentation You can find comprehensive documentation on our official documentation website. It includes installation, administration, usage, development, contributing guides, and more to help you get started and explore all features effectively. If you have any suggestions or would like to contribute to it, you can visit the documentation repository…'

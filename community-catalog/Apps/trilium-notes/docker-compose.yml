name: trilium-notes
services:
    server:
        environment:
            - TRILIUM_DATA_DIR=/data
        image: triliumnext/trilium:v0.103.0@sha256:8e6bc939a6d5dbeed42d1b5b155bc790b1c28ca3ac414382d04d626903c62081
        ports:
            - 3779:8080
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/trilium-notes/data:/data
version: "3.7"

x-powerlab:
    store_app_id: trilium-notes
    title:

    tagline:
        en_us: Build your personal knowledge base with Trilium Notes
    description:
        en_us: "<div align=\"center\"> <sup>Special thanks to:</sup><br /> <a href=\"https://go.warp.dev/Trilium\" target=\"_blank\"> <img alt=\"Warp sponsorship\" width=\"400\" src=\"https://github.com/warpdotdev/brand-assets/blob/main/Github/Sponsor/Warp-Github-LG-03.png\"><br /> Warp, built for coding with multiple AI agents<br /> </a> <sup>Available for macOS, Linux and Windows</sup> </div> <hr /> Trilium Notes [](https://app.relative-ci.com/projects/Di5q7dz9daNDZ9UXi0Bp) [](https://hosted.weblate.org/engage/trilium/) <!-- translate:off --> <!-- LANGUAGE SWITCHER --> Chinese (Simplified Han script) | Chinese (Traditional Han script) | English | French | German | Greek | Italian | Japanese | Romanian | Spanish <!-- translate:on --> Trilium Notes is a free and open-source, cross-platform hierarchical note taking application with focus on building large personal knowledge bases. <img src=\"./docs/app.png\" alt=\"Trilium Screenshot\" width=\"1000\"> ⏬ Download - Latest release – stable version, recommended for most users. - Nightly build – unstable development version, updated daily with the latest features and fixes. \U0001F4DA Documentation **Visit our comprehensive documentation at docs.triliumnotes.org** Our documentation is available in multiple formats: - **Online Documentation**: Browse the full documentation at docs.triliumnotes.org - **In-App Help**: Press within Trilium to access the same documentation directly in the application - **GitHub**: Navigate through the User Guide in this repository Quick Links - Getting Started Guide - Installation Instructions - Docker Setup - Upgrading TriliumNext - Basic Concepts and Features - Patterns of Personal Knowledge Base…"

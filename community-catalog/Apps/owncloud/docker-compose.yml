name: owncloud
services:
    mariadb:
        command:
            - --max-allowed-packet=128M
            - --innodb-log-file-size=64M
        environment:
            - MYSQL_ROOT_PASSWORD=owncloud
            - MYSQL_USER=owncloud
            - MYSQL_PASSWORD=owncloud
            - MYSQL_DATABASE=owncloud
            - MARIADB_AUTO_UPGRADE=1
        healthcheck:
            interval: 10s
            retries: 5
            test:
                - CMD
                - mysqladmin
                - ping
                - -u
                - root
                - --password=owncloud
            timeout: 5s
        image: mariadb:10.11@sha256:24bb6e3d8e46f4581ddcc2b2c22fd78c99c77ac4e3fb7c9aba3a5c4c4d934ca2
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/owncloud/data/db:/var/lib/mysql
    redis:
        command:
            - --databases
            - "1"
        healthcheck:
            interval: 10s
            retries: 5
            test:
                - CMD
                - redis-cli
                - ping
            timeout: 5s
        image: redis:6-alpine@sha256:7fe72c486b910f6b1a9769c937dad5d63648ddee82e056f47417542dd40825bb
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/owncloud/data/redis:/data
    server:
        depends_on:
            - mariadb
            - redis
        environment:
            - OWNCLOUD_DOMAIN=${DEVICE_DOMAIN_NAME}:8080
            - OWNCLOUD_TRUSTED_DOMAINS=${DEVICE_DOMAIN_NAME},${DEVICE_HOSTNAME},${APP_OWNCLOUD_LOCAL_IPS}
            - OWNCLOUD_DB_TYPE=mysql
            - OWNCLOUD_DB_NAME=owncloud
            - OWNCLOUD_DB_USERNAME=owncloud
            - OWNCLOUD_DB_PASSWORD=owncloud
            - OWNCLOUD_DB_HOST=owncloud_mariadb_1
            - OWNCLOUD_ADMIN_USERNAME=admin
            - OWNCLOUD_ADMIN_PASSWORD=${APP_PASSWORD}
            - OWNCLOUD_MYSQL_UTF8MB4=true
            - OWNCLOUD_REDIS_ENABLED=true
            - OWNCLOUD_REDIS_HOST=owncloud_redis_1
            - OWNCLOUD_LOG_LEVEL=2
        healthcheck:
            interval: 30s
            retries: 5
            test:
                - CMD
                - /usr/bin/healthcheck
            timeout: 10s
        image: owncloud/server:10.16.0@sha256:62c93574d2bd0f98d17ac1a541f703653822e4572a628dcf993a8e65b2400e97
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/owncloud/data/app:/mnt/data
            - /DATA/PowerLabAppData/owncloud/data/config:/var/www/html/config
version: "3.7"

x-powerlab:
    store_app_id: owncloud
    title:
        en_us: ownCloud
    tagline:
        en_us: A smart cloud for your files
    icon: https://getumbrel.github.io/umbrel-apps-gallery/owncloud/icon.svg
    category: files
    port_map: "8666"
    author: ownCloud GmbH
    developer: ownCloud GmbH
    source:
        catalog: umbrel-apps
        upstream_id: owncloud
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 8a60bdaddda5062fa19b2b13a47966de5af986cf
        upstream_path: owncloud/umbrel-app.yml
        transform_version: "1.0"

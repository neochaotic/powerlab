name: jupyterlab
services:
    server:
        command: start-notebook.py --NotebookApp.token=${APP_PASSWORD}
        image: quay.io/jupyter/base-notebook:lab-4.5.7@sha256:3171810d80d421edb7bfb93422d5587a763bfee505a603a91cb4f8babdac37ff
        ports:
            - 8899:8888
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/jupyterlab/data:/home/jovyan/work


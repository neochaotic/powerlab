        en_us: '**Installation** | **Documentation** | **Contributing** | **License** | **Team** | **Getting help** | JupyterLab [](https://badge.fury.io/py/jupyterlab) [](https://pepy.tech/projects/jupyterlab) [](https://github.com/jupyterlab/jupyterlab/actions?query=branch%3Amain+workflow%3A%22Linux+Tests%22) [](https://github.com/jupyterlab/jupyterlab/actions?query=branch%3Amain+workflow%3A%22Windows+Tests%22) [](http://jupyterlab.readthedocs.io/en/stable/) [](https://crowdin.com/project/jupyterlab) [](https://www.bestpractices.dev/projects/8675) [](https://scorecard.dev/viewer/?uri=github.com/jupyterlab/jupyterlab) [](https://github.com/jupyterlab/jupyterlab/issues) [](https://discourse.jupyter.org/c/jupyterlab) [](https://jupyter.zulipchat.com/#narrow/channel/469762-jupyterlab) [](https://mybinder.org/v2/gh/jupyterlab/jupyterlab-demo/HEAD?urlpath=lab/tree/demo) An extensible environment for interactive and reproducible computing, based on the Jupyter Notebook and Architecture. JupyterLab is the next-generation user interface for Project Jupyter offering all the familiar building blocks of the classic Jupyter Notebook (notebook, terminal, text editor, file browser, rich outputs, etc.) in a flexible and powerful user interface. JupyterLab can be extended using npm packages that use our public APIs. The _prebuilt_ extensions can be distributed via PyPI, conda, and other package managers. The _source_ extensions can be installed directly from npm (search for jupyterlab-extension) but require an additional build step. You can also find JupyterLab extensions exploring GitHub topic jupyterlab-extension. To learn more about extensions, see the user documentation. Read the current JupyterLab documentation on ReadTheDocs. > [!IMPORTANT] > JupyterLab 3 reached its end of maintenance date on May 15, 2024. Fixes for critical issues were backported until December 31, 2024. If you are still running JupyterLab 3, we strongly encourage you to **upgrade to JupyterLab 4 as soon as possible.** For more information, see JupyterLab 3 end of maintenance…'

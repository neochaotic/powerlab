name: mailarchiver
services:
    app:
        depends_on:
            postgres:
                condition: service_healthy
        image: ghcr.io/s1t5/mailarchiver:2604.2@sha256:53800df180b876e3cc02e31f088e0684bf81a4380ad22b5419da99e8559bb5ba
        ports:
            - 5006:5000
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/mailarchiver/data/data-protection-keys:/app/DataProtection-Keys
            - /DATA/PowerLabAppData/mailarchiver/data/appsettings.json:/app/appsettings.json
    postgres:
        environment:
            POSTGRES_DB: mailarchiver
            POSTGRES_PASSWORD: mailarchiver
            POSTGRES_USER: mailarchiver
        healthcheck:
            interval: 10s
            retries: 5
            start_period: 10s
            test:
                - CMD-SHELL
                - pg_isready -U mailarchiver -d mailarchiver
            timeout: 5s
        image: postgres:18.3-alpine3.23@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/mailarchiver/data/database:/var/lib/postgresql

x-powerlab:
    store_app_id: mailarchiver
    title:
        en_us: Mail Archiver
    tagline:
        en_us: A comprehensive solution for archiving, searching, and exporting emails
    description:
        en_us: "\U0001F4E7 Mail-Archiver - Email Archiving System **A comprehensive solution for archiving, searching, and exporting emails** \U0001F310 **Website:** mail-archiver.org <div style=\"display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;\"> <a href=\"https://mail-archiver.org\" target=\"_blank\"><img src=\"https://img.shields.io/badge/Website-mail--archiver.org-4A90D9?style=for-the-badge&logo=globe&logoColor=white\" alt=\"Website\"></a> <a href=\"#\"><img src=\"https://img.shields.io/badge/Docker-2CA5E0?style=for-the-badge&logo=docker&logoColor=white\" alt=\"Docker\"></a> <a href=\"#\"><img src=\"https://img.shields.io/badge/.NET-512BD4?style=for-the-badge&logo=dotnet&logoColor=white\" alt=\".NET\"></a> <a href=\"#\"><img src=\"https://img.shields.io/badge/PostgreSQL-316192?style=for-the-badge&logo=postgresql&logoColor=white\" alt=\"PostgreSQL\"></a> <a href=\"#\"><img src=\"https://img.shields.io/badge/Bootstrap-563D7C?style=for-the-badge&logo=bootstrap&logoColor=white\" alt=\"Bootstrap\"></a> <a href=\"https://github.com/s1t5/mail-archiver\"><img src=\"https://img.shields.io/github/stars/s1t5/mail-archiver?style=for-the-badge&logo=github\" alt=\"GitHub Stars\"></a> <a href=\"https://www.buymeacoffee.com/s1t5\" target=\"_blank\"><img src=\"https://img.shields.io/badge/Buy%20Me%20a%20Coffee-s1t5-FFDD00?style=for-the-badge&logo=buy-me-a-coffee&logoColor=black\" alt=\"Buy Me a Coffee\"></a> <a href=\"https://ko-fi.com/s1t5dev\" target=\"_blank\"><img src=\"https://img.shields.io/badge/Ko--Fi-s1t5dev-FF5E5B?style=for-the-badge&logo=ko-fi&logoColor=white\" alt=\"Ko-fi\"></a> </div> ✨ Key Features \U0001F4CC Core Features - Automated archiving of incoming and outgoing emails from multiple accounts - Storage of email content and attachments with scheduled synchronization - Mobile and desktop optimized, multilingual responsive UI with dark mode - OpenID Connect (OIDC) for integration of external authentication services (OIDC Implementation Guide) \U0001F50D Search & Access - Advanced search across all archived emails with filtering options - Preview emails with attachment list - Export entire mail accounts as mbox files or zipped EML archives - Export selected individual emails or email batches \U0001F465 User Management - Multi-user support with account-specific permissions - Dashboard with statistics, storage monitoring, and sender analysis - Comprehensive access logging with detailed activity tracking of user activities (Access, Export, Deletion, Restore and many more) - see Access Logging Guide for…"

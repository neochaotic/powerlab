name: flatnotes
services:
    server:
        environment:
            FLATNOTES_AUTH_TYPE: password
            FLATNOTES_PASSWORD: ${APP_PASSWORD}
            FLATNOTES_SECRET_KEY: ${APP_SEED}
            FLATNOTES_USERNAME: admin
            PGID: 1000
            PUID: 1000
        image: dullage/flatnotes:v5.5.4@sha256:a509830073d6548d35450a98be3a432716430b674cc70ac93cbbaed1555b5a28
        ports:
            - 8523:8080
        restart: on-failure
        stop_grace_period: 1m
        volumes:
            - /DATA/PowerLabAppData/flatnotes/data:/data

x-powerlab:
    store_app_id: flatnotes
    title:
        en_us: flatnotes
    tagline:
        en_us: A self-hosted, database-less markdown note-taking app
    icon: https://getumbrel.github.io/umbrel-apps-gallery/flatnotes/icon.svg
    category: files
    port_map: "8523"
    author: Adam Dullage
    developer: Adam Dullage
    main: server
    source:
        catalog: umbrel-apps
        upstream_id: flatnotes
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 931a2146a30e8398b127434cf4fd2f20ae77bb4f
        upstream_path: flatnotes/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-13T17:26:38Z"

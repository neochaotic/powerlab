name: stirling-pdf
services:
    app:
        environment:
            DOCKER_ENABLE_SECURITY: "false"
            INSTALL_BOOK_AND_ADVANCED_HTML_OPS: "true"
            LANGS: ALL
            SECURITY_ENABLELOGIN: "false"
        image: stirlingtools/stirling-pdf:2.10.1@sha256:950c596db26e0764f642def2fd4f9ee904ff2ac16d83fe621ff731b771d9b385
        restart: on-failure
        stop_grace_period: 1m
        volumes:
            - /DATA/PowerLabAppData/stirling-pdf/data/tessdata:/usr/share/tessdata
            - /DATA/PowerLabAppData/stirling-pdf/data/configs:/configs
            - /DATA/PowerLabAppData/stirling-pdf/data/logs:/logs
            - /DATA/PowerLabAppData/stirling-pdf/data/pipeline:/pipeline

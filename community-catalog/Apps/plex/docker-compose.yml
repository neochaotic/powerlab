name: plex
services:
    server:
        environment:
            - PUID=1000
            - PGID=1000
            - VERSION=docker
        hostname: ${DEVICE_HOSTNAME}
        image: linuxserver/plex:1.43.1@sha256:b785bdd60e781662f16e0526a6b54c07856739df95ab558a674a3c084dbde423
        network_mode: host
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/plex/data/config:/config
            - /DATA/PowerLabAppData/plex/data/transcode:/transcode
            - /DATA/data/storage/downloads:/downloads
version: "3.7"

x-powerlab:
    store_app_id: plex
    title:
        en_us: Plex
    tagline:
        en_us: Stream Movies & TV Shows
    icon: https://getumbrel.github.io/umbrel-apps-gallery/plex/icon.svg
    category: media
    port_map: "32400"
    author: Plex
    developer: Plex
    source:
        catalog: umbrel-apps
        upstream_id: plex
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 8a60bdaddda5062fa19b2b13a47966de5af986cf
        upstream_path: plex/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T15:02:40Z"

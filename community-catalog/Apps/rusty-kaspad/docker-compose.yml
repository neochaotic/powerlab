version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: rusty-kaspad_frontend_1
      APP_PORT: 4321

  frontend:
    image: elldee/kaspa-frontend:v0.4.1@sha256:a77573dfbc706b632ba24b9087685dc0b44d588c60b5399e2c2df2a19bd38a93
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      - kaspad

  kaspad:
    image: kaspanet/rusty-kaspad:v1.1.0@sha256:150ffa0c0dcc6497951f9199d1ba3e48c7d91ef958846b28c9fb5045459a2dca
    restart: on-failure
    stop_grace_period: 3m
    volumes:
      - ${APP_DATA_DIR}/data/app:/app/data
    ports:
      - 16110:16110  # GRPC
      - 16111:16111  # P2P
      - 17110:17110  # WRPC (Borsh)
      - 18110:18110  # WRPC (JSON)

x-powerlab:
    store_app_id: rusty-kaspad
    title:
        en_us: Rusty Kaspad
    tagline:
        en_us: A Rust implementation of a Kaspa full node
    icon: https://getumbrel.github.io/umbrel-apps-gallery/rusty-kaspad/icon.svg
    category: crypto
    port_map: "4321"
    author: Kaspa Community
    developer: Kaspa Community
    source:
        catalog: umbrel-apps
        upstream_id: rusty-kaspad
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 0299c400450d07fee62d3dcb0e6c24b00f359b51
        upstream_path: rusty-kaspad/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T03:53:16Z"

name: bffless
services:
    backend:
        depends_on:
            postgres:
                condition: service_healthy
            supertokens:
                condition: service_healthy
        environment:
            ADMIN_DOMAIN: localhost
            API_DOMAIN: http://localhost:5537
            APP_DATA_DIR: ${APP_DATA_DIR:-/data}
            APP_SEED: ${APP_SEED:-}
            BACKEND_HOST: backend
            CACHE_TYPE: memory
            COOKIE_DOMAIN: umbrel.local
            COOKIE_SECURE: "false"
            DATABASE_URL: postgresql://postgres:staticfilesgobrrrr@bffless_postgres_1:5432/assethost
            ENABLE_MINIO: "false"
            ENABLE_REDIS: "false"
            FEATURE_DOMAIN_SSL_TOGGLE: "false"
            FEATURE_WILDCARD_SSL: "false"
            FEATURE_WILDCARD_SSL_BANNER: "false"
            FRONTEND_URL: http://localhost:5537
            LOG_LEVEL: error,warn,log
            NGINX_LISTEN_PORT: "5537"
            NGINX_RELOAD_WAIT_MS: "3000"
            NGINX_SITES_PATH: /etc/nginx/sites-enabled
            NODE_ENV: production
            NODE_OPTIONS: --max-old-space-size=128
            PORT: "3000"
            PRIMARY_DOMAIN: localhost
            PROXY_MODE: cloudflare-tunnel
            STORAGE_TYPE: local
            SUPERTOKENS_API_KEY: ""
            SUPERTOKENS_CONNECTION_URI: http://bffless_supertokens_1:3567
            SUPERTOKENS_MODE: local
        image: ghcr.io/bffless/ce-backend:umbrel@sha256:7c4d4c15a186d5bb3b9e916aaadbe9602a0701db1ff2e3c47b9e7f3814967e61
        restart: on-failure
        stop_grace_period: 30s
        volumes:
            - /DATA/PowerLabAppData/bffless/data/uploads:/app/apps/backend/uploads
            - /DATA/PowerLabAppData/bffless/data/config:/app/config:ro
            - /DATA/PowerLabAppData/bffless/data/nginx:/etc/nginx/sites-enabled
    frontend:
        depends_on:
            - backend
        image: ghcr.io/bffless/ce-frontend:umbrel@sha256:9b02e77aec76a5abeaa45f07f64ec6add565b124bbb37a639fb4d633a774f1d9
        restart: on-failure
        stop_grace_period: 30s
        volumes:
            - /DATA/PowerLabAppData/bffless/data/frontend:/app/dist
    nginx:
        depends_on:
            - backend
            - frontend
        environment:
            DEVICE_DOMAIN_NAME: ${DEVICE_DOMAIN_NAME:-umbrel.local}
        image: ghcr.io/bffless/ce-nginx:umbrel@sha256:40b8f8dd37dd1483a08e687b1f0efe6061c62fcd73013fb46749c74407dbdf84
        restart: on-failure
        stop_grace_period: 30s
        volumes:
            - /DATA/PowerLabAppData/bffless/data/config:/app/config:ro
            - /DATA/PowerLabAppData/bffless/data/frontend:/usr/share/nginx/html/app:ro
            - /DATA/PowerLabAppData/bffless/data/nginx:/etc/nginx/sites-enabled
    postgres:
        command: |
            postgres -c shared_buffers=64MB -c effective_cache_size=128MB -c work_mem=4MB -c maintenance_work_mem=32MB -c max_connections=20 -c wal_buffers=4MB
        environment:
            POSTGRES_DB: assethost
            POSTGRES_PASSWORD: staticfilesgobrrrr
            POSTGRES_USER: postgres
        healthcheck:
            interval: 10s
            retries: 5
            test:
                - CMD-SHELL
                - pg_isready -U postgres
            timeout: 5s
        image: pgvector/pgvector:0.8.2-pg17@sha256:494dff7e67e7bc2c826b94c331364978d145ebb86fd338154138b084223b7f67
        restart: on-failure
        stop_grace_period: 30s
        volumes:
            - /DATA/PowerLabAppData/bffless/data/postgres:/var/lib/postgresql/data
            - /DATA/PowerLabAppData/bffless/data/db/init-databases.sql:/docker-entrypoint-initdb.d/init.sql:ro
    supertokens:
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            JAVA_OPTS: -Xmx192m -Xms96m -XX:+UseSerialGC -XX:MaxMetaspaceSize=64m
            POSTGRESQL_CONNECTION_POOL_SIZE: "3"
            POSTGRESQL_DATABASE_NAME: supertokens
            POSTGRESQL_HOST: bffless_postgres_1
            POSTGRESQL_PASSWORD: staticfilesgobrrrr
            POSTGRESQL_PORT: "5432"
            POSTGRESQL_USER: postgres
        healthcheck:
            interval: 15s
            retries: 8
            start_period: 45s
            test:
                - CMD
                - curl
                - -f
                - http://localhost:3567/hello
            timeout: 10s
        image: supertokens/supertokens-postgresql:9.3@sha256:39c36693b19c4e231684c9e614422c1c95751c346c6fc3ffd74980161d0b041c
        restart: on-failure
        stop_grace_period: 30s


        en_us: '<br /> <p align="center"> <img src="https://raw.githubusercontent.com/pyload/pyload/main/media/banner.png" alt="pyLoad" height="110" /> </p> <h2 align="center">The free and open-source Download Manager written in pure Python</h2> <h4 align="center"> <img alt="status" src="https://img.shields.io/pypi/status/pyload-ng?style=flat-square"> <a href="https://github.com/pyload/pyload/actions"> <img alt="build" src="https://img.shields.io/github/actions/workflow/status/pyload/pyload/build-and-deploy.yml"> </a> <a href="https://www.codacy.com/gh/pyload/pyload"> <img alt="codacy" src="https://img.shields.io/codacy/grade/1d047f77c0a6496eb708e1b3ca83006b?label=grade&style=flat-square"> </a> <img alt="python" src="https://img.shields.io/pypi/pyversions/pyload-ng?style=flat-square"> <a href="https://pypi.python.org/pypi/pyload-ng"> <img alt="pypi" src="https://img.shields.io/pypi/v/pyload-ng?style=flat-square"> </a> <a href="https://pyup.io/repos/github/pyload/pyload"> <img alt="pyup" src="https://pyup.io/repos/github/pyload/pyload/shield.svg"> </a> </h4> <br /> <br /> Overview pyLoad is a lightweight, pure-Python download manager with a modern web UI and rich plugin ecosystem. It automates downloads from one-click hosters, cloud drives, and many other sources; supports premium accounts, captcha-solving services, and link decryption; and can run headless on servers, NAS devices, or desktops. Designed for extensibility and low resource usage. Introduction - Cross-platform: works on Linux, macOS, and Windows (Python 3.9+) - Web interface: manage downloads from your browser - Plugin-driven: hundreds of hosters, decrypters, and addons (notifications, schedulers, extractors, etc.) Quick Start Open a terminal window and install pyLoad typing: pip install --pre pyload-ng[all] To start pyLoad use the command: pyload See the usage section for information on all available options. If you want to uninstall pyLoad: pip uninstall pyload-ng Usage usage: pyload [-h] [-d] [-r] [-
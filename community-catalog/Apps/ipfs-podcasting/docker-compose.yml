version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ipfs-podcasting_web_1
      APP_PORT: 8675

  web:
    image: ipfspodcasting/podcastnode:v0.6@sha256:773d7c34d452764be973e8bc495990ec47f8042287493997784198c64e924393
    init: true
    restart: on-failure
    stop_grace_period: 1m
    user: "1000:1000"
    ports:
      - 4001:4001  # IPFS P2P
    volumes:
      - ${APP_DATA_DIR}/ipfs:/ipfs-podcasting/ipfs
      - ${APP_DATA_DIR}/cfg:/ipfs-podcasting/cfg

x-powerlab:
    store_app_id: ipfs-podcasting
    title:
        en_us: IPFS Podcasting
    tagline:
        en_us: Crowd-host podcasts over IPFS
    description:
        en_us: 'podcastnode An Umbrel Docker App that provides IPFS storage and hosting for IPFSPodcasting.net (Crowd/Self hosting of podcast episodes over IPFS). If you have an Umbrel device and would like to participate, you can use the Web GUI or CLI: Install via Umbrel Web GUI 1. Login to Umbrel 2. Click on App store Icon 3. Click on IPFS Podcasting 4. Click install Install via Umbrel CLI 1. SSH into your umbrel: 2. Create app directories & download/install docker-compose.yml: 3. Install IPFS Podcasting 4. You can browse the Web UI at <http://umbrel.local:8675/> and configure your email address to manage the node at <https://ipfspodcasting.net/Manage> You can also view the communication log to view activity. Uninstall via Umbrel CLI To uninstall the app (!!! This will delete your IPFS configuration and all the files in your IPFS repository !!!)... Other useful commands (from the "~/umbrel" directory) Stop the app Download a new docker image Start the app Launch a command shell to execute IPFS commands... *Note*: If your Umbrel is behind a firewall, you may need to adjust firewall rules and/or port-foward allow traffic to port 4001 (both tcp/upd source/destination ports from your Umbrel IP address).'
    icon: https://getumbrel.github.io/umbrel-apps-gallery/ipfs-podcasting/icon.svg
    category: files
    port_map: "8675"
    author: IPFSPodcasting.net
    developer: IPFSPodcasting.net
    source:
        catalog: umbrel-apps
        upstream_id: ipfs-podcasting
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 0299c400450d07fee62d3dcb0e6c24b00f359b51
        upstream_path: ipfs-podcasting/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T03:53:08Z"

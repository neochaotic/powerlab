name: opencode
services:
    app:
        command:
            - web
            - --hostname
            - 0.0.0.0
            - --port
            - "4096"
        environment:
            HOME: /home/opencode
        image: ghcr.io/anomalyco/opencode:1.14.48@sha256:27dbced5ab6a815631a620e55c49e74d826b399da37f044385453e28df1852ed
        ports:
            - 4096:4096
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/opencode/data/opencode:/home/opencode/
version: "3.7"

x-powerlab:
    store_app_id: opencode
    title:
        en_us: OpenCode
    tagline:
        en_us: The open source AI coding agent
    icon: https://getumbrel.github.io/umbrel-apps-gallery/opencode/icon.svg
    category: ai
    port_map: "4096"
    author: Anomaly
    developer: Anomaly
    source:
        catalog: umbrel-apps
        upstream_id: opencode
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 8a60bdaddda5062fa19b2b13a47966de5af986cf
        upstream_path: opencode/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T15:43:30Z"

            - 0.0.0.0
            - --port
            - "4096"
        environment:
            HOME: /home/opencode
        image: ghcr.io/anomalyco/opencode:1.15.3@sha256:873e3acd6f6b9c53a3f42579d488a5af7e7df1d1adf88ffa69cbb94a5238f305

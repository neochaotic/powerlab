version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: nostrudel_web_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  cors:
    image: ghcr.io/hzrd149/docker-cors-anywhere:0.4.5@sha256:641f5ea3265acbc339a03a72b79cd942c4bedab9b1c8b3fc13e5f3f087f649e6
    environment:
      CORSANYWHERE_REQUIRE_HEADERS: "host"
  web:
    image: ghcr.io/hzrd149/nostrudel:1.1.0@sha256:f07c931e1a1d264fe70e3377796f35828ab7be8b78236b6ed37459ffd1d6661f
    restart: on-failure
    stop_grace_period: 1m
    init: true
    depends_on:
      - cors
    environment:
      REQUEST_PROXY: cors:8080


name: onlyoffice-nextcloud
services:
    documentserver:
        environment:
            - JWT_ENABLED=false
            - ONLYOFFICE_HTTPS_HSTS_ENABLED=false
            - USE_UNAUTHORIZED_STORAGE=true
            - ALLOW_PRIVATE_IP_ADDRESS=true
            - ALLOW_META_IP_ADDRESS=true
        image: onlyoffice/documentserver:9.3.1@sha256:e0a74be8c96fa91a9f55855e86ffb6d4d247d4c8d19dfaef7f441890a1bdbfd3
        ports:
            - 18000:80
        restart: on-failure
        stop_grace_period: 1m
        volumes:
            - /DATA/PowerLabAppData/onlyoffice-nextcloud/data/logs:/var/log/onlyoffice
            - /DATA/PowerLabAppData/onlyoffice-nextcloud/data/certs:/var/www/onlyoffice/Data
            - /DATA/PowerLabAppData/onlyoffice-nextcloud/data/cache:/var/lib/onlyoffice
            - /DATA/PowerLabAppData/onlyoffice-nextcloud/data/db:/var/lib/postgresql
    web:
        environment:
            - DOCS_ADDRESS=http://$DEVICE_DOMAIN_NAME:$DOCSERVER_PORT
            - DOCS_INTERNAL_ADDRESS=http://onlyoffice-nextcloud_documentserver_1
            - NEXTCLOUD_INTERNAL_ADDRESS=http://nextcloud_web_1
            - NEXTCLOUD_WEB_URL=http://$DEVICE_DOMAIN_NAME:$APP_NEXTCLOUD_PORT
        image: a4004/onlyoffice-nextcloud-web:1.0.4@sha256:774bd9bda641e6be49286921637840efba050fdfd022934dfd9ee9b6ec8d0a63
        restart: on-failure
version: "3.9"

x-powerlab:
    store_app_id: onlyoffice-nextcloud
    title:
        en_us: ONLYOFFICE Docs
    tagline:
        en_us: Online office for Nextcloud
    icon: https://getumbrel.github.io/umbrel-apps-gallery/onlyoffice-nextcloud/icon.svg
    category: files
    port_map: "3014"
    author: Ascensio System SIA
    developer: Ascensio System SIA
    source:
        catalog: umbrel-apps
        upstream_id: onlyoffice-nextcloud
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git

name: jellyseerr
services:
    server:
        healthcheck:
            interval: 15s
            retries: 3
            start_period: 20s
            test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
            timeout: 3s
        image: ghcr.io/seerr-team/seerr:v3.2.0@sha256:c4cbd5121236ac2f70a843a0b920b68a27976be57917555f1c45b08a1e6b2aad
        init: true
        ports:
            - 5056:5055
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/jellyseerr/data/config:/app/config
version: "3.7"

x-powerlab:
    store_app_id: jellyseerr
    title:
        en_us: Seerr
    tagline:
        en_us: Beautiful media discovery and request management
    description:
        en_us: '<p align="center"> <img src="./public/logo_full.svg" alt="Seerr" style="margin: 20px 0;"> </p> <p align="center"> <img src="https://github.com/seerr-team/seerr/actions/workflows/release.yml/badge.svg" alt="Seerr Release" /> <img src="https://github.com/seerr-team/seerr/actions/workflows/ci.yml/badge.svg" alt="Seerr CI"> </p> <p align="center"> <a href="https://discord.gg/seerr"><img src="https://img.shields.io/discord/783137440809746482" alt="Discord"></a> <a href="https://hub.docker.com/r/seerr/seerr"><img src="https://img.shields.io/docker/pulls/seerr/seerr" alt="Docker pulls"></a> <a href="https://translate.seerr.dev/engage/seerr/"><img src="https://translate.seerr.dev/widget/seerr/svg-badge.svg" alt="Translation status" /></a> <a href="https://github.com/seerr-team/seerr/blob/develop/LICENSE"><img alt="GitHub" src="https://img.shields.io/github/license/seerr-team/seerr"></a> **Seerr** is a free and open source software application for managing requests for your media library. It integrates with the media server of your choice: Jellyfin, Plex, and Emby. In addition, it integrates with your existing services, such as **Sonarr**, **Radarr**. Current Features - Full Jellyfin/Emby/Plex integration including authentication with user import & management. - Support for **PostgreSQL** and **SQLite** databases. - Supports Movies, Shows and Mixed Libraries. - Ability to change email addresses for SMTP purposes. - Easy integration with your existing services. Currently, Seerr supports Sonarr and Radarr. More to come! - Jellyfin/Emby/Plex library scan, to keep track of the titles which are already available. - Customizable request system, which allows users to request individual seasons or movies in a friendly, easy-to-use interface. - Incredibly simple request management UI. Don''t dig through the app to simply approve recent requests! - Granular permission system. - Support for various notification agents. - Mobile-friendly design, for when you need…'
    icon: https://getumbrel.github.io/umbrel-apps-gallery/jellyseerr/icon.svg
    category: media
    port_map: "5056"
    author: Seerr Team
    developer: Seerr Team
    main: server
    source:
        catalog: umbrel-apps
        upstream_id: jellyseerr
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 7d224ca6c493d2279a49086ed9e7bf45d642d9e6
        upstream_path: jellyseerr/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-18T10:13:40Z"

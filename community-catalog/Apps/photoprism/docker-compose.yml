    description:
        en_us: 'PhotoPrism: Browse Your Life in Pictures [](https://docs.photoprism.app/license/agpl/) [](https://docs.photoprism.app/) [](https://link.photoprism.app/chat) [](https://link.photoprism.app/discussions) [](https://bsky.app/profile/photoprism.app) [](https://floss.social/@photoprism) PhotoPrism® is an AI-Powered Photos App for the Decentralized Web. It makes use of the latest technologies to tag and find pictures automatically without getting in your way. You can run it at home, on a private server, or in the cloud. To get a first impression, you are welcome to play with our public demo. Please be careful not to upload any private, unlawful or offensive pictures. Feature Overview ## **Our mission is to provide the most user- and privacy-friendly solution to keep your pictures organized and accessible.** That''s why PhotoPrism was built from the ground up to run wherever you need it, without compromising freedom, privacy, or functionality: <img align="right" height="270" src="https://dl.photoprism.app/img/ui/2025/iphone-crocus-540px.png"> * Browse all your pictures without worrying about RAW images or video formats * Whether you''re using a phone, tablet, or desktop computer, our intuitive PWA provides a native app-like experience and can be easily installed on your home screen * Quickly find specific photos and videos with powerful search filters that can be combined and are available for many different properties, including labels, location, resolution, color, chroma, and quality * Automatically labels your…'
    icon: https://getumbrel.github.io/umbrel-apps-gallery/photoprism/icon.svg

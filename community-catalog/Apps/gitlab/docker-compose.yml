name: gitlab
services:
    gitlab:
        environment:
            GITLAB_OMNIBUS_CONFIG: |
                # Add any other gitlab.rb configuration here, each on its own line
                gitlab_rails['initial_root_password'] = '${APP_PASSWORD}'
                gitlab_rails['gitlab_shell_ssh_port'] = 2424
                nginx['listen_port'] = 8929
                nginx['listen_https'] = false
            PGID: 1000
            PUID: 1000
        hostname: ${DEVICE_DOMAIN_NAME}:8929
        image: gitlab/gitlab-ce:18.11.2-ce.0@sha256:b9ab7c2a2fbb11491aba5e9093f95b0af6ff2b2eb9910f092c82e327f5859719
        ports:
            - "2424:22"
        restart: on-failure
        shm_size: 256m
        ulimits:
            nofile:
                hard: 8192
                soft: 4096
        volumes:
            - /DATA/PowerLabAppData/gitlab/data/config:/etc/gitlab
            - /DATA/PowerLabAppData/gitlab/data/logs:/var/log/gitlab
            - /DATA/PowerLabAppData/gitlab/data/data:/var/opt/gitlab
version: "3.7"

x-powerlab:
    store_app_id: gitlab
    title:
        en_us: GitLab
    tagline:
        en_us: Software. Faster.
    icon: https://getumbrel.github.io/umbrel-apps-gallery/gitlab/icon.svg
    category: developer
    port_map: "8929"
    author: GitLab
    developer: GitLab
    source:
        catalog: umbrel-apps
        upstream_id: gitlab
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 8a60bdaddda5062fa19b2b13a47966de5af986cf
        upstream_path: gitlab/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T14:50:12Z"

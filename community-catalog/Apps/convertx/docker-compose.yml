    description:
        en_us: 'ConvertX [](https://github.com/C4illin/ConvertX/actions/workflows/docker-publish.yml) [](https://github.com/C4illin/ConvertX/pkgs/container/ConvertX) [](https://hub.docker.com/r/c4illin/convertx) [](https://github.com/C4illin/ConvertX/pkgs/container/convertx) <a href="https://trendshift.io/repositories/13818" target="_blank"><img src="https://trendshift.io/api/badge/repositories/13818" alt="C4illin%2FConvertX | Trendshift" style="width: 250px; height: 55px;" width="250" height="55"/></a> <!-- --> A self-hosted online file converter. Supports over a thousand different formats. Written with TypeScript, Bun and Elysia. Features - Convert files to different formats - Process multiple files at once - Password protection - Multiple accounts Converters supported | Converter | Use case | Converts from | Converts to | | --------------------------------------------------------------- | ---------------- | ------------- | ----------- | | Inkscape | Vector images | 7 | 17 | | libjxl | JPEG XL | 11 | 11 | | resvg | SVG | 1 | 1 | | Vips | Images | 45 | 23 | | libheif | HEIF | 2 | 4 | | XeLaTeX | LaTeX | 1 | 1 | | Calibre | E-books | 26 | 19 | | LibreOffice | Documents | 41 | 22 | | Dasel | Data Files | 5 | 4 | | Pandoc | Documents | 43 | 65 | | msgconvert | Outlook | 1 | 1 | | VCF to CSV | Contacts | 1 | 1 | | dvisvgm | Vector images | 4 |…'

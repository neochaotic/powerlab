name: convertx
services:
    server:
        environment:
            - HTTP_ALLOWED=true
            - ACCOUNT_REGISTRATION=true
        image: c4illin/convertx:v0.17.0@sha256:e1f85be04bbaf8a55ead9261194c3ae0fa0957d303ea537127154860b2552afd
        ports:
            - 8386:3000
        restart: on-failure
        stop_grace_period: 1m
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/convertx/data/app:/app/data


name: habitica
services:
    mongo:
        command:
            - --replSet
            - rs
            - --bind_ip_all
            - --port
            - "27017"
        healthcheck:
            interval: 10s
            retries: 30
            start_interval: 1s
            start_period: 0s
            test: |
                echo "try { rs.status() } catch (err) { rs.initiate({ _id: 'rs', members: [{ _id: 0, host: 'habitica_mongo_1:27017' }] }) }" | mongosh --port 27017 --quiet
            timeout: 30s
        image: mongo:8.0.11@sha256:5941949d3887e40be5175787aade07dc052f2cddb8ce21b740c3948eba6a3ed0
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/habitica/data/db:/data/db:rw
            - /DATA/PowerLabAppData/habitica/data/dbconf:/data/configdb
    server:
        command: 'sh -c "perl -0pi -e ''s/upgradeInsecureRequests: IS_PROD \\? \\[\\] : null,?/upgradeInsecureRequests: null/g'' /var/lib/habitica/website/server/middlewares/index.js /var/lib/habitica/website/transpiled-babel/middlewares/index.js && printenv | grep -v ''no_proxy'' >> /etc/environment && /etc/init.d/cron start && node /var/lib/habitica/website/transpiled-babel/index.js"'
        depends_on:
            - mongo
        environment:
            - NODE_DB_URI=mongodb://mongo/habitica
            - BASE_URL=http://${DEVICE_DOMAIN_NAME}:3944
            - INVITE_ONLY=false
        image: awinterstein/habitica-server:5.47.9@sha256:94be4bf6674568a8f1de6a1a71713aef751345e07bcdfb350902872f39e142f1
        ports:
            - 3944:3000
        restart: on-failure
version: "3.7"

x-powerlab:
    store_app_id: habitica
    title:
        en_us: Habitica
    tagline:
        en_us: An RPG for your life
    icon: https://getumbrel.github.io/umbrel-apps-gallery/habitica/icon.svg
    category: files
    port_map: "3944"
    author: HabitRPG, Inc.
    developer: HabitRPG, Inc.
    main: server
    source:
        catalog: umbrel-apps
        upstream_id: habitica
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 7d224ca6c493d2279a49086ed9e7bf45d642d9e6
        upstream_path: habitica/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-18T10:13:36Z"

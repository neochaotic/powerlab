name: habitica
services:
    mongo:
        command:
            - --replSet
            - rs
            - --bind_ip_all
            - --port
            - "27017"
        healthcheck:
            interval: 10s
            retries: 30
            start_interval: 1s
            start_period: 0s
            test: |
                echo "try { rs.status() } catch (err) { rs.initiate({ _id: 'rs', members: [{ _id: 0, host: 'habitica_mongo_1:27017' }] }) }" | mongosh --port 27017 --quiet
            timeout: 30s
        image: mongo:8.0.11@sha256:5941949d3887e40be5175787aade07dc052f2cddb8ce21b740c3948eba6a3ed0
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/habitica/data/db:/data/db:rw
            - /DATA/PowerLabAppData/habitica/data/dbconf:/data/configdb
    server:
        depends_on:
            - mongo
        environment:
            - NODE_DB_URI=mongodb://habitica_mongo_1/habitica
            - BASE_URL=http://${DEVICE_DOMAIN_NAME}:3944
            - INVITE_ONLY=false
        image: awinterstein/habitica-server:5.47.2@sha256:3827aeb8246fd4f4630b738944164d38b00f54a3d55a966eedeced4eddb2aa1d
        restart: on-failure
version: "3.7"

x-powerlab:
    store_app_id: habitica
    title:
        en_us: Habitica
    tagline:
        en_us: An RPG for your life
    icon: https://getumbrel.github.io/umbrel-apps-gallery/habitica/icon.svg
    category: files
    port_map: "3944"
    author: HabitRPG, Inc.
    developer: HabitRPG, Inc.
    source:
        catalog: umbrel-apps
        upstream_id: habitica
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 8a60bdaddda5062fa19b2b13a47966de5af986cf
        upstream_path: habitica/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T14:50:12Z"

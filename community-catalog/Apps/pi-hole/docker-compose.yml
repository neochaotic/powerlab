name: pi-hole
services:
    server:
        cap_add:
            - NET_ADMIN
        environment:
            - FTLCONF_webserver_api_password=${APP_PASSWORD}
            - FTLCONF_webserver_port=8082,[::]:8082
            - FTLCONF_dns_listeningMode=all
        image: pihole/pihole:2026.05.0@sha256:70a9c11171ded2eee735d88c127996da209284a329d50f5ae59c06b861d401b3
        network_mode: host
        restart: on-failure
        volumes:
            - /DATA/PowerLabAppData/pi-hole/data/pihole:/etc/pihole/
            - /DATA/PowerLabAppData/pi-hole/data/dnsmasq:/etc/dnsmasq.d/
version: "3.7"

x-powerlab:
    store_app_id: pi-hole
    title:
        en_us: Pi-hole
    tagline:
        en_us: Block ads on your entire network
    icon: https://getumbrel.github.io/umbrel-apps-gallery/pi-hole/icon.svg
    category: networking
    port_map: "8082"
    author: Pi-hole®
    developer: Pi-hole®
    source:
        catalog: umbrel-apps
        upstream_id: pi-hole
        upstream_repo: https://github.com/getumbrel/umbrel-apps.git
        upstream_commit: 8a60bdaddda5062fa19b2b13a47966de5af986cf
        upstream_path: pi-hole/umbrel-app.yml
        transform_version: "1.0"
        synced_at: "2026-05-12T15:43:36Z"

name: sure
services:
    db:
        environment:
            PGDATA: /data/pgdata
            POSTGRES_DB: sure_production
            POSTGRES_PASSWORD: sure_password
            POSTGRES_USER: sure_user
        healthcheck:
            interval: 10s
            retries: 5
            start_period: 30s
            test: pg_isready -U sure_user -h localhost -d sure_production
            timeout: 5s
        image: postgres:18.3-alpine@sha256:52098013b4b64a746626437d38afc03cabff6cdeb4d3d92e2342aa95f0ce56ea
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/sure/data/postgres:/data
    redis:
        healthcheck:
            interval: 5s
            retries: 5
            start_period: 30s
            test: redis-cli ping
            timeout: 5s
        image: redis:8.4.2@sha256:4b0ab81cf4d84e610215d0159dcc218d4ec6180f869a9bc83c33a1945d6f3e42
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/sure/data/redis:/data
    web:
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            DB_HOST: db
            DB_PORT: 5432
            POSTGRES_DB: sure_production
            POSTGRES_PASSWORD: sure_password
            POSTGRES_USER: sure_user
            RAILS_ASSUME_SSL: "false"
            RAILS_FORCE_SSL: "false"
            REDIS_URL: redis://redis:6379/1
            SECRET_KEY_BASE: $APP_SEED
            SELF_HOSTED: "true"
        image: ghcr.io/we-promise/sure:0.7.0-hotfix.3@sha256:55c4da94f60a6a0e1da107dd6d61bdef06661bebaed26c1cd2a5c4d3d10af4ef
        ports:
            - 3064:3000
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/sure/data/rails:/rails/storage
    worker:
        command: bundle exec sidekiq
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            DB_HOST: db
            DB_PORT: 5432
            POSTGRES_DB: sure_production
            POSTGRES_PASSWORD: sure_password
            POSTGRES_USER: sure_user
            RAILS_ASSUME_SSL: "false"
            RAILS_FORCE_SSL: "false"
            REDIS_URL: redis://redis:6379/1
            SECRET_KEY_BASE: $APP_SEED
            SELF_HOSTED: "true"
        image: ghcr.io/we-promise/sure:0.7.0-hotfix.3@sha256:55c4da94f60a6a0e1da107dd6d61bdef06661bebaed26c1cd2a5c4d3d10af4ef
        restart: on-failure
        user: 1000:1000
        volumes:
            - /DATA/PowerLabAppData/sure/data/rails:/rails/storage
version: "3.7"


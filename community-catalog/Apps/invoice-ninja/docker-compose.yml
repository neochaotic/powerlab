    store_app_id: invoice-ninja
    title:
        en_us: Invoice Ninja
    tagline:
        en_us: We'll help with the invoicing
    icon: https://getumbrel.github.io/umbrel-apps-gallery/invoice-ninja/icon.svg
    category: finance
    port_map: "8676"
    author: InvoiceNinja, Inc.
    developer: InvoiceNinja, Inc.
    source:

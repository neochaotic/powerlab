        en_us: Free and reliable P2P Bittorrent client
    icon: https://getumbrel.github.io/umbrel-apps-gallery/qbittorrent/icon.svg
    category: networking
    port_map: "8094"
    author: qBittorrent
    developer: qBittorrent
    source:
        catalog: umbrel-apps
        upstream_id: qbittorrent
